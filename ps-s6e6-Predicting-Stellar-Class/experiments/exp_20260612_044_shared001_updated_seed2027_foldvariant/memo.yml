experiment:
  id: exp_20260612_044_shared001_updated_seed2027_foldvariant
  title: shared001 updated RealMLP seed2027/fold variant
  competition: PS S6E6 Predicting Stellar Class
  status: completed
  metric: balanced_accuracy_score
  model: RealMLP_TD_Classifier PyTorch implementation
  created_at: '2026-06-12'
objective:
  summary: Create a conservative seed/fold/regularization variant of the updated shared001
    RealMLP PyTorch notebook and save OOF/pred probabilities with exp_id in filenames
    for later GPU LogReg stacker add044 check.
  success_criteria:
  - run shared001 updated RealMLP seed/fold variant
  - save OOF proba npy with exp_id in filename
  - save test pred proba npy with exp_id in filename
  - save submission
  - save cv_result
  - save fold_scores
  - update oof_registry
  - write memo.yml
data:
  train_path: /kaggle/input/competitions/playground-series-s6e6/train.csv
  test_path: /kaggle/input/competitions/playground-series-s6e6/test.csv
  sample_submission_path: /kaggle/input/competitions/playground-series-s6e6/sample_submission.csv
  target_col: class
  id_col: id
  use_original: false
  use_external_stacking_files: false
seed:
  seed: 2027
  random_seed: 2027
  numpy_seed: 2027
  torch_seed: 2027
  stratified_kfold_random_state: 2027
  target_encoder_random_state: fold_seed
  fold_seed_formula: SEED + fold * FOLD_SEED_MULTIPLIER
  config_random_state: 2027
  audit: Base CONFIG random_state equals SEED, then config_fold random_state is set
    to fold_seed inside each fold.
features:
  feature_family: shared001_updated_seed2027_foldvariant_fe
  feature_info:
    n_features: 29
    n_cat_features: 14
    n_num_features_initial: 15
    cat_cols:
    - alpha_cat_
    - alpha_cat__delta_cat__
    - delta_100_quantile_bin_
    - delta_500_quantile_bin_
    - delta_cat_
    - g_cat_
    - galaxy_population
    - i_cat_
    - r_cat_
    - redshift_cat_
    - spectral_type
    - u_cat_
    - u_cat__z_cat__
    - z_cat_
    combo_names:
    - alpha_cat__delta_cat__
    - u_cat__z_cat__
    color_pairs:
    - - u
      - g
    - - g
      - r
    - - i
      - z
    - - g
      - i
    - - r
      - z
    important_combos:
    - - alpha_cat_
      - delta_cat_
    - - u_cat_
      - z_cat_
  target_encoder_safety: TargetEncoder is fit inside each fold on train fold combo
    features and labels, then transforms validation and test.
model:
  family: RealMLP
  type: shared001_updated_seed2027_foldvariant
  config:
    n_ens: 8
    embed_dim: 8
    onehot_thresh: 8
    hidden_dims:
    - 512
    - 512
    - 512
    dropout: 0.052
    p_drop_sched: expm4t
    activation: <class 'torch.nn.modules.activation.SiLU'>
    add_front_scale: true
    pbld_hidden_dim: 20
    pbld_out_dim: 5
    pbld_freq_scale: 5.0
    pbld_activation: <class 'torch.nn.modules.activation.PReLU'>
    pbld_lr_factor: 0.093
    lr: 0.01
    mom: 0.9
    sq_mom: 0.98
    lr_sched: flat_cos
    flat_ratio: 0.25
    first_layer_lr_factor: 1.0
    first_layer_wd_factor: 0.1
    lr_scale_mult: 10.0
    lr_bias_mult: 0.1
    weight_decay: 0.0145
    wd_scale_mult: 0.1
    wd_bias_mult: 0.5
    ema_decay: 0.998
    grad_clip: 1.2
    ls_eps: 0.035
    ls_eps_sched: cos
    tfms:
    - median_center
    - robust_scale
    epochs: 6
    train_bs: 256
    eval_bs: 10240
    verbosity: 2
    use_early_stopping: false
    early_stopping_additive_patience: 10
    early_stopping_multiplicative_patience: 1
    device: cuda
    random_state: 2027
cv:
  scheme: StratifiedKFold
  n_splits: 5
  shuffle: true
  random_state: 2027
  fold_seed_formula: SEED + fold * FOLD_SEED_MULTIPLIER
