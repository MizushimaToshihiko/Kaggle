experiment:
  id: exp_20260609_032_ovr_tabm_as_is
  title: ps6e6-one-vs-rest-tabm as-is
  competition: PS S6E6 Predicting Stellar Class
  status: completed
  metric: balanced_accuracy_score
  model: TabM_D_Classifier
  created_at: '2026-06-09'
objective:
  summary: Run ps6e6-one-vs-rest-tabm as-is to obtain a TabM/NN-family OOF/pred material
    distinct from RealMLP, CatBoost, and XGB. Save exp_id-named OOF/pred probability
    files for the next add032 blend/corr check.
  success_criteria:
  - run TabM one-vs-rest training body
  - use SEED_LIST=[60,0,2809]
  - keep source notebook's class-wise LogisticRegressionCV over TabM seed outputs
  - save raw OOF proba npy with exp_id in filename
  - save raw test pred proba npy with exp_id in filename
  - save bias-tuned submission
  - save cv_result
  - save feature_info
  - update oof_registry
data:
  train_path: /kaggle/input/competitions/playground-series-s6e6/train.csv
  test_path: /kaggle/input/competitions/playground-series-s6e6/test.csv
  sample_submission_path: /kaggle/input/competitions/playground-series-s6e6/sample_submission.csv
  target_col: class
  id_col: id
  use_original: false
  use_external_stacking_files: false
seed:
  seed: 42
  seed_list: &id001
  - 60
  - 0
  - 2809
  random_seed: 42
  numpy_seed: 42
  torch_seed: 42
  stratified_kfold_random_state_per_seed: *id001
  target_encoder_random_state_per_seed: *id001
  tabm_random_state: 42
features:
  feature_family: ps6e6_one_vs_rest_tabm_fe
  feature_info:
    feature_family: ps6e6_one_vs_rest_tabm_fe
    n_features: 26
    n_cat_features: 12
    cat_cols:
    - spectral_type
    - galaxy_population
    - alpha_cat_
    - delta_cat_
    - u_cat_
    - g_cat_
    - r_cat_
    - i_cat_
    - z_cat_
    - redshift_cat_
    - delta_100_quantile_bin_
    - delta_500_quantile_bin_
    feature_cols:
    - spectral_type
    - galaxy_population
    - alpha_cat_
    - delta_cat_
    - u_cat_
    - g_cat_
    - r_cat_
    - i_cat_
    - z_cat_
    - redshift_cat_
    - delta_100_quantile_bin_
    - delta_500_quantile_bin_
    - alpha
    - delta
    - u
    - g
    - r
    - i
    - z
    - redshift
    - _g_/_redshift
    - _i_/_redshift
    - _u-g
    - _u-r
    - alpha_cat_-delta_cat_
    - u_cat_-z_cat_
    te_columns:
    - alpha_cat_-delta_cat_
    - u_cat_-z_cat_
    seed_list:
    - 60
    - 0
    - 2809
    model_types:
      qso:
      - t
      star:
      - t
      galaxy:
      - t
    add_external: false
  target_encoder_safety: TargetEncoder is fit inside each OVR fold on train fold combo
    features and binary labels, then transforms validation and test.
model:
  family: TabM
  type: binary_one_vs_rest
  base_model: TabM_D_Classifier
  classwise_blender: LogisticRegressionCV
  params_t:
    device: cuda
    val_metric_name: 1-auc_ovr
    random_state: 42
    verbosity: 0
    tabm_k: 32
    num_emb_type: pwl
    d_embedding: 12
    batch_size: 64
    lr: 0.003
    weight_decay: 0.02
    n_epochs: 3
    dropout: 0.1
    d_block: 512
    n_blocks: 3
  probability_postprocess: Build independent class probabilities from class-wise OVR
    outputs, then normalize each row to sum to 1.
  bias_tuning: Applied only to submission labels. OOF/pred npy store raw normalized
    probabilities.
cv:
  scheme: StratifiedKFold OVR per class and seed
  n_splits: 5
  shuffle: true
  raw_score: 0.9610105651284856
  tuned_score: 0.9686168281485955
  best_bias:
  - -1.42
  - -0.21299999999999997
  - 0.0
  raw_recalls:
    GALAXY: 0.9798797287273497
    QSO: 0.9659390659279684
    STAR: 0.9372129007301387
  tuned_recalls:
    GALAXY: 0.9574441029988344
    QSO: 0.9771646619943146
    STAR: 0.9712417194526377
outputs:
  oof_proba: oof_exp_20260609_032_ovr_tabm_as_is_proba.npy
  pred_proba: pred_exp_20260609_032_ovr_tabm_as_is_proba.npy
  oof_csv: oof_exp_20260609_032_ovr_tabm_as_is.csv
  pred_csv: pred_exp_20260609_032_ovr_tabm_as_is.csv
  submission: submission_exp_20260609_032_ovr_tabm_as_is.csv
  submission_raw: submission_raw_exp_20260609_032_ovr_tabm_as_is.csv
  cv_result: cv_result_exp_20260609_032_ovr_tabm_as_is.json
  feature_info: feature_info_exp_20260609_032_ovr_tabm_as_is.json
  feature_columns: feature_columns_exp_20260609_032_ovr_tabm_as_is.csv
  class_distribution: class_distribution_exp_20260609_032_ovr_tabm_as_is.csv
  registry: oof_registry.csv
judgement:
  status: pending_public_lb_and_corr
  reason: This is a TabM/NN-family OVR material candidate. Adoption depends on CV,
    Public LB, and OOF correlation/blend behavior against 031/029/027/026/028/030/018.
  next_action:
  - Submit submission_exp_20260609_032_ovr_tabm_as_is.csv
  - Record Public LB
  - Add OOF/pred npy to npy-files dataset
  - Run 033 add032 blend/corr check
  - Compare against current best 031 and backup 029

result:
  status: completed
  raw_cv_balanced_accuracy: 0.9610105651284856
  tuned_cv_balanced_accuracy: 0.9686168281485955
  public_lb_raw: 0.96106
  public_lb_biased: 0.96895
  public_lb_source: user_reported_after_submission
  submitted:
    raw: true
    biased: true
  best_submission: biased
  best_public_lb: 0.96895

model_summary:
  model_family: TabM
  model_type: binary_one_vs_rest_tabm_with_classwise_logregcv_blend
  feature_family: ps6e6_one_vs_rest_tabm_fe
  purpose: >
    Obtain a TabM-family OOF/pred material distinct from RealMLP, CatBoost, and XGB
    for later add032 blend/correlation check.
  use_original: false
  use_fe: true
  use_bias_search: true
  use_external_stacking_files: false
  external_submission_blend_removed: true
  seed: 42
  seed_list:
    - 60
    - 0
    - 2809
  n_splits: 5
  metric: balanced_accuracy_score
  class_order:
    - GALAXY
    - QSO
    - STAR
  best_bias:
    - -1.42
    - -0.21299999999999997
    - 0.0

params:
  device: cuda
  val_metric_name: 1-auc_ovr
  random_state: 42
  verbosity: 0
  tabm_k: 32
  num_emb_type: pwl
  d_embedding: 12
  batch_size: 64
  lr: 0.003
  weight_decay: 0.02
  n_epochs: 3
  dropout: 0.1
  d_block: 512
  n_blocks: 3

cv:
  raw:
    score: 0.9610105651284856
    recalls:
      GALAXY: 0.9798797287273497
      QSO: 0.9659390659279684
      STAR: 0.9372129007301387
    note: >
      RAW prediction is strongly biased toward GALAXY and has weak STAR recall,
      resulting in low balanced accuracy.
  tuned:
    score: 0.9686168281485955
    recalls:
      GALAXY: 0.9574441029988344
      QSO: 0.9771646619943146
      STAR: 0.9712417194526377
    note: >
      Bias tuning greatly improves STAR recall and QSO recall at the cost of GALAXY recall.
      This raises CV from 0.9610105651284856 to 0.9686168281485955.

public_lb:
  raw:
    score: 0.96106
    comparison_to_raw_cv: >
      RAW Public LB is consistent with raw CV and confirms that the un-biased TabM output
      is not usable as a standalone submission.
  biased:
    score: 0.96895
    comparison_to_tuned_cv: >
      Biased Public LB is lower than the current best, but high enough to justify keeping
      the OOF/pred as a possible blend material.
  best: biased

outputs:
  oof_proba: oof_exp_20260609_032_ovr_tabm_as_is_proba.npy
  pred_proba: pred_exp_20260609_032_ovr_tabm_as_is_proba.npy
  oof_csv: oof_exp_20260609_032_ovr_tabm_as_is.csv
  pred_csv: pred_exp_20260609_032_ovr_tabm_as_is.csv
  submission: submission_exp_20260609_032_ovr_tabm_as_is.csv
  submission_raw: submission_raw_exp_20260609_032_ovr_tabm_as_is.csv
  feature_info: feature_info_exp_20260609_032_ovr_tabm_as_is.json
  feature_columns: feature_columns_exp_20260609_032_ovr_tabm_as_is.csv
  class_distribution: class_distribution_exp_20260609_032_ovr_tabm_as_is.csv
  cv_result: cv_result_exp_20260609_032_ovr_tabm_as_is.json
  registry: oof_registry.csv
  memo: memo.yml

comparison_to_current_best:
  current_best:
    exp_id: exp_20260608_031_blend_add030_ovr_xgb_check
    candidate: W_018_019_027_026_028_030 / hc_nonnegative_raw
    cv: 0.9700333620193362
    public_lb: 0.97043
  exp_032:
    raw_cv: 0.9610105651284856
    tuned_cv: 0.9686168281485955
    public_lb_raw: 0.96106
    public_lb_biased: 0.96895
  judgement: >
    032 does not update the standalone submission slot and is clearly below 031.
    However, the biased TabM output is strong enough to be tested as a distinct NN-family
    blend material in 033.

comparison_to_related_materials:
  vs_030_ovr_xgb:
    exp_id: exp_20260608_030_ovr_xgb_as_is
    cv: 0.9609971296999271
    public_lb: 0.96118
    comparison: >
      032 RAW is similar to 030, but 032 biased is far stronger.
      032 should be treated as a more promising auxiliary material than 030 before blend testing.
  vs_028_cat_v3:
    exp_id: exp_20260608_028_cat_v3_as_is
    cv: 0.9688146470512534
    public_lb: 0.96969
    comparison: >
      032 biased is slightly below 028 on CV and clearly below 028 on Public LB,
      but may still provide family diversity because it is TabM/NN-based.
  vs_026_realmlp_v5:
    exp_id: exp_20260608_026_realmlp_v5_as_is
    cv: 0.9690389777981231
    public_lb: 0.96979
    comparison: >
      032 biased is below 026 as a standalone model,
      but 032 may still be useful if its OOF errors differ from RealMLP v5.

judgement:
  status: completed
  keep_hold_drop: keep_for_033_blend_corr_check
  role: tabm_ovr_family_aux_material
  priority: medium_high
  reason: >
    The raw TabM output is weak, but bias tuning produces a usable CV/Public LB level.
    Since TabM is a different NN family from RealMLP and a different family from CatBoost/XGB,
    the main value of 032 is potential error diversity, not standalone score.
  not_for_submission_slot: true
  do_not_deepen_before_corr: true
  use_in_next_blend_check: true
  next_action:
    - Add oof_exp_20260609_032_ovr_tabm_as_is_proba.npy and pred_exp_20260609_032_ovr_tabm_as_is_proba.npy to npy-files dataset.
    - Run 033 add032 blend/corr check.
    - Include at least 031, 029, 027, 026, 028, 030, 018, and 032.
    - Check whether 032 receives non-zero weight in safe blends.
    - If 032 weight is near zero or CV does not improve, move on to 034 GPU logistic regression stacker.
    - If 032 receives meaningful weight and improves CV/Public LB, keep it as a TabM auxiliary material.
