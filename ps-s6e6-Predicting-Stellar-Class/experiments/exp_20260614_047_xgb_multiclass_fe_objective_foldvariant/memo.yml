    objective: multi:softprob
    num_class: 3
    eval_metric: mlogloss
    tree_method: hist
    device: cuda
    n_estimators: 9000
    early_stopping_rounds: 350
    learning_rate: 0.025
    max_depth: 5
    min_child_weight: 2.0
    subsample: 0.82
    colsample_bytree: 0.62
    max_bin: 512
    reg_alpha: 0.05
    reg_lambda: 2.0
    random_state: 2027
  n_models: 15
  probability_postprocess: Average multiclass softprob predictions across seeds/folds,
    then normalize defensively so each row sums to 1.
  changed_from_030:
  - OVR binary XGB -> multiclass softprob XGB
  - binary AUC monitoring -> multiclass logloss monitoring
  - SEED 42 -> 2027
  - SEED_LIST [60,0,2809] -> [2027,3407,7117]
  - richer FE and additional qbins
  - fold-safe multiclass smoothed TE instead of binary TargetEncoder
