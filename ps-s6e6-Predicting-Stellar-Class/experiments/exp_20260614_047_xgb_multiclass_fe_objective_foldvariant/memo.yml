judgement:
  status: completed
  keep_hold_drop: keep_as_failed_xgb_variant_diagnostic
  role: xgb_multiclass_objective_test
  priority: low
  decision: do_not_promote
  reason: >
    047 tested whether a multiclass softprob XGB with richer FE, altered bins,
    multiclass TE, and different seeds/folds could become useful XGB-family
    material. It underperformed the original 030 OVR XGB on both CV and Public
    LB, mainly due to weak STAR recall.
  notes:
    - Multiclass softprob objective appears worse than OVR binary objective for this task.
    - STAR recall is too low for balanced accuracy.
    - The richer FE did not compensate for the objective change.
    - This result weakens the case for multiclass XGB variants.
    - If XGB is revisited, prefer OVR objective with different FE/seed/fold rather than multiclass softprob.
  next_action:
    - Do not promote 047.
    - Do not prioritize 048 stacker add047 unless compute is very cheap and the goal is only to confirm low-correlation behavior.
    - If continuing XGB-family exploration, return to OVR XGB and vary FE/seed/fold/objective details more conservatively.
    - Keep 040 as slot_1, 033 as slot_2 private hedge, and 038 as Public LB backup.
