  initial_view: Based on prior CV/LB, 002 LightGBM is the main raw baseline, 004 XGBoost
    is the next auxiliary candidate, and 003 CatBoost is reference/possible low-correlation
    material. Use the generated correlation files to decide whether Cat/XGB should
    be kept for later blend.
  next_action:
  - Review pairwise_oof_correlation.csv
  - Review simple_average_ensemble_diagnostics.csv
  - If 002+004 average improves OOF, keep XGB as early blend material
  - Do not start Optuna yet
  - Next FE candidate should likely be color index minimum on LGB/XGB after this review


