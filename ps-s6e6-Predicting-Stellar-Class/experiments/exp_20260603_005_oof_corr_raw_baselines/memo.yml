  title: OOF correlation check for 002/003/004 raw baselines
  competition: PS S6E6 Predicting Stellar Class
  status: completed
  metric: balanced_accuracy_score
  created_at: '2026-06-03'
objective:
  summary: Compare OOF predictions from LightGBM/CatBoost/XGBoost strict raw baselines.
    Compute individual CV, pairwise proba correlation, argmax disagreement, error
    overlap, and simple average ensemble diagnostics before moving to FE/original/bias
    experiments.
  success_criteria:
  - load OOF proba for 002/003/004
  - recompute individual balanced accuracy
  - compute pairwise OOF correlations
  - compute argmax disagreement and error overlap
  - compute simple average ensemble diagnostics
  - save summary files
