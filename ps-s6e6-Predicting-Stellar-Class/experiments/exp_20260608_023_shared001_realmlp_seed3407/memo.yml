comparison:
  against_015_realmlp_as_is:
    exp_id: exp_20260605_015_shared001_realmlp_as_is
    cv_015: 0.9681693449222352
    public_lb_015: 0.96977
    cv_023: 0.9680674611199329
    public_lb_023: 0.96925
    cv_delta_023_minus_015: -0.0001018838023023
    lb_delta_023_minus_015: -0.00052
    interpretation: >
      023は015をCV/LBともに下回った。
      単体としては015の方が明確に優先される。

  against_017_realmlp_bias:
    exp_id: exp_20260606_017_bias_search_on_015_realmlp
    cv_017: 0.9683022653955233
    public_lb_017: 0.96985
    cv_023: 0.9680674611199329
    public_lb_023: 0.96925
    cv_delta_023_minus_017: -0.0002348042755904
    lb_delta_023_minus_017: -0.00060
    interpretation: >
      023は017にCV/LBともに届かない。
      017はRealMLP bias backupとして引き続き優位。

  against_019_public_current_best:
    exp_id: exp_20260607_019_blend_add018_xgb_check
    cv_019: 0.968872315017554
    public_lb_019: 0.97000
    cv_023: 0.9680674611199329
    public_lb_023: 0.96925
    cv_delta_023_minus_019: -0.0008048538976211
    lb_delta_023_minus_019: -0.00075
    interpretation: >
      023単体は019 current best blendには届かない。
      019を置換する候補ではない。

  against_020_cv_trusted_attack:
    exp_id: exp_20260607_020_bias_search_on_019_best_blend
    cv_020: 0.9692240443617589
    public_lb_020: 0.96969
    cv_023: 0.9680674611199329
    public_lb_023: 0.96925
    cv_delta_023_minus_020: -0.001156583241826
    lb_delta_023_minus_020: -0.00044
    interpretation: >
      023単体は020 CV-trusted attackにCV/LBともに届かない。
      ただし020はpostprocess/HC系、023はseed3407単体RealMLPなので、役割は異なる。

  against_021_seed777:
    exp_id: exp_20260607_021_shared001_realmlp_seed777
    cv_021: 0.9682532829014837
    public_lb_021: 0.96926
    cv_023: 0.9680674611199329
    public_lb_023: 0.96925
    cv_delta_023_minus_021: -0.0001858217815508
    lb_delta_023_minus_021: -0.00001
    interpretation: >
      023は021よりCVで低く、Public LBもほぼ同等だがわずかに下回った。
      021にはseed監査上の混合seed問題があるものの、単体結果だけなら021の方がやや良い。

  against_022_seed2026:
    exp_id: exp_20260608_022_shared001_realmlp_seed2026
    cv_022: 0.9681106610656959
    public_lb_022: 0.96956
    cv_023: 0.9680674611199329
    public_lb_023: 0.96925
    cv_delta_023_minus_022: -0.000043199945763
    lb_delta_023_minus_022: -0.00031
    interpretation: >
      023は022よりCV/LBともに下回った。
      seed variant群の中では023は弱め。

role_judgement:
  current_public_best:
    exp_id: exp_20260607_019_blend_add018_xgb_check
    public_lb: 0.97000
    status: keep_public_current_best
    reason: >
      023はPublic LBで019に届かない。
      current public bestは019のまま。

  cv_trusted_attack:
    exp_id: exp_20260607_020_bias_search_on_019_best_blend
    cv: 0.9692240443617589
    public_lb: 0.96969
    status: keep_cv_trusted_attack
    reason: >
      020はCV最高候補。
      023は020にCV/LBともに届かない。

  seed_variant_material:
    exp_id: exp_20260608_023_shared001_realmlp_seed3407
    cv: 0.9680674611199329
    public_lb: 0.96925
    status: hold_for_seed_ensemble_and_blend_check
    reason: >
      023単体は提出候補として弱いが、seed3407のRealMLP素材として実験定義は明確。
      015/017/019/020/021/022との相関・blendで有効か確認するまではdropしない。

  stable_single_backup:
    exp_id: exp_20260605_015_shared001_realmlp_as_is
    cv: 0.9681693449222352
    public_lb: 0.96977
    status: keep_stable_single_backup
    reason: >
      015は023よりCV/LBともに強く、biasやHC blendを含まない素直な単体RealMLP。
      Private耐性候補として引き続き保持する。

judgement:
  status: completed
  decision: >
    023 shared001 RealMLP seed3407 は単体提出候補としては不採用。
    CVは0.968067、Public LBは0.96925で、015/017/019/020/021/022には届かなかった。
    ただしseed3407として実験定義が明確であり、後続のseed ensembleおよびblend確認用素材として保持する。
  key_findings:
    - 023はseed3407 RealMLP variantとして正常に実行できた
    - params.random_stateも3407になっており、seed定義は明確
    - CV/LBともに015/017/019/020/022には届かなかった
    - 021とはPublic LBがほぼ同等だが、CVでは021を下回った
    - seed variant群では弱め
    - 単体提出候補ではないが、seed ensemble素材としては保持対象
  caveat: >
    RealMLP seed variantは単体LBだけでは価値を判断しない。
    023が単体で弱くても、015/021/022とのseed ensembleや019/020とのblendで補助重みを持つ可能性はある。
    ただし、024の相関・blend確認で重みが入らなければactive候補から外す。
  next_action:
    - 023のOOF/pred probaをnpy-files datasetへ追加する
    - 次は024として015/021/022/023 seed ensemble + 014/018/019/020 blend checkを実施する
    - seed ensembleとして015+021+022+023、017+021+022+023を確認する
    - 019/020に021/022/023を追加して有効か確認する
    - 023がblendで重みを持たなければdropまたはlow-priority referenceへ移す
    - 追加seedを作るかどうかは024の結果を見て判断する

