model:
  family: RealMLP
  estimator: RealMLP_TD_Classifier
  source: shared001_as_is_seed_variant
  role: realmlp_seed_variant_material
  seed: 3407
  use_original: false
  use_fe: true
  fe_family: shared001_realmlp_fe_seed3407
  use_bias_search: false
  params:
    n_ens: 8
    embed_dim: 8
    onehot_thresh: 8
    hidden_dims:
      - 512
      - 512
      - 512
    dropout: 0.06
    p_drop_sched: expm4t
    activation: torch.nn.SiLU
    add_front_scale: true
    pbld_hidden_dim: 20
    pbld_out_dim: 5
    pbld_freq_scale: 5.0
    pbld_activation: torch.nn.PReLU
    pbld_lr_factor: 0.093
    lr: 0.01
    mom: 0.9
    sq_mom: 0.98
    lr_sched: flat_cos
    flat_ratio: 0.3
    first_layer_lr_factor: 1.0
    first_layer_wd_factor: 0.1
    lr_scale_mult: 10.0
    lr_bias_mult: 0.1
    weight_decay: 0.013
    wd_scale_mult: 0.1
    wd_bias_mult: 0.5
    grad_clip: 1.0
    ls_eps: 0.04
    ls_eps_sched: cos
    tfms:
      - median_center
      - robust_scale
    epochs: 6
    train_bs: 256
    eval_bs: 10240
    verbosity: 2
    use_early_stopping: false
    early_stopping_additive_patience: 10
    early_stopping_multiplicative_patience: 1
    device: cuda
    random_state: 3407

