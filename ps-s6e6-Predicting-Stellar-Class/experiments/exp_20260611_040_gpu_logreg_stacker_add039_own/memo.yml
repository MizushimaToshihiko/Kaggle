  status: pending_public_lb
  reason: This is a self-owned GPU logistic regression stacker. Adoption depends on
    OOF CV, Public LB, and whether the stacker improves over the current 038 GPU LogReg
    add037 reference.
  current_reference:
    033_cv: 0.9700400336552478
    033_public_lb: 0.97043
    036_gpu_logreg_add035_cv: 0.9700674063284508
    036_gpu_logreg_add035_public_lb: 0.97037
