    - alpha_cat_-delta_cat_
    - redshift_64_quantile_bin_-g_cat_
    - u_cat_-z_cat_
    source: ps6e6-one-vs-rest-xgb.ipynb XGB body only
  changed_from_030:
  - add g-r/r-i/i-z/g-i/r-z color indices
  - add magnitude mean/std/range and u-to-z slope
  - add redshift_abs and log1p_redshift
  - add z/g ratio
  - keep delta 100/500 qbins
  - add redshift 64 qbin
  - add redshift/g combo for TE
  target_encoder_safety: TargetEncoder is fit inside each binary fold on train fold
    combo features and binary labels, then transforms validation and test.
model:
  family: XGBoost
  type: binary one-vs-rest
  class_order:
  - GALAXY
  - QSO
  - STAR
  xgb_params_base:
    subsample: 0.85
    colsample_bytree: 0.58
    max_depth: 4
    min_child_weight: 1.5
    learning_rate: 0.018
    max_bin: 1024
    tree_method: hist
    device: cuda
    objective: binary:logistic
    eval_metric: aucpr
    random_state: 2027
    n_estimators: 18000
    early_stopping_rounds: 450
    reg_alpha: 0.02
    reg_lambda: 1.6
  n_binary_models: 45
  probability_postprocess: Average across seeds for each class, then normalize independent
    one-vs-rest probabilities so each row sums to 1.
  target_specific_changes:
  - QSO/STAR use aucpr as eval_metric
  - scale_pos_weight=(neg/pos)^0.25 per binary fold
  excluded:
  - external stacking files
  - LogisticRegressionCV second-stage blend
  - final bias search as submitted output
  - multiclass softprob objective
