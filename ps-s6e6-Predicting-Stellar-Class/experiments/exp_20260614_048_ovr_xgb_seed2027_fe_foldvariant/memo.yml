judgement:
  status: completed
  keep_hold_drop: keep_as_xgb_ovr_variant_material
  role: xgb_ovr_variant_for_stacker_check
  priority: medium
  decision: do_not_promote_standalone_but_test_in_stacker
  reason: >
    048 is not competitive as a standalone model, but it successfully improves
    the XGB-family OVR route over both 030 and the failed 047 multiclass variant.
    Since the competition's best models are dominated by RealMLP/CatBoost/blend/
    stacker families, a stronger XGB OVR material may still provide useful
    diversity in GPU LogReg stacking.
  notes:
    - Returning to OVR was clearly better than multiclass softprob.
    - 048 beats 030 on both CV and Public LB.
    - STAR recall recovered substantially compared with 047.
    - Standalone performance is still far below the final candidates.
    - The value of 048 should be judged by stacker contribution, not by direct LB.
  next_action:
    - Keep 048 OOF/pred files in the asset pool.
    - Run 049 GPU LogReg stacker add048 using the current strong own OOF/pred pool.
    - Compare 049 against 040 CV 0.9702017877238539 / LB 0.97069.
    - Also compare against 045 CV 0.9702445493383917 / LB 0.97040 and 046 CV 0.9702533348410616 / LB 0.97042.
    - If 049 improves CV but not LB, keep it as diagnostic only.
    - If 049 improves LB over 040, promote it to slot_1 candidate.
