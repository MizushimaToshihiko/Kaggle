judgement:
  status: pending_public_lb_and_corr
  reason: 048 is a conservative OVR XGB variant. It should be compared first against
    030 and 047. Only if CV/LB or correlation behavior is acceptable should it be
    added to GPU LogReg stacker.
  next_action:
  - Submit submission_exp_20260614_048_ovr_xgb_seed2027_fe_foldvariant.csv
  - Record Public LB
  - Add OOF/pred npy to npy-files dataset only if worth testing further
  - Compare against 030 and 047
  - If favorable, run 049 GPU LogReg stacker add048
