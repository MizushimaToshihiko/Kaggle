experiment:
  id: exp_20260614_048_ovr_xgb_seed2027_fe_foldvariant
  title: OVR XGB seed2027 conservative FE/fold variant
  competition: PS S6E6 Predicting Stellar Class
  status: completed
  metric: balanced_accuracy_score
  model: XGBClassifier binary one-vs-rest
  created_at: '2026-06-14'
objective:
  summary: After 047 multiclass softprob XGB underperformed, return to the 030 binary
    OVR XGB route. Create a conservative XGB-family material by changing seed/folds
    and modestly expanding FE while preserving the OVR objective.
  success_criteria:
  - keep one-vs-rest binary XGB for GALAXY/QSO/STAR
  - do not use multiclass softprob
  - use seed_list [2027,3407,7117]
  - use conservative FE changes from 030
  - use fold-safe TargetEncoder
  - save OOF proba npy with exp_id in filename
  - save test pred proba npy with exp_id in filename
  - save submission
  - save cv_result
  - save fold_scores
  - update oof_registry
  - write memo.yml
data:
  train_path: /kaggle/input/competitions/playground-series-s6e6/train.csv
  test_path: /kaggle/input/competitions/playground-series-s6e6/test.csv
  sample_submission_path: /kaggle/input/competitions/playground-series-s6e6/sample_submission.csv
  target_col: class
  id_col: id
  use_original: false
seed:
  base_seed: 2027
  seed_list:
  - 2027
  - 3407
  - 7117
  numpy_seed: 2027
  fold_seed_formula: seed + target_id*1009 + fold*17
  stratified_kfold_random_state: seed + target_id*101 for each binary classifier
  target_encoder_random_state: fold_seed
