judgement:
  status: completed
  keep_hold_drop: keep_for_036_blend_corr_check
  role: updated_shared001_realmlp_aux_material
  priority: medium
  not_for_submission_slot: true
  use_in_next_blend_check: true
  reason: >
    The updated shared001 RealMLP has a solid Public LB but insufficient CV to replace
    the current best slots. Its main value is as a candidate material for 036 add035
    blend/correlation check.
  risk:
    family_correlation: high
    public_cv_mismatch: moderate
    note: >
      Because 035 is another RealMLP-family model, correlation with 015/017/026/027/031/033
      may be high. Also, Public LB is relatively better than CV, so it should not be
      promoted without blend validation.
  next_action:
    - Add oof_exp_20260610_035_shared001_updated_realmlp_pytorch_as_is_proba.npy and pred_exp_20260610_035_shared001_updated_realmlp_pytorch_as_is_proba.npy to npy-files dataset.
