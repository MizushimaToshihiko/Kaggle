    - Include at least 033, 034default, 031, 029, 027, 026, 028, 030, 032, and 035.
    - Check OOF correlation against 015/017/026/031/033 to see whether 035 is redundant.
    - Promote 035 only if it receives non-zero weight in safe blends and improves CV without relying only on Public LB.
