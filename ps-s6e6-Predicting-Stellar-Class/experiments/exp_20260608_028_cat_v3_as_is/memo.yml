judgement:
  decision: keep_for_blend_check
  role: catboost_v3_family_aux_material
  priority: medium_high
  reason: >
    028単体は提出枠を更新しないが、Public LB 0.96969 はCatBoost familyとして十分強い。
    RealMLP偏重の027や、019のXGB補完構成と誤差構造が違う可能性があるため、
    029で相関とblend weightを確認する価値がある。
  not_for_submission_slot: true
  do_not_bias_yet: true
  next_action: >
    029で 019 / 027 / 026 / 024 / 020 / 017 / 015 / 018 / 028 の
    OOF相関、rank相関、error overlap、hc_nonnegative_raw、nm_softmax_raw、
    logreg_meta_all を確認する。
    028に非ゼロ重みが入るかを最優先で見る。
