judgement:
  status: completed
  keep_hold_drop: keep_as_public_strong_realmlp_material
  role: shared001_updated_v2_as_is_check
  priority: high
  decision: do_not_promote_standalone_but_test_in_blend
  reason: >
    051 has a strong Public LB of 0.97055 despite only moderate CV. It improves
    over the previous shared001 lineage runs 015/035/044 and is now strong enough
    to justify a dedicated blend check with 040/038/050/049/045/033.
  notes:
    - Public LB is better than 050, 049, 046, 045, 033, and 035.
    - Public LB is still below 040 and 038.
    - CV is far below 040/038/050/049/033, so standalone promotion is risky.
    - The result suggests public-transfer strength rather than broad OOF strength.
    - This should be evaluated by blend weight, not by standalone CV alone.
  next_action:
    - Keep 051 OOF/pred files in the asset pool.
    - Run 052 blend add051 using the 050 blend framework.
    - Check whether 051 receives meaningful weight in hc_nonnegative_raw or other safe blend methods.
    - If 051 receives meaningful safe-blend weight and improves Public LB/CV, consider GPU LogReg stacker add051 afterwards.
    - If 051 receives zero weight, keep as standalone public-strong diagnostic only.
