experiment:
  id: exp_20260608_025_bias_search_on_024_best_blend
  title: Bias search on 024 best blend
  competition: PS S6E6 Predicting Stellar Class
  status: completed
  metric: balanced_accuracy_score
  model: 024 best blend postprocess
  created_at: '2026-06-08'
objective:
  summary: Apply class-wise bias search to 024 best blend OOF/test probabilities.
    Do not retrain. GALAXY bias is fixed to 0 and QSO/STAR biases are searched. Input
    npy files are read from /kaggle/input/datasets/mizushimatoshihiko/npy-files.
  success_criteria:
  - load 024 best blend OOF and test predictions from npy-files dataset
  - confirm raw 024 best blend OOF score
  - search class-wise bias on OOF
  - save adjusted OOF proba as npy
  - save adjusted test pred proba as npy
  - save biased submission
  - save bias vector and search results
  - update oof_registry
data:
  train_path: /kaggle/input/competitions/playground-series-s6e6/train.csv
  test_path: /kaggle/input/competitions/playground-series-s6e6/test.csv
  sample_submission_path: /kaggle/input/competitions/playground-series-s6e6/sample_submission.csv
  target_col: class
  id_col: id
  npy_dir: /kaggle/input/datasets/mizushimatoshihiko/npy-files
  raw_024_oof_path: /kaggle/input/datasets/mizushimatoshihiko/npy-files/oof_exp_20260608_024_seed_ensemble_and_blend_check_best_blend_proba.npy
  raw_024_pred_path: /kaggle/input/datasets/mizushimatoshihiko/npy-files/pred_exp_20260608_024_seed_ensemble_and_blend_check_best_blend_proba.npy
  use_original: false
reference:
  exp_id: exp_20260608_024_seed_ensemble_and_blend_check
  model: N_019_020_021_022_023 / hc_nonnegative_raw
  cv: 0.9694803109983217
  public_lb: 0.96958
  weights:
    019_blend_best: 0.1720919461492222
    020_blend_bias: 0.4147680653120452
    021_realmlp_seed777: 0.1520334427906098
    022_realmlp_seed2026: 0.12458465124038007
    023_realmlp_seed3407: 0.1365218945077428
bias_search:
  bias_space:
    GALAXY: fixed_0
    QSO: searched
    STAR: searched
  best_bias:
    GALAXY: 0.0
    QSO: 0.1555
    STAR: 0.1735
  raw_cv: 0.9694803109983217
  biased_cv: 0.9694982932369408
