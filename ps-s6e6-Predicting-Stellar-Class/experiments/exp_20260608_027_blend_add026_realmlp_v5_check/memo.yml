pairwise_correlation_findings:
  key_findings:
    - finding: >
        026と024のPearson相関は0.998117と高いが、
        Spearman相関は0.844631まで下がっており、完全な重複素材ではない。
        Argmax disagreementも約0.00749あり、024に対して補完余地がある。
    - finding: >
        026と020のPearson相関は0.997709、Spearman相関は0.847534。
        020とも高相関ではあるが、rank構造には差がある。
    - finding: >
        026と019のPearson相関は0.997262、Spearman相関は0.821950。
        019に対しても一定の違いはあるが、027 bestでは019より024/026/020構成が選ばれた。
    - finding: >
        026と015/017はPearson相関が0.9973〜0.9975程度、Spearman相関が0.817〜0.835程度。
        同じRealMLP系だが、v5 recipeはseed42/shared001系とはかなりrank構造が異なる。
    - finding: >
        026はbest blendで0.2619の重みを持ち、G_024_026でも0.2745の重みを持った。
        したがって026は単なる高相関重複素材ではなく、blend素材として有効。

