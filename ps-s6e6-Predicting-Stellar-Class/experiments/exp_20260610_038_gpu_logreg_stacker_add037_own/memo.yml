judgement:
  status: pending_public_lb
  reason: This is a self-owned GPU logistic regression stacker. Adoption depends on
    OOF CV, Public LB, and whether the stacker improves over the current 033/036 public-confirmed
    references.
  current_reference:
    033_cv: 0.9700400336552478
    033_public_lb: 0.97043
    036_gpu_logreg_add035_cv: 0.9700674063284508
    036_gpu_logreg_add035_public_lb: 0.97037
    031_cv: 0.9700333620193362
    031_public_lb: 0.97043
  risk_notes:
  - Base blend assets such as 029/031 may themselves contain OOF-optimized HC weights.
  - Bias search is optimized on OOF labels and should be validated by Public LB before
    promotion.
  - Do not treat in-sample-looking meta improvements as final without LB confirmation.
  next_action:
  - Submit submission_raw and submission_tuned if both are generated and quota allows,
    otherwise submit the default best submission first.
  - Record Public LB for raw/tuned/default submission and compare against 033/036
    GPU LogReg add035/034default.
  - If Public LB improves 033/036 GPU LogReg add035, promote 038 to current best.
  - If Public LB does not improve, keep 033 as primary and 036 GPU LogReg add035 as
    stacker backup.


