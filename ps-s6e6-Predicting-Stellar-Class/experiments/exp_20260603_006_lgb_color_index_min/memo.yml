experiment:
  id: exp_20260603_006_lgb_color_index_min
  title: LightGBM color index minimal FE
  competition: PS S6E6 Predicting Stellar Class
  status: completed
  metric: balanced_accuracy_score
  model: LightGBM
  created_at: '2026-06-03'
objective:
  summary: Test minimal astronomical color-index features on top of the 002 LightGBM
    strict raw baseline. Use only competition train/test. No original dataset, no
    bias search, and no parameter tuning.
  success_criteria:
  - save oof proba
  - save test pred proba
  - save cv_result
  - save submission
  - save feature importance
  - update oof_registry
  - compare CV against 002 LightGBM strict raw baseline
data:
  train_path: /kaggle/input/competitions/playground-series-s6e6/train.csv
  test_path: /kaggle/input/competitions/playground-series-s6e6/test.csv
  sample_submission_path: /kaggle/input/competitions/playground-series-s6e6/sample_submission.csv
  train_shape:
  - 577347
  - 12
  test_shape:
  - 247435
  - 11
  target_col: class
  id_col: id
  use_original: false
features:
  feature_family: color_index_min
  base_numeric_cols:
  - alpha
  - delta
  - u
  - g
  - r
  - i
  - z
  - redshift
  color_features:
  - u_g
  - g_r
  - r_i
  - i_z
  - u_r
  - g_i
  - r_z
  categorical_cols:
  - spectral_type
  - galaxy_population
  feature_cols:
  - alpha
  - delta
  - u
  - g
  - r
  - i
  - z
  - redshift
  - u_g
  - g_r
  - r_i
  - i_z
  - u_r
  - g_i
  - r_z
  - spectral_type
  - galaxy_population
  notes: 'Adds only color-index differences: u-g, g-r, r-i, i-z, u-r, g-i, r-z. No
    redshift bin, no ratio, no original prior, no snap.'
cv:
  scheme: StratifiedKFold
  n_splits: 5
  shuffle: true
  random_state: 42
  score: 0.9570463209115138
  delta_vs_002_lgb_strict_raw: 0.00013998081126354034
  reference_002_cv: 0.9569063401002502
  fold_scores:
  - fold: 1
    balanced_accuracy: 0.9562031819787622
    best_iteration: 659
    n_train: 461877
    n_valid: 115470
  - fold: 2
    balanced_accuracy: 0.9579469637084644
    best_iteration: 630
    n_train: 461877
    n_valid: 115470
  - fold: 3
    balanced_accuracy: 0.9571543542633482
    best_iteration: 592
    n_train: 461878
    n_valid: 115469
  - fold: 4
    balanced_accuracy: 0.9567546148540185
    best_iteration: 588
    n_train: 461878
    n_valid: 115469
  - fold: 5
    balanced_accuracy: 0.957172514282456
    best_iteration: 717
    n_train: 461878
    n_valid: 115469
  fold_std: 0.0005717917633995841
params:
  objective: multiclass
  num_class: 3
  boosting_type: gbdt
  n_estimators: 5000
  learning_rate: 0.03
  num_leaves: 127
  max_depth: -1
  min_child_samples: 40
  subsample: 0.85
  subsample_freq: 1
  colsample_bytree: 0.85
  reg_alpha: 0.0
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1
  verbosity: -1
  force_col_wise: true
outputs:
  oof_proba: oof_lgb_color_index_min_proba.npy
  pred_proba: pred_lgb_color_index_min_proba.npy
  oof_csv: oof_lgb_color_index_min.csv
  pred_csv: pred_lgb_color_index_min.csv
  submission: submission_lgb_color_index_min.csv
  cv_result: cv_result.json
  feature_importance: feature_importance.csv
  registry: oof_registry.csv
judgement:
  status: pending_public_lb
  reason: This is the first minimal FE experiment after raw baselines. Adoption depends
    on CV delta vs 002, Public LB, and later OOF correlation.
  next_action:
  - Submit submission_lgb_color_index_min.csv
  - Record Public LB
  - If CV/LB improves, transfer same FE to XGBoost
  - If it does not improve, do not expand color FE blindly
  - Do not start Optuna yet

result:
  status: completed
  cv:
    metric: balanced_accuracy_score
    score: 0.9570463209115138
    reference_002_lgb_strict_raw_cv: 0.9569063401002502
    delta_vs_002_lgb_strict_raw: 0.00013998081126354034
    fold_scores:
      - fold: 1
        balanced_accuracy: 0.9562031819787622
        best_iteration: 659
        n_train: 461877
        n_valid: 115470
      - fold: 2
        balanced_accuracy: 0.9579469637084644
        best_iteration: 630
        n_train: 461877
        n_valid: 115470
      - fold: 3
        balanced_accuracy: 0.9571543542633482
        best_iteration: 592
        n_train: 461878
        n_valid: 115469
      - fold: 4
        balanced_accuracy: 0.9567546148540185
        best_iteration: 588
        n_train: 461878
        n_valid: 115469
      - fold: 5
        balanced_accuracy: 0.957172514282456
        best_iteration: 717
        n_train: 461878
        n_valid: 115469
    fold_score_min: 0.9562031819787622
    fold_score_max: 0.9579469637084644
    fold_score_range: 0.0017437817297022
    interpretation: >
      CVは002 LightGBM strict raw baselineから+0.000140改善。
      fold別にも大きな崩れはなく、OOF上ではcolor index最小追加がわずかに効いている。
      ただし改善幅は小さく、CVだけで採用するには弱い。

  public_lb:
    score: 0.95663
    reference_002_lgb_strict_raw_public_lb: 0.95800
    delta_vs_002_lgb_strict_raw_public_lb: -0.00137
    submission: submission_lgb_color_index_min.csv
    interpretation: >
      Public LBは0.95663で、002 LightGBM strict raw baselineの0.95800を明確に下回った。
      CVは微増したがPublicに変換されていないため、006を単体主力へ昇格させるべきではない。
      現時点ではCV過適合またはPublic分布との相性悪化を疑う。

model:
  family: LightGBM
  estimator: LGBMClassifier
  role: main_axis_fe_candidate
  use_original: false
  use_fe: true
  fe_family: color_index_min
  use_bias_search: false
  params:
    objective: multiclass
    num_class: 3
    boosting_type: gbdt
    n_estimators: 5000
    learning_rate: 0.03
    num_leaves: 127
    max_depth: -1
    min_child_samples: 40
    subsample: 0.85
    subsample_freq: 1
    colsample_bytree: 0.85
    reg_alpha: 0.0
    reg_lambda: 1.0
    random_state: 42
    n_jobs: -1
    verbosity: -1
    force_col_wise: true

features:
  feature_family: color_index_min
  base_numeric_cols:
    - alpha
    - delta
    - u
    - g
    - r
    - i
    - z
    - redshift
  color_features:
    - u_g
    - g_r
    - r_i
    - i_z
    - u_r
    - g_i
    - r_z
  categorical_cols:
    - spectral_type
    - galaxy_population
  feature_cols:
    - alpha
    - delta
    - u
    - g
    - r
    - i
    - z
    - redshift
    - u_g
    - g_r
    - r_i
    - i_z
    - u_r
    - g_i
    - r_z
    - spectral_type
    - galaxy_population
  notes: >
    002のstrict raw featuresに、測光値の差分であるcolor index 7本を最小追加。
    original dataset、redshift bin、ratio系、snap、bias searchは未使用。
    パラメータは002 LightGBM strict raw baselineと同一で、FE効果のみを確認した。

target:
  class_names:
    - GALAXY
    - QSO
    - STAR
  label_mapping:
    GALAXY: 0
    QSO: 1
    STAR: 2
  submission_format: single_column_class_label

outputs:
  oof_proba: oof_lgb_color_index_min_proba.npy
  pred_proba: pred_lgb_color_index_min_proba.npy
  oof_csv: oof_lgb_color_index_min.csv
  pred_csv: pred_lgb_color_index_min.csv
  submission: submission_lgb_color_index_min.csv
  cv_result: cv_result.json
  fold_scores: fold_scores.csv
  feature_importance: feature_importance.csv
  feature_importance_by_fold: feature_importance_by_fold.csv
  registry: oof_registry.csv

comparison:
  against_002_lgb_strict_raw:
    lgb_002_cv: 0.9569063401002502
    lgb_002_public_lb: 0.95800
    lgb_006_cv: 0.9570463209115138
    lgb_006_public_lb: 0.95663
    cv_delta_006_minus_002: 0.00013998081126354034
    lb_delta_006_minus_002: -0.00137
    interpretation: >
      006はCVでは002をわずかに上回ったが、Public LBでは大きく悪化した。
      このパターンはS6E4/S6E5で警戒していた「CVだけ高い候補」に近い。
      006をmainlineに採用するには、OOF相関、fold別class recall、別seed確認、bias search後の挙動を確認する必要がある。

judgement:
  status: hold_risky_cv_only
  decision: >
    006は単体主力には昇格しない。
    CV 0.957046で002より微増したが、Public LB 0.95663で002の0.95800を下回った。
    color index最小追加はOOF上では効いているように見えるが、Public変換が悪いためhold扱いとする。
  reason: >
    改善幅がCVで+0.000140と小さい一方、LBでは-0.00137と大きく悪化した。
    この時点でcolor indexをさらに増やす、またはXGBへ即transferするのは危険。
    まず006のどのclass recallが変化したか、002とのOOF相関と誤分類差分を確認すべき。
  caveat: >
    006が完全に無価値とは限らない。
    002とのOOF相関が少しでも下がっており、blendで補助的に効く可能性は残る。
    ただし、単体提出候補としては002より明確に劣る。
  next_action:
    - 002と006のOOF相関・class recall差分・誤分類差分を確認する
    - 006をXGBへ即移植するのは保留する
    - color index拡張を連続投入しない
    - 次は002 rawに対するbias search、または002/004/006の軽いblend比較を検討する
    - original利用やOptunaはまだ後回し
