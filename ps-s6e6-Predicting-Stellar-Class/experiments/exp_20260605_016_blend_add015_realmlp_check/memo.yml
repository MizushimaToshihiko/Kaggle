judgement:
  status: completed_pending_manual_review
  initial_view: 015 is currently stronger than 014 as a single model. The key question
    is whether 014 contributes enough complementary error structure to improve a safe
    blend. In-sample meta rows are diagnostic only.
  next_action:
  - Review individual_scores.csv
  - Review pairwise_oof_correlation.csv, especially 014 vs 015
  - Review safe rows in blend_diagnostics.csv
  - Submit best safe blend if it improves over 015 enough
  - If best safe blend beats 015, run bias search on 016 best blend
  - If not, run bias search on 015 single RealMLP

result:
  status: completed
  purpose: >
    015 shared001 RealMLP as-is を、既存の013/014 blend branchに追加し、
    015単体を超える安全なblend候補が作れるかを確認した。
    あわせて、012/013/014/015間のOOF相関、誤分類重なり、blend weightを確認した。

