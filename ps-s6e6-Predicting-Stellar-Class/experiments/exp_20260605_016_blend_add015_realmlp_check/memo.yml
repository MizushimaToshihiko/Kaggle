role_judgement:
  current_best:
    exp_id: exp_20260605_015_shared001_realmlp_as_is
    cv: 0.9681693449222352
    public_lb: 0.96977
    status: keep_current_best_single
    reason: >
      016 best safe blendはCVで015をわずかに上回ったが、Public LBで015に負けた。
      現時点のcurrent bestは015単体のまま維持する。

  hold_candidate:
    exp_id: exp_20260605_016_blend_add015_realmlp_check
    candidate: G_013_015__hc_nonnegative_raw
    cv: 0.968246781866073
    public_lb: 0.96948
    status: hold_cv_up_lb_down
    reason: >
      OOF上は015単体より改善しているため、完全dropではなくhold。
      ただしPublic変換が悪いため、提出候補としては015単体より下。

  previous_best_blend_reference:
    exp_id: exp_20260605_014_bias_search_on_013_best_blend
    cv: 0.9660085788215015
    public_lb: 0.96703
    status: reference_only
    reason: >
      015導入後は主力ではない。
      ただし014/013系は015とはrecallバランスが違うため、後続のbias探索やfinal候補比較の参考には残す。

  drop_active_012:
    exp_id: exp_20260605_012_lgb010_bias_search
    decision: drop_active_blend_material
    reason: >
      016のE_012_014_015では012の重みが0。
      015導入後、012をactive blend素材として使う理由は薄い。

  use_meta_rows:
    decision: do_not_use_as_final
    reason: >
      LogReg/Ridge/ElasticNet rowsはin-sample meta screeningであり、
      nested OOFではない。
      final OOF資産として使うべきではない。

judgement:
  status: completed
  decision: >
    016 best safe blendはCV上では015単体をわずかに上回ったが、
    Public LBは0.96948で、015単体の0.96977を下回った。
    よって016はcurrent bestには昇格せず、hold/reference扱いとする。
    現時点のcurrent bestは015 shared001 RealMLP as-isのまま。
  key_findings:
    - 015単体が依然としてPublic最強
    - 013+015のHCがOOF上のbest safe blend
    - 014+015もOOF上は近いが、追加提出優先度は低い
    - 012は015導入後のblendではほぼ不要
    - CV微改善がPublic LBに変換されなかった
    - 016はCV-only寄りのhold候補
  caveat: >
    016のbest safe blendはCV差が+0.000077と非常に小さく、
    Public LBでは-0.00029悪化した。
    これはOOF上のHC重み最適化がPublicに対して少し過適合した可能性を示す。
    この結果を理由に013/014系を完全に捨てる必要はないが、
    015単体より優先する根拠はない。
  next_action:
    - 015単体へのbias searchを優先する
    - 016 best blendへのbias searchは優先度を下げる
    - 016のOOF/predはnpy-filesへ追加してもよいが、current best素材ではなくhold扱い
    - 014/013系はfinal候補比較用のreferenceとして保持する
    - 次にshared001 RealMLPの安全な派生、または015のbias/postprocessを検討する

