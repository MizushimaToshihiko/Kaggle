  key_findings:
    - pair: 014_blend_bias__015_realmlp_shared001
      pearson_flat_proba: 0.9941667754729456
      spearman_flat_proba: 0.9163080998783079
      argmax_agreement: 0.9859373998652456
      argmax_disagreement: 0.014062600134754315
      error_jaccard: 0.6594513501928847
      interpretation: >
        014と015は確率のPearson相関はかなり高いが、
        rank相関と誤分類重なりは完全一致ではない。
        014はGALAXY recall寄り、015はQSO/STAR recall寄りで、
        OOF上は補完余地が残っていた。

    - pair: 013_blend_best__015_realmlp_shared001
      pearson_flat_proba: 0.9933102136251177
      spearman_flat_proba: 0.9134634812196795
      argmax_agreement: 0.9850107474361173
      argmax_disagreement: 0.014989252563882725
      error_jaccard: 0.6349431818181818
      interpretation: >
        013と015も高相関だが、014よりわずかに誤差重なりが低い。
        016のbest safe blendでは014ではなく013が採用された。

    - pair: 013_blend_best__014_blend_bias
