pairwise_correlation:
  key_findings:
  - pair: 010_shared002_lgb__012_lgb010_bias
      pearson_flat_proba: 0.9998115474220978
      spearman_flat_proba: 0.9992131701918003
      argmax_agreement: 0.9971386358637007
      argmax_disagreement: 0.0028613641362993138
      error_jaccard: 0.9223880597014925
      interpretation: >
        012は010のbias後処理であるため、010と012はほぼ同一方向の予測。
        raw 010とbias済み012を両方入れても多様性はほぼ増えない。
        実際に013 best blendではraw 010の重みは0となり、012が採用された。
      
  - pair: 007_lgb002_bias__012_lgb010_bias
      pearson_flat_proba: 0.9860562613239593
      spearman_flat_proba: 0.9699325690783986
      argmax_agreement: 0.9768510098779417
      error_jaccard: 0.494985590778098
      interpretation: >
        012と007は相関が一定程度下がっており、007は012の補助として引き続き有効。
        013 best blendでも007には約17.3%の重みが入った。
  
  - pair: 006_lgb_color_min__012_lgb010_bias
      pearson_flat_proba: 0.9839239455547801
      spearman_flat_proba: 0.9674040787901154
      argmax_agreement: 0.9750323462319888
      error_jaccard: 0.4662347934164438
      interpretation: >
        006は単体では弱いが、012との相関が比較的低く、
        013 best blendでも約17.3%の重みが入った。
        単体候補ではなく、blend補助素材として保持する価値がある。
  
  - pair: 004_xgb_raw__012_lgb010_bias
      pearson_flat_proba: 0.9841305626029867
      spearman_flat_proba: 0.9599222741096646
      argmax_agreement: 0.9749907767772241
      error_jaccard: 0.4681760251892946
      interpretation: >
        004は011 best blendでは重み0だったが、013 best blendでは約7.8%の重みが入った。
        004は主力ではないが、012中心blendでは少量補助として残す価値がある。

