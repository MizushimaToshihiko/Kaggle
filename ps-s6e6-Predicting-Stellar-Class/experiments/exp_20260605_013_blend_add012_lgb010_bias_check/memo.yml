role_judgement:
  current_best:
    exp_id: exp_20260605_013_blend_add012_lgb010_bias_check
    candidate: C_keep_010_012_007_004_006__hc_nonnegative_raw
    cv: 0.9648069017992585
    public_lb: 0.96562
    status: current_best_mainline_blend
    reason: >
      013 best blendは011 best blendをCV/LBともに更新。
      実質構成は012+007+004+006で、raw 010は重み0。
      現時点の最良提出候補として採用する。
  
  replace_010_with_012:
    decision: true
    reason: >
      010と012は高相関で、013 bestではraw 010の重みが0。
      active blend素材としてはraw 010より012を優先する。
      raw 010はreference/stable候補として残す。
  
  keep_010_and_012_together:
    decision: false
    reason: >
      010と012を両方入れたbest setでも、010の重みは0。
      両方入れるより、012をraw 010の置換として扱う方がよい。
  
  keep_012:
    decision: keep_mainline_material
    reason: >
      012は単体でも010を上回り、013 best blendの中心重みを持つ。
      今後のblendでは012を主素材にする。
  
  keep_007:
    decision: keep_blend_auxiliary
    reason: >
      013 bestで約17.3%の重みを持つ。
      007は旧主力単体ではなく、012系blendの補助素材として有効。
  
  keep_006:
    decision: keep_blend_auxiliary
    reason: >
      013 bestで約17.3%の重みを持つ。
      006は単体では弱いが、blend補助素材として引き続き有効。
  
  keep_004:
    decision: hold_light_auxiliary
    reason: >
      013 bestで約7.8%の重みが入った。
      ただしB/E構成との差は小さく、004がPrivateで効くかは不明。
      active主力ではなく、軽い補助候補として扱う。
  
  drop_002_active:
    decision: true
    reason: >
      012/013導入後、002 rawをactive blend素材として使う理由は薄い。
      reference扱いで十分。
  
  drop_003_active:
    decision: true
    reason: >
      003 Cat rawは単体性能が低く、013でも有効な役割がない。
      active候補から外す。

judgement:
  status: completed
  decision: >
    013 best blendである C_keep_010_012_007_004_006 / hc_nonnegative_raw を
    現時点のcurrent bestとして採用する。
    Public LBは0.96562で、011 best blendの0.96523を更新した。
    raw 010は重み0となったため、今後の主素材は012 bias済み010へ移行する。
  key_findings:
    - 012はraw 010を置換する
    - raw 010と012を両方入れる価値は低い
    - 013 bestは実質012+007+004+006
    - 007と006はblend補助として継続
    - 004は少量補助として復活したが、必須ではない
    - 002/003はactive候補から外す
    - 013 bestは011 bestをPublicでも更新した
  caveat: >
