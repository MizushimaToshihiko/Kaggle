comparison:
  against_015_realmlp_as_is:
    exp_id: exp_20260605_015_shared001_realmlp_as_is
    cv_015: 0.9681693449222352
    public_lb_015: 0.96977
    cv_021: 0.9682532829014837
    public_lb_021: 0.96926
    cv_delta_021_minus_015: 0.0000839379792485
    lb_delta_021_minus_015: -0.00051
    interpretation: >
      021は015をCVではわずかに上回ったが、Public LBでは明確に下回った。
      単体性能としては015の方が優先。
      021はseed ensemble素材として評価する。

  against_017_realmlp_bias:
    exp_id: exp_20260606_017_bias_search_on_015_realmlp
    cv_017: 0.9683022653955233
    public_lb_017: 0.96985
    cv_021: 0.9682532829014837
    public_lb_021: 0.96926
    cv_delta_021_minus_017: -0.0000489824940396
    lb_delta_021_minus_017: -0.00059
    interpretation: >
      021は017にCV/LBともに届かない。
      017は引き続きRealMLP bias backupとして優位。

  against_019_public_current_best:
    exp_id: exp_20260607_019_blend_add018_xgb_check
    cv_019: 0.968872315017554
    public_lb_019: 0.97000
    cv_021: 0.9682532829014837
    public_lb_021: 0.96926
    cv_delta_021_minus_019: -0.0006190321160703
    lb_delta_021_minus_019: -0.00074
    interpretation: >
      021単体は019 current best blendには届かない。
      019を置換する候補ではない。

  against_020_cv_trusted_attack:
    exp_id: exp_20260607_020_bias_search_on_019_best_blend
    cv_020: 0.9692240443617589
    public_lb_020: 0.96969
    cv_021: 0.9682532829014837
    public_lb_021: 0.96926
    cv_delta_021_minus_020: -0.0009707614602752
    lb_delta_021_minus_020: -0.00043
    interpretation: >
      021単体は020 CV-trusted attackにも届かない。
      ただし020はpostprocess/HC系であり、021は単体seed variantなので役割が異なる。

role_judgement:
  current_public_best:
    exp_id: exp_20260607_019_blend_add018_xgb_check
    public_lb: 0.97000
    status: keep_public_current_best
    reason: >
      021はPublic LBで019に届かない。
      current public bestは019のまま。

  cv_trusted_attack:
    exp_id: exp_20260607_020_bias_search_on_019_best_blend
    cv: 0.9692240443617589
    public_lb: 0.96969
    status: keep_cv_trusted_attack
    reason: >
      020はCV最高候補。
      021は020にCV/LBともに届かない。

  seed_variant_material:
    exp_id: exp_20260607_021_shared001_realmlp_seed777
    cv: 0.9682532829014837
    public_lb: 0.96926
    status: hold_for_seed_ensemble_and_blend_check
    reason: >
      021単体は提出候補として弱いが、015とはseed差を持つRealMLP素材。
      019/020/017/015との相関・blendで有効か確認するまではdropしない。

  stable_single_backup:
    exp_id: exp_20260605_015_shared001_realmlp_as_is
    cv: 0.9681693449222352
    public_lb: 0.96977
    status: keep_stable_single_backup
    reason: >
      015は021よりPublic LBが高く、biasやHC blendを含まない素直な単体RealMLP。
      Private耐性候補として引き続き保持する。

judgement:
  status: completed
  decision: >
    021 shared001 RealMLP seed777 は単体提出候補としては不採用。
    CVは0.968253で015をわずかに上回ったが、Public LBは0.96926で015/017/019/020を下回った。
    ただしRealMLP seed variantとして、後続のseed ensembleおよびblend確認用素材として保持する。
  key_findings:
    - 021はCV上では015 as-isをわずかに上回った
    - Public LBでは015/017/019/020に届かなかった
    - 単体提出候補ではない
    - seed ensemble素材としてはまだ価値がある
    - cv_result上のparams.random_stateが42のままなのでseed反映状況の確認が必要
  caveat: >
    021はseed777実験として実行されているが、cv_result.json上ではparams.random_stateが42と記録されている。
    これはNotebook変換時にCONFIG内のrandom_stateが42固定で残った可能性を示す。
    foldやLBは015と完全一致していないため完全に同一実験ではないと考えられるが、
    seed variantとしての再現性を担保するには、Notebook内のseed設定を必ず再点検する必要がある。
  next_action:
    - 021のOOF/pred probaをnpy-files datasetへ追加する
    - 022以降のseed variantを作る前に、seed反映箇所を監査する
    - 019/020/017/015/021の相関・blend checkを実施する
    - 021がblendで重みを持たなければactive候補から外す

seed_audit:
  status: partially_seed_changed
  finding: >
    Notebook内ではセル2で一度seed_everything(42)が実行されているが、
    セル3でSEED=777としてrandom/np/torch/cuda seedを再設定している。
    StratifiedKFold(random_state=SEED) と TargetEncoder(random_state=SEED) も777を参照している。
    一方で、CONFIG["random_state"] は42のまま残っており、
    RealMLP_TD_Classifier(**CONFIG) に渡されるrandom_stateは42である。
  interpretation: >
    021は完全なseed777版ではなく、fold/TargetEncoder/global seedは777、
    RealMLP CONFIG random_stateは42の混合seed実験。
    ただし015とはCV/LBが一致していないため、seed差素材としては有効。
  action: >
    022以降ではCONFIG["random_state"]をSEEDに変更し、
    seed variantとしての実験定義を明確化する。

