result:
  status: completed
  purpose: >
    015 shared001 RealMLP as-is を元に、seed variantとして021 seed777を実行した。
    目的は、017/019/020とは異なるseed由来の揺れを持つRealMLP素材を作成し、
    後続のseed ensembleおよびblend確認に使えるOOF/pred probaを得ること。

