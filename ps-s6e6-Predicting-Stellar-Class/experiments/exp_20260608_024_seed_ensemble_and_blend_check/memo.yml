pairwise_correlation_findings:
  key_findings:
    - finding: >
        RealMLP seed variants同士のPearson相関は非常に高いが、
        Spearman相関は0.88〜0.90程度まで下がる組み合わせがあり、
        完全な重複素材ではない。
    - finding: >
        019と020はPearson 0.999766、Spearman 0.997020、error_jaccard 0.8948で非常に近い。
        020は019のbias後処理であるため当然だが、両者を同時に使うと多様性は限定的。
    - finding: >
        018 XGBはRealMLP系と比較してSpearmanやerror_jaccardが低く、
        単体性能は弱いが補助素材としての異質性がある。
    - finding: >
        021/022/023は019/020に対しても非ゼロ重みを持つため、
        seed variantsとしての材料価値は確認できた。

