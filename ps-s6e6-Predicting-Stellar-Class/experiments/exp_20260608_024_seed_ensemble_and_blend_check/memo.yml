judgement:
  status: completed
  decision: >
    024 best blendはCV 0.969480で現時点最高CVとなったが、
    Public LBは0.96958で019/020/017/015を下回った。
    したがって024をPublic current bestには昇格しない。
    ただし、021/022/023のRealMLP seed variantsはbest blendで非ゼロ重みを持ち、
    seed ensemble素材としての価値は確認できた。
    024はCV-trusted候補として保持し、019はPublic-confirmed current bestとして維持する。
  key_findings:
    - RealMLP seed variants 021/022/023はblendで非ゼロ重みを持った
    - 純粋seed ensembleも015単体よりCVを大きく改善した
    - best safe blendは019/020/021/022/023のHC blend
    - 024 bestはCV最高だがPublic LBは伸びなかった
    - 019はPublic current bestのまま
    - 020はPublicでは024より高く、CV-trusted backupとして残す
    - 追加seedを量産する前に、024へのbias search可否を判断する段階
  caveat: >
    024はHCによるOOF最適化であり、かつ019/020とseed variantsの近い系列を混ぜている。
    CVは改善しているが、Public LBは低下しているため、OOF overfitの可能性がある。
    ただしPublicだけで024を捨てるのも早い。
    019をPublic-confirmed、024をCV-trustedとして役割分けして保持するのが妥当。
  next_action:
    - 024のOOF/pred probaをnpy-files datasetへ追加する
    - 025として024 best blendにbias searchをかけるか検討する
    - ただし020/024と連続でPublicが下がっているため、bias searchは攻め候補扱いに限定する
    - 追加RealMLP seedの量産は一旦停止する
    - 次に材料を増やすなら、RealMLP seed追加より別family/別特徴/別shared codeを優先する- If seed variants get zero/near-zero weight, stop making more seed variants

