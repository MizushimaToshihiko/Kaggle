experiment:
  id: exp_20260611_042_realmlp_v5_seed2026_foldvariant
  title: RealMLP v5 seed2026/fold variant
  competition: PS S6E6 Predicting Stellar Class
  status: completed
  metric: balanced_accuracy_score
  model: RealMLP
  created_at: '2026-06-11'
objective:
  summary: Create a RealMLP v5 seed2026/fold variant based on 026 and save blend-ready
    OOF/test predictions. This is intended as a lower-correlation RealMLP-family material
    for the next GPU LogReg stacker.
  success_criteria:
  - run RealMLP v5 5-fold CV with seed2026/foldvariant settings
  - save OOF proba npy with exp_id in filename
  - save test pred proba npy with exp_id in filename
  - save submission
  - save cv_result.json
  - save fold_scores.csv
  - save feature_info.json
  - save oof_registry.csv
data:
  data_dir: /kaggle/input/competitions/playground-series-s6e6
  target_col: class
  id_col: id
  use_original: false
cv:
  scheme: StratifiedKFold
  n_splits: 5
  shuffle: true
  random_state: 2026
  fold_seed_formula: SEED + fold * 17
  score: 0.9689482884928097
  fold_scores:
  - fold: 1
    fold_seed: 2043
    balanced_accuracy: 0.9684867825424851
    n_train: 461877
    n_valid: 115470
    n_features: 40
  - fold: 2
    fold_seed: 2060
    balanced_accuracy: 0.9685334210858695
    n_train: 461877
    n_valid: 115470
    n_features: 40
  - fold: 3
    fold_seed: 2077
    balanced_accuracy: 0.9685737506987668
    n_train: 461878
    n_valid: 115469
    n_features: 40
  - fold: 4
    fold_seed: 2094
    balanced_accuracy: 0.9699424865381383
    n_train: 461878
    n_valid: 115469
    n_features: 40
  - fold: 5
    fold_seed: 2111
    balanced_accuracy: 0.9692050381674036
    n_train: 461878
    n_valid: 115469
    n_features: 40
  per_class_recall:
    recall_GALAXY: 0.9584693228780333
    recall_QSO: 0.9765414920225707
    recall_STAR: 0.971834050577825
model:
  family: RealMLP
  source: exp_20260608_026_realmlp_v5_as_is
  role: realmlp_v5_seed2026_foldvariant_material_for_stacker
  use_original: false
  use_fe: true
  use_bias_search: false
  config:
    n_ens: 8
    embed_dim: 7
    onehot_thresh: 10
    hidden_dims:
    - 512
    - 512
    - 512
    dropout: 0.052
    p_drop_sched: expm4t
    activation: <class 'torch.nn.modules.activation.GELU'>
    add_front_scale: true
    pbld_hidden_dim: 16
    pbld_out_dim: 5
    pbld_freq_scale: 2.33
    pbld_activation: <class 'torch.nn.modules.activation.PReLU'>
    pbld_lr_factor: 0.115
    lr: 0.01
    mom: 0.9
    sq_mom: 0.98
    lr_sched: flat_cos
    flat_ratio: 0.2
    first_layer_lr_factor: 1.0
    first_layer_wd_factor: 0.1
    lr_scale_mult: 10.0
    lr_bias_mult: 0.1
    weight_decay: 0.014
    wd_scale_mult: 0.1
    wd_bias_mult: 0.5
    grad_clip: 1.0
    class_weight_power: 0.0
    class_weight_multipliers: null
    sample_weight_power: 0.0
    loss_prior_power: 1.075
    focal_gamma: 0.0
    eval_class_multipliers: null
    ls_eps: 0.035
    ls_eps_sched: cos
    tfms:
    - median_center
    - robust_scale
    epochs: 6
    train_bs: 256
    eval_bs: 10240
    numeric_noise_std: 0.0
    ema_decay: 0.998
    verbosity: 2
    use_early_stopping: false
    early_stopping_additive_patience: 10
    early_stopping_multiplicative_patience: 1
    device: cuda
    random_state: 2026
