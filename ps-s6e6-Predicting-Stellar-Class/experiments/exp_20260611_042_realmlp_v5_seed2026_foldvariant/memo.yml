comparison_to_current_best:
  current_best:
    exp_id: exp_20260611_040_gpu_logreg_stacker_add039_own
    cv: 0.9702017877238539
    public_lb: 0.97069
  exp_042:
    cv: 0.9689482884928097
    public_lb: 0.96943
  judgement: >
    042 is clearly below the current best as a standalone submission. Its only
    remaining value is as an auxiliary RealMLP-family input for the next learned
    stacker check.

submission_slot_decision:
  promote_to_slot: false
  reason: >
    Standalone CV and Public LB are both below 026 and far below the current
    040 stacker. Do not use 042 directly as a final submission.
  current_recommended_slots:
    slot_1:
      exp_id: exp_20260611_040_gpu_logreg_stacker_add039_own
      cv: 0.9702017877238539
      public_lb: 0.97069
      role: current_best_cv_and_public
    slot_2_private_hedge:
