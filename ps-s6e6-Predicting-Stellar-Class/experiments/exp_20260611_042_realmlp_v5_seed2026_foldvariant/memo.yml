judgement:
  status: completed
  keep_hold_drop: keep_as_optional_realmlp_variant_material
  role: realmlp_v5_seed_fold_variant_for_stacker_check
  priority: low_to_medium
  not_for_standalone_submission: true
  reason: >
    042 was designed as a lower-correlation RealMLP v5 variant, but the standalone
    result is weaker than 026 on both CV and Public LB. It should not be promoted
    directly. However, because the OOF/pred files were successfully created and the
    recipe differs from 026 by seed/fold/regularization, it can still be tested once
    in the GPU LogReg stacker.
  next_action:
    - Keep 042 OOF/pred files in the asset pool.
    - Run 043 GPU LogReg stacker add042 only if compute/time cost is acceptable.
    - Compare 043 against 040 CV 0.9702017877238539 and Public LB 0.97069.
    - If 043 does not improve, deprioritize further RealMLP v5 seed/fold variants.
    - The next higher-priority direction after this is likely shared001 updated variant or XGB-family variant, depending on available GPU time.
