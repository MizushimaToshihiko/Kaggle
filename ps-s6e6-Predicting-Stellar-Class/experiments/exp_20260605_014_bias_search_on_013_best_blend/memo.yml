experiment:
  id: exp_20260605_014_bias_search_on_013_best_blend
  title: Bias search on 013 best blend
  competition: PS S6E6 Predicting Stellar Class
  status: completed
  metric: balanced_accuracy_score
  model: 013 best blend postprocess
  created_at: '2026-06-05'
objective:
  summary: Apply class-wise bias search to 013 best blend OOF/test probabilities.
    Do not retrain. GALAXY bias is fixed to 0 and QSO/STAR biases are searched. Input
    npy files are read from /kaggle/input/datasets/mizushimatoshihiko/npy-files.
  success_criteria:
  - load 013 best blend OOF and test predictions from npy-files dataset
  - confirm raw 013 best blend OOF score
  - search class-wise bias on OOF
  - save adjusted OOF proba as npy
  - save adjusted test pred proba as npy
  - save biased submission
  - save bias vector and search results
  - update oof_registry
