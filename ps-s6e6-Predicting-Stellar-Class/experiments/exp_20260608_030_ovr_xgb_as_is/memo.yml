judgement:
  status: completed_low_priority_material
  keep_hold_drop: hold_for_optional_corr_only
  role: weak_xgb_ovr_family_material
  priority: low
  reason: >
    The experiment successfully produced an XGB one-vs-rest OOF/pred source distinct from 018,
    but both CV and Public LB are too low. The main weakness is STAR recall.
    It may still be useful only if OOF correlation against 029/028/018 is unusually low,
    but the prior probability of receiving meaningful blend weight is low.
  not_for_submission_slot: true
  do_not_bias_search: true
  next_action:
    - Add OOF/pred npy to npy-files dataset only if storage management is not an issue.
    - Optionally include 030 in the next correlation screen against 018, 019, 027, 028, 029.
