  title: shared001 RealMLP as-is
  competition: PS S6E6 Predicting Stellar Class
  status: completed
  metric: balanced_accuracy_score
  model: RealMLP_TD_Classifier
  created_at: '2026-06-05'
objective:
  summary: Reproduce shared001 RealMLP as-is and save OOF/pred probabilities with
    exp_id in filenames for later correlation and blend checks.
  success_criteria:
  - run shared001 RealMLP as-is
  - save OOF proba npy with exp_id in filename
  - save test pred proba npy with exp_id in filename
  - save submission
  - save cv_result
  - save fold_scores
  - update oof_registry
