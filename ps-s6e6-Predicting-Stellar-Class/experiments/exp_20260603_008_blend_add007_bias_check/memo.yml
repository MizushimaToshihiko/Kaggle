pairwise_correlation:
  key_findings:
    - finding: 002 raw and 007 biased are almost identical.
      pair: 002_lgb_raw__007_lgb002_bias
      pearson_flat_proba: 0.9999037242607912
      spearman_flat_proba: 0.9998068686223168
      argmax_agreement: 0.9977587135639399
      argmax_disagreement: 0.0022412864360601163
      error_jaccard: 0.9322688098133559
      interpretation: >
        007は002のclass bias後処理なので、予測確率・argmax・誤分類集合がほぼ同じ。
        002 rawと007 biasedを両方blendに入れても、多様性はほぼ増えない。
        007が002を置換する、という扱いが妥当。

    - finding: 004 XGB is the most plausible auxiliary after 007, but still high correlation.
      pair: 004_xgb_raw__007_lgb002_bias
      pearson_flat_proba: 0.9978391462266669
      spearman_flat_proba: 0.9896430665058789
      argmax_agreement: 0.9922386363833189
      argmax_disagreement: 0.007761363616681129
      error_jaccard: 0.7870761170135352
      interpretation: >
        004は007より弱いが、002/007系以外では比較的使える補助候補。
        ただし相関は依然として非常に高く、007を大きく押し上げるほどの多様性はない。

    - finding: 006 color min is highly correlated with 007 and Public LBが悪い。
      pair: 006_lgb_color_min__007_lgb002_bias
      pearson_flat_proba: 0.9981717063124274
      spearman_flat_proba: 0.9933310677278019
      argmax_agreement: 0.9922317081408581
      argmax_disagreement: 0.007768291859141903
      error_jaccard: 0.7850558454860265
      interpretation: >
        006はCVだけなら002より高いが、Public LBが低く、007との相関も高い。
        active blend素材としては優先度が低い。

