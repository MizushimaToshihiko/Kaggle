        弱い素材を増やせばよいわけではない。
        006や003を安易に混ぜるのは逆効果。

submission_candidates_saved:
  best_saved:
    set_name: B_replace_002_with_007
    method: hc_nonnegative_raw
    cv: 0.9586110604666821
    submission: submission_exp_20260603_008_blend_add007_bias_check_B_replace_002_with_007_hc_nonnegative_raw.csv
    pred_proba: pred_exp_20260603_008_blend_add007_bias_check_B_replace_002_with_007_hc_nonnegative_raw_proba.npy
    interpretation: >
      008で保存された候補のうちCV最良。
      ただし007単体との差が極小のため、Public提出優先度は高くない。
      007単体Public LB 0.95921を超える保証は弱い。

role_judgement:
  current_mainline:
    key: 007_lgb002_bias
    cv: 0.9586098708578418
    public_lb: 0.95921
    status: current_mainline_single
    reason: >
      008でblend候補を比較しても、007単体を実質的に上回る候補はなかった。
      最高CVの008 HCも007 98.0% + 004 2.0%で、改善幅は約0.000001。
      現時点では007単体を主力候補として維持する。

  replace_002_with_007:
    decision: true
    reason: >
      007は002 rawをCV/LBともに明確に上回り、002との相関はほぼ1。
      008のF_007_002_only HCでも002 weightは0となった。
      active candidateとしては002 rawを007で置換する。

  keep_002_and_007_together:
    decision: false
    reason: >
      002 rawと007 biasedはOOF proba相関0.999904、argmax一致率0.997759で、
      ほぼ同じ予測である。
      両方入れても多様性は増えず、HCも002を0重みにした。

  keep_004:
    decision: hold_auxiliary
    reason: >
      004は007に対して小さな補助効果を持つ可能性がある。
      ただしB_replace_002_with_007 HCで004 weightは約0.0196のみ。
      active main素材ではなく、補助候補として保持する。

  keep_006:
    decision: hold_risky_cv_only
    reason: >
      006は007との組み合わせで007単体を下回った。
      Public LBも002/007より悪く、active blend素材として採用しない。

  keep_003:
    decision: weak_reference
    reason: >
      003は単体性能が弱く、B_replace_002_with_007 HCでも重み0。
      現時点ではactive blend素材から外す。

judgement:
  status: completed
  decision: >
    008では007をblend候補に追加して確認したが、007単体を実質的に超える候補はなかった。
    最高CVはB_replace_002_with_007のHCで0.958611だが、
    007単体0.958610との差は約0.000001にすぎない。
    現時点では007単体をmainlineとして維持し、008のblend候補は参考扱いにする。
  key_findings:
    - 007は002 rawを置換するべき
    - 002 rawと007 biasedを両方入れる価値はほぼない
    - 004 XGBはごく小さい補助効果の可能性あり
    - 006 color minはactive blend素材としては弱い
    - 003 Catは重み0で、active候補から外してよい
    - 008の最高CV候補は007単体との差が極小で、Public提出優先度は低い
  caveat: >
    008のHCやLogReg/RidgeはOOF上の後処理であり、特に微小改善は過信しない。
    最高候補の改善幅が約0.000001しかないため、Public LB更新を狙って提出枠を使う根拠は弱い。
  next_action:
    - 007単体を現時点のmainline/attack候補として保持する
    - 008のB_replace_002_with_007 HCは提出してもよいが、優先度は低い
    - 次は007に近いbias系を深掘りするより、別family/別特徴/別splitで相関を下げる素材を作る
    - 004 XGB rawに対するbias searchを検討する
    - raw blend後bias searchを別実験で試す
    - 006 color系の拡張は一旦止める
    - 003 CatBoost rawの深掘りも一旦止める
