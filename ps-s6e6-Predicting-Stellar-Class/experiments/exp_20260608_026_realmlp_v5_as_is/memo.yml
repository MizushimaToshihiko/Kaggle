comparison:
  against_015_realmlp_as_is:
    exp_id: exp_20260605_015_shared001_realmlp_as_is
    cv_015: 0.9681693449222352
    public_lb_015: 0.96977
    cv_026: 0.9690389777981231
    public_lb_026: 0.96979
    cv_delta_026_minus_015: 0.0008696328758879
    lb_delta_026_minus_015: 0.00002
    interpretation: >
      026は015をCVで大きく上回り、Public LBでもわずかに上回った。
      同じRealMLP familyだが、単なるseed variantではなく別recipeとして価値がある。

  against_017_realmlp_bias:
    exp_id: exp_20260606_017_bias_search_on_015_realmlp
    cv_017: 0.9683022653955233
    public_lb_017: 0.96985
    cv_026: 0.9690389777981231
    public_lb_026: 0.96979
    cv_delta_026_minus_017: 0.0007367124025998
    lb_delta_026_minus_017: -0.00006
    interpretation: >
      026は017をCVでは上回るが、Public LBではわずかに下回る。
      017はbias済みRealMLP backup、026は別RealMLP recipe素材として併存させる。

  against_019_public_current_best:
    exp_id: exp_20260607_019_blend_add018_xgb_check
    cv_019: 0.968872315017554
    public_lb_019: 0.97000
    cv_026: 0.9690389777981231
    public_lb_026: 0.96979
    cv_delta_026_minus_019: 0.0001666627805691
    lb_delta_026_minus_019: -0.00021
    interpretation: >
      026は019をCVでは上回るが、Public LBでは下回る。
      019はPublic-confirmed bestとして維持する。
      026が019に対して補完的かどうかは027の相関・blend確認で判断する。

  against_020_cv_trusted_attack:
    exp_id: exp_20260607_020_bias_search_on_019_best_blend
    cv_020: 0.9692240443617589
    public_lb_020: 0.96969
    cv_026: 0.9690389777981231
    public_lb_026: 0.96979
    cv_delta_026_minus_020: -0.0001850665636358
    lb_delta_026_minus_020: 0.00010
    interpretation: >
      026は020をCVでは下回るが、Public LBでは上回る。
      020はCV-trusted attack、026はPublicも悪くない別RealMLP recipeとして比較対象にする。

  against_024_cv_best:
    exp_id: exp_20260608_024_seed_ensemble_and_blend_check
    cv_024: 0.9694803109983217
    public_lb_024: 0.96958
    cv_026: 0.9690389777981231
    public_lb_026: 0.96979
    cv_delta_026_minus_024: -0.0004413332001986
    lb_delta_026_minus_024: 0.00021
    interpretation: >
      026は024をCVでは下回るが、Public LBでは上回る。
      024はCV-trusted候補、026はPublicも安定した強RealMLP単体として扱う。

  against_025_bias_on_024:
    exp_id: exp_20260608_025_bias_search_on_024_best_blend
    cv_025: 0.9694982932369408
    public_lb_025: 0.96952
    cv_026: 0.9690389777981231
    public_lb_026: 0.96979
    cv_delta_026_minus_025: -0.0004593154388177
    lb_delta_026_minus_025: 0.00027
    interpretation: >
      026は025をCVでは下回るが、Public LBでは大きく上回る。
      025はCV過適合寄りの可能性があり、026の方が単体としては扱いやすい。

role_judgement:
  public_current_best:
    exp_id: exp_20260607_019_blend_add018_xgb_check
    public_lb: 0.97000
    status: keep_public_current_best
    reason: >
      026はPublic LBで019に届かない。
      current public bestは019のまま。

  cv_trusted_slot:
    exp_id: exp_20260608_024_seed_ensemble_and_blend_check
    cv: 0.9694803109983217
    public_lb: 0.96958
    status: keep_cv_trusted_slot_pending_027
    reason: >
      024は現時点の提出slot 2候補。
      026はPublicでは024を上回るが、CVでは024を下回る。
      027のblend結果次第でslot 2候補が変わる可能性はある。

  new_material:
    exp_id: exp_20260608_026_realmlp_v5_as_is
    cv: 0.9690389777981231
    public_lb: 0.96979
    status: keep_for_blend_check
    reason: >
      026は単体CVが高く、Public LBも0.96979と悪くない。
      015/017とは別RealMLP recipeであり、027で相関・blend確認を行う価値が高い。

  stable_backup:
    exp_id: exp_20260605_015_shared001_realmlp_as_is
    cv: 0.9681693449222352
    public_lb: 0.96977
    status: keep_but_lower_priority_after_026
    reason: >
      026が015をCV/Publicともに上回ったため、
      015の単体backupとしての相対優先度は下がった。
      ただし015は019/017/024の構成要素でもあるため、完全に捨てない。

judgement:
  status: completed
  decision: >
    026 RealMLP v5 as-is は、単体提出候補としては019には届かないが、
    強い別RealMLP recipe素材として採用する。
    CV 0.969039、Public LB 0.96979で、015をCV/LBともに上回った。
    020/024/025よりPublic LBが高く、CVも017/015より高いため、
    027で既存上位候補との相関・blend確認を必ず実施する。
  key_findings:
    - 公開RealMLP v5の再現は成功
    - CVは0.969039で、RealMLP単体として強い
    - Public LBは0.96979で、015と同等以上
    - 019にはPublicで届かない
    - 024/025にはCVで届かないが、Publicでは上回る
    - 単なるseed variantではなく別RealMLP recipeとして価値がある
  caveat: >
    026はRealMLP系であるため、015/017/021/022/023との相関が高い可能性はある。
    ただしfeature setとconfigが異なり、Public LBも高いため、
    単体結果だけで判断せず、027のOOF相関・blend weightを見る必要がある。
  next_action:
    - 026のOOF/pred probaをnpy-files datasetへ追加する
    - 027として019/024/020/017/015/018/026の相関・blend確認を行う
    - 026がblendで重みを持てば、024/025に代わるslot 2候補または新current blend候補になり得る
    - 026が高相関で重みを持たなければ、Publicの良い単体backupとして保持する

