  model: XGBClassifier
  created_at: '2026-06-06'
objective:
  summary: Extract and run only the XGBoost part from shared003. Omit external submission/blending.
    Save OOF/pred probabilities with exp_id filenames for later correlation and blend
    checks against 017 current best.
  success_criteria:
  - run shared003 XGB-only
  - omit external submission blend
  - save OOF proba npy with exp_id in filename
  - save test pred proba npy with exp_id in filename
  - save probabilities in standard class order GALAXY,QSO,STAR
  - save submission
  - save cv_result
  - save fold_scores
  - update oof_registry
