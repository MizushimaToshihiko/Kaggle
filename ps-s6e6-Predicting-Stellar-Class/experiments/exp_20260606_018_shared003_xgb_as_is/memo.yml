judgement:
  status: pending_public_lb_and_corr
  reason: shared003 XGB is a different family from 017 RealMLP. Adoption depends on
    reproduced CV, Public LB, and OOF correlation/blend behavior against 017.
  next_action:
  - Submit submission_shared003_xgb_as_is.csv
  - Record Public LB
  - Add OOF/pred npy to npy-files dataset
  - Compare OOF correlation against 017 current best
  - Blend with 017 if correlation and Public LB are favorable

result:
  status: completed
  purpose: >
    shared003.ipynb からXGBoost部分のみを抜き出し、他submissionのblend部分を除外してas-is実行した。
    目的は、017 current best RealMLPとは異なるmodel family素材として、
    XGBoost単体のCV/LBと、後続blend用OOF/pred probaを作成すること。

