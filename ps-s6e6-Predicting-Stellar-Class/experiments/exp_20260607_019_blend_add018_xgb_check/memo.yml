pairwise_correlation:
  key_findings:
    - pair: 017_realmlp_bias__018_xgb_shared003
      pearson_flat_proba: 0.9906696421622411
      spearman_flat_proba: 0.9086501209307843
      argmax_agreement: 0.9815241094177332
      argmax_disagreement: 0.018475890582266816
      error_jaccard: 0.5829331216511212
      interpretation: >
        017と018はPearson相関は高いが、Spearmanは0.9087まで下がり、
        argmax disagreementも約1.85%ある。
        error_jaccardも0.583で、015/017間の0.941よりかなり低い。
        018は単体では弱いが、017とは異なる誤分類構造を持っていた。

    - pair: 015_realmlp_shared001__017_realmlp_bias
      pearson_flat_proba: 0.999895266864765
      spearman_flat_proba: 0.9978106612784386
      argmax_agreement: 0.9978245318673172
      error_jaccard: 0.9412443504183095
      interpretation: >
        015と017はほぼ同一系統。
        017は015のbias後処理であるため、両方を混ぜても多様性はほぼ増えない。

    - pair: 014_blend_bias__017_realmlp_bias
      pearson_flat_proba: 0.993650666528413
      spearman_flat_proba: 0.9043243275129144
      argmax_agreement: 0.9852064702856341
      error_jaccard: 0.6494659685863874
      interpretation: >
        014と017は確率Pearsonは高いが、rank相関と誤分類重なりは完全一致ではない。
        019 best blendでは014にも約19.3%の重みが入り、017/018の補助として効いた。

