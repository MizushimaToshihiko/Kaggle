judgement:
  status: completed
  decision: >
    019 best blendである F_014_017_018 / hc_nonnegative_raw を
    現時点のcurrent bestとして採用する。
    Public LBは0.97000で、017の0.96985を+0.00015更新した。
    018 XGBは単体では弱かったが、017/014とのblendで有効な補助素材になった。
  key_findings:
    - 018 XGBは単体では弱いが、blend素材として有効
    - 017+018だけでも017単体をOOF上で改善
    - bestは014+017+018のHC blend
    - 014も古いbranchだが補助としてまだ有効
    - 015と017は近すぎるため、両方を入れる価値は限定的
    - 019はPublic LB 0.97000で現時点最高
  caveat: >
    019はHCでOOF最適化されたblendであり、Public改善幅は+0.00015と小さい。
    Private過適合リスクは残る。
    017/015はbackupとして必ず保持する。
    019をattack/current best、017をprevious best backup、015をstable single backupとして管理するのが妥当。
  next_action:
    - 019をcurrent bestとして記録する
    - 019 best blendのOOF/pred probaをnpy-files datasetへ追加する
    - final_candidates.ymlに019をcurrent best/attack候補として追加する
    - 017をprevious best RealMLP bias backup、015をstable single backupとして残す
    - 次に進むなら019 best blendへのbias searchを検討する
    - ただし019のPublic改善幅は小さいため、bias searchの過最適化に注意する

