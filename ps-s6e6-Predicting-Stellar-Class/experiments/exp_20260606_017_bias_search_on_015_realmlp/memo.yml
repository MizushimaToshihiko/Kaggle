  pred_path: /kaggle/working/exp_20260606_017_bias_search_on_015_realmlp/pred_exp_20260606_017_bias_search_on_015_realmlp_proba.npy
  submission_path: /kaggle/working/exp_20260606_017_bias_search_on_015_realmlp/submission_bias_search_on_015_realmlp.csv
  notes: >
    Bias search on 015 shared001 RealMLP as-is.
    CV improved from 0.968169 to 0.968302 and Public LB improved from 0.96977 to 0.96985.
    Bias: GALAXY 0.0, QSO 0.0285, STAR 0.178.
    Keep as current best RealMLP bias candidate. 015 remains stable backup.
