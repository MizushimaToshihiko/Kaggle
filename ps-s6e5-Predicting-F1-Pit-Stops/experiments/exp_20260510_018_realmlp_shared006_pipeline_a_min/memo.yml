decision_rule:
  single_model:
    keep: >
      CV is around 0.9533〜0.9535 or Public LB is competitive with existing 007/008.
      This indicates shared_006 Pipeline A RealMLP is successfully reproduced and useful as a single candidate.
    hold: >
      CV is slightly below expected but correlation with 007/008 is not too high,
      or blend weight remains positive.
    drop: >
      CV is clearly below 007/008 and blend weight disappears.
  after_blend:
    keep: >
      018 receives meaningful positive weight in HC/NM/LogReg/ElasticNet
      and improves current best stack CV or Public LB.
      It is especially valuable if it naturally replaces part of 007/008 weight.
    hold: >
      018 receives small but nonzero weight and does not harm Public LB.
      Keep as optional RealMLP diversity material.
    drop: >
      018 receives zero or near-zero weight across optimized blends.
      In that case, existing 007/008 already absorb shared006 Pipeline A.
  next_action_if_keep: >
    Consider a small 019 RealMLP ablation only if 018 materially improves blend:
    for example no_PitStop_cat_count or no_Race_Year_TE.
  next_action_if_drop: >
    Do not spend time on shared006 RealMLP refinements.
    Also avoid running shared006 CatBoost/XGBoost unless a new reason appears.

notes:
  - >
    018 uses the date 2026-05-10 in the experiment ID:
    exp_20260510_018_realmlp_shared006_pipeline_a_min.
  - >
    018 is not the full shared_006 3-model ensemble.
    It uses only Pipeline A RealMLP.
  - >
    shared_006 Pipeline A reported RealMLP OOF AUC around 0.95348.
    Reproduction near that range is considered successful.
  - >
    Original rows are not appended in full.
    They are split by StratifiedKFold and only the original train-side split is appended to each fold.
  - >
    Normalized_TyreLife is explicitly dropped from original.
    No direct use or intentional proxy reconstruction is allowed.
  - >
    PitStop-related features are retained in 018 because this is as-is Pipeline A reproduction.
    PitStop removal should be a later ablation only if 018 proves useful.
  - >
    CatBoost and XGBoost parts of shared_006 are not run in 018.
    Current stack already has stronger CatBoost and XGB branches.
  - >
    The main question is not whether 018 is RealMLP,
    but whether its compact feature set adds diversity beyond 007/008.
