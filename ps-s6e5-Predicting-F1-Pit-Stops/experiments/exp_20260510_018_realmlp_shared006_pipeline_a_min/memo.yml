experiment:
  id: exp_20260510_018_realmlp_shared006_pipeline_a_min
  title: RealMLP shared006 Pipeline A artifact generator
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done

objective:
  summary: >
    shared_006 のうち、Pipeline A RealMLP 部分だけを切り出し、
    現在の実験管理・blend運用に合わせて OOF/pred artifact generator 化する。
    shared_006全体は RealMLP / CatBoost / XGBoost の3モデル構成だが、
    018では CatBoost / XGBoost / shared_006内部blend は使わない。
    目的は、既存007/008とは異なる37特徴RealMLP素材として、
    current best stack に追加したときに自然な重みが残るかを確認すること。

  success_criteria:
    - raw CV AUC を取得
    - Public LB を取得
    - oof / pred を npy で保存
    - fold_scores.csv を保存
    - feature_columns.csv / combo_features.csv / target_encoding_features.csv を保存
    - cv_result.json を保存
    - 007 / 008 / 009 / 012 / 013 / 014 / 015 / 016 / 017 との相関を確認
    - current best stack に追加して、Avg / Ridge / ElasticNet / LogReg / HC / NM で比較する

positioning:
  experiment_type: low_corr_realmlp_candidate
  intended_role: realmlp_aux_or_007_008_replacement_candidate
  base_family: realmlp
  base_reference: shared_006 Pipeline A
  excluded_shared006_parts:
    - Pipeline B CatBoost
    - Pipeline C XGBoost
    - shared_006 internal 3-model Nelder-Mead blend
  why_now: >
    016/017のshared005 XGB familyは、単体では弱いがblendで大きく効いた。
    次に別family候補としてshared_006を確認したところ、
    Pipeline A RealMLPがOOF AUC 0.95348と強く、
    007/008 RealMLP系とは特徴設計が異なる可能性がある。
    一方、shared_006のCatBoost部分は012〜015と近く、
    XGBoost部分は016/017より弱いため、まずRealMLP部分だけを独立素材として評価する。

data:
  train_path_candidates:
    - /kaggle/input/competitions/playground-series-s6e5/train.csv
    - /kaggle/input/playground-series-s6e5/train.csv
  test_path_candidates:
    - /kaggle/input/competitions/playground-series-s6e5/test.csv
    - /kaggle/input/playground-series-s6e5/test.csv
  original_path_candidates:
    - /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
    - /kaggle/input/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
  target: PitNextLap
  target_candidates:
    - PitNextLap
    - PitNextLab
  id_col: id
  danger_col: Normalized_TyreLife
  danger_col_used: false
  original_usage:
    use_original_rows: true
    original_split: true
    policy: >
      Same as shared_006 Pipeline A.
      Competition train is split by StratifiedKFold.
      Original rows are also split by StratifiedKFold, and only original fold-train side is appended to each fold train.
      Original fold-holdout side is not used for competition validation.
    note: >
      This differs from experiments where all original rows are appended to every fold.
      It is safer and closer to shared_006 Pipeline A.
      Normalized_TyreLife is explicitly dropped from original before feature construction.
  forbidden_columns:
    - Normalized_TyreLife
    - Normalized_TyreLife proxy
    - stint endpoint proxy
    - pseudo label

cv:
  scheme: StratifiedKFold
  n_splits: 5
  shuffle: true
  random_state: 42
  original_split:
    enabled: true
    scheme: StratifiedKFold
    n_splits: 5
    shuffle: true
    random_state: 42
    usage: >
      For each fold, original train-side rows are appended to competition fold train.
      Original validation-side rows are held out and not used.
  target_encoding:
    library: sklearn.preprocessing.TargetEncoder
    cv: 5
    smooth: auto
    shuffle: true
    random_state: 42
    columns:
      - Race_Compound_
      - Race_Year_
    output_features:
      - _Race_Compound_TE
      - _Race_Year_TE
  note: >
    Fold-safe TargetEncoder is fit inside each outer fold after original fold-train rows are appended.

model:
  family: RealMLP
  estimator: pytabkit.RealMLP_TD_Classifier
  params:
    random_state: 42
    verbosity: 2
    val_metric_name: 1-auc_ovr
    n_ens: 8
    n_epochs: 4
    batch_size: 256
    use_early_stopping: false
    lr: 0.03
    wd: 0.018
    sq_mom: 0.98
    lr_sched: lin_cos_log_15
    first_layer_lr_factor: 0.25
    embedding_size: 6
    max_one_hot_cat_size: 18
    hidden_sizes:
      - 512
      - 256
      - 128
    act: silu
    p_drop: 0.05
    p_drop_sched: expm4t
    plr_hidden_1: 16
    plr_hidden_2: 8
    plr_act_name: gelu
    plr_lr_factor: 0.1151
    plr_sigma: 2.33
    ls_eps: 0.01
    ls_eps_sched: sqrt_cos
    add_front_scale: false
    bias_init_mode: neg-uniform-dynamic-2
    tfms:
      - one_hot
      - median_center
      - robust_scale
      - smooth_clip
      - embedding
      - l2_normalize
  note: >
    Parameters are kept as close as possible to shared_006 Pipeline A.
    No Optuna or parameter tuning is performed in 018.

features:
  base_features:
    source: shared_006 Pipeline A
    expected_feature_count_before_te: 37
    expected_feature_count_after_te: 39
    summary: >
      Pipeline A is a compact RealMLP feature set.
      It keeps raw columns, adds simple domain ratios, floors numerical columns into categorical strings,
      count-encodes selected categorical features, bins RaceProgress into 200 quantile bins,
      creates Race_Compound and Race_Year combos, and adds fold-safe TE for those combos.

  raw_columns_used:
    categorical:
      - Driver
      - Compound
      - Race
    numeric:
      - Year
      - PitStop
      - LapNumber
      - Stint
      - TyreLife
      - Position
      - LapTime (s)
      - LapTime_Delta
      - Cumulative_Degradation
      - RaceProgress
      - Position_Change

  domain_ratio_features:
    - _LP_RP
    - _TL_LP
  domain_ratio_definitions:
    _LP_RP: LapNumber / RaceProgress
    _TL_LP: TyreLife / LapNumber

  numeric_floor_categorical_features:
    method: >
      For each numeric base column and the two ratio columns,
      floor(value) is factorized using train-fitted categories and stored as string categorical feature.
    expected_examples:
      - Year_cat_
      - PitStop_cat_
      - LapNumber_cat_
      - Stint_cat_
      - TyreLife_cat_
      - Position_cat_
      - LapTime (s)_cat_
      - LapTime_Delta_cat_
      - Cumulative_Degradation_cat_
      - RaceProgress_cat_
      - Position_Change_cat_
      - LP_RP_cat_
      - TL_LP_cat_

  count_encoding:
    columns:
      - Driver
      - Compound
      - Race
      - Year_cat_
      - PitStop_cat_
    output_examples:
      - _Driver_count
      - _Compound_count
      - _Race_count
      - _Year_cat_count
      - _PitStop_cat_count
    fit_scope: competition train feature table
    note: >
      Count maps are fitted during pipeline_a_fe(fit=True) on competition train,
      then applied to test and original.

  quantile_bin_features:
    - RaceProgress_200_qbin_
  quantile_bin_method:
    column: RaceProgress
    n_bins: 200
    strategy: quantile
    encoder: KBinsDiscretizer
    fit_scope: competition train feature table

  combo_features:
    - Race_Compound_
    - Race_Year_
  combo_feature_method: >
    Combo strings are factorized using train-fitted categories and stored as string categorical features.

  fold_target_encoding:
    enabled: true
    input_columns:
      - Race_Compound_
      - Race_Year_
    output_features:
      - _Race_Compound_TE
      - _Race_Year_TE
    method: >
      sklearn TargetEncoder is fit inside each outer fold on Xtr/ytr after original fold-train rows are appended.
      Validation and test are transformed using that fold encoder.

  risk_features_to_watch:
    - PitStop
    - PitStop_cat_
    - _PitStop_cat_count
    - Race_Year_
    - _Race_Year_TE
    - LapTime_Delta_cat_
    - Cumulative_Degradation_cat_
  normalized_tyrelife_policy:
    - Normalized_TyreLife is dropped.
    - Direct use is forbidden.
    - Intentional proxy reconstruction is not added.

hypothesis:
  main: >
    shared_006 Pipeline A RealMLP may provide a stronger or complementary RealMLP material
    compared with existing 007/008.
    Although it is the same broad model family as 007/008, its feature set is compact and materially different.
    If 018 receives positive weight or replaces part of 007/008 in optimized blends,
    it should be kept as a RealMLP auxiliary candidate.
  positive_pattern: >
    018 CV reproduces around 0.9533〜0.9535 and Public LB is competitive with or better than 007/008.
    In blend, 018 receives natural positive weight, especially by absorbing part of 007/008 weight while improving CV/LB.
  failure_pattern: >
    018 is highly correlated with 007/008 and receives zero or near-zero weight in HC/NM/LogReg/ElasticNet.
    This would imply that shared006 RealMLP is already absorbed by existing RealMLP models.
  important_caution: >
    Do not judge 018 solely by being RealMLP family.
    The feature set is different enough that blend conversion must be checked.
    Conversely, do not run shared_006 CatBoost/XGBoost parts before RealMLP blend value is confirmed.

