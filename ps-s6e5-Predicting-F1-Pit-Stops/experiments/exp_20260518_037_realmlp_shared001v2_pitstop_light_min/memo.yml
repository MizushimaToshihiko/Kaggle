    - "015"
    - "016"
    - "017"
    - "021"
    - "026"
    - "028"
    - "029"
    - "032"
    - "036"
    - "037"

  submitted:
    nm_softmax_raw:
      public_lb: 0.95429
    logreg_meta_pruned:
      public_lb: null

