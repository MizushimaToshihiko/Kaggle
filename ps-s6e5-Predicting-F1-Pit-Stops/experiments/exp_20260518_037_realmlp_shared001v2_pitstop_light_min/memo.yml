comparison_after_037:
  against_add036:
    add036_nm_cv: 0.9548539407496595
    add037_nm_cv: 0.9548542504410260
    delta_nm_cv: 0.0000003096913665
    add036_logreg_cv: 0.9548152425376653
    add037_logreg_cv: 0.9548099930658338
    delta_logreg_cv: -0.0000052494718315
    add036_nm_public_lb: 0.95429
    add036_logreg_public_lb: 0.95422
    add037_nm_public_lb: null
    add037_logreg_public_lb: null

  interpretation: >
    037追加によるNM CV改善は約+0.00000031で、実質的には誤差レベル。
    一方でLogReg CVはadd036より低下している。
    037の追加価値は限定的であり、036のような明確なPublic更新候補とはまだ言えない。

judgement_after_037:
  status: hold_not_promoted
  summary: >
    037 is a strong single model, but it is too close to the existing 029/036 cluster.
    It receives a small positive NM/HC/SLSQP weight around 0.038,
    but the NM CV gain over add036 is almost zero and LogReg CV decreases.
    Therefore 037 should not be promoted to the standard main stack unless Public LB is submitted and improves.
  interpretation:
    - PitStop-light direction did not create as much diversity as hoped.
    - Removing only PitStop_cat_ and _PitStop_cat_count is too mild.
    - 036 remains the successful 029-family variant.
    - 037 can be kept as a hold candidate, but not as a current main candidate.
    - If pursuing this direction further, a stronger no-PitStop-derived or raw-PitStop-removed variant would be needed.
  decision:
    keep_037: hold
    include_037_in_standard_stack: false_for_now
    replace_029_or_036_with_037: false
    submit_037_blend: optional_only_if_submission_slots_remain
    next_pitstop_variant_strategy: >
      Do not deepen immediately unless there is enough runtime/submission budget.
      A stronger 037b removing raw PitStop as well may lower correlation, but likely risks single strength.

  current_candidate_priority:
    primary:
      name: add036_nm
      public_lb: 0.95429
    stable_backup:
      name: add036_logreg
      public_lb: 0.95422
    hold_private_diversity:
      - name: add032_nm
        public_lb: 0.95424
      - name: add033_nm
        public_lb: 0.95424
      - name: add029_nm
        public_lb: 0.95424
      - name: add037_nm
        public_lb: null
        note: >
          Requires Public LB before promotion, but CV gain over add036 is negligible.
    not_promoted:
      - "030"
      - "031"
      - "034"
      - "035"

  next_action: >
    Do not treat 037 as a clear success.
    If continuing 029-variant search, prefer 038 seed/regularization variant over a mild PitStop-light repeat.
    If attempting PitStop again, use a stronger 037b only if willing to accept larger single-CV loss.


