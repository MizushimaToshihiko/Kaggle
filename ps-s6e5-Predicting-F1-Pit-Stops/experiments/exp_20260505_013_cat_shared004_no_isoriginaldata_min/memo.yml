decision_rule:
  single_model:
    keep: >
      012からのCV/LB低下が小さく、かつPublic LBが同等以上。
      IsOriginalDataなしでもCatBoost shared004素材が成立していると判断する。
    hold: >
      単体は012より少し落ちるが、012との相関がややズレており、
      blendで自然に残る。
    drop: >
      単体CV/LBが明確に落ち、blendでも012の代替にも追加素材にもならない。
  after_blend:
    keep: >
      007/008/009/013 または 007/008/009/012/013 で、
      HC/NM/LogReg/ElasticNetのいずれかが012入り既存bestを更新する。
    hold: >
      既存best更新はしないが、013が正の重みで残り、012とは違う安全寄り素材として使える。
    drop: >
      重みが消える、または012の代替で明確に悪化する。
  risk_interpretation:
    if_013_close_to_012: >
      IsOriginalData依存は限定的。
      012/013はCatBoost full-FE素材として比較的信頼できる。
    if_013_much_worse_than_012: >
      012の強さはIsOriginalData依存が大きい。
      012は攻め枠として扱い、安定枠には入れすぎない。

notes:
  - >
    013は012の単一特徴アブレーションであり、新規学習方針の実験ではない。
  - >
    このコードではfeature_colsという名前ではなく common_features が最終特徴量リストである。
  - >
    IsOriginalDataの除外は common_features 作成直後、
    X_comp / X_test_final / X_orig をcommon_featuresでsubsetする前に行う。
  - >
    cat_colsも common_features prune 後に再フィルタする。
    IsOriginalDataがcat_colsまたはcat_featuresに残ると、CatBoostの列indexがずれる危険がある。
  - >
    Race_Year、TyreAgeRatio_str、Race_Compound_Stint、Race_Year group statsは今回落とさない。
    これらは014以降の別アブレーション候補。
  - >
    012入りblendでは006bの重みがほぼ0だったため、
    006b pruneだけの別実験は不要。
  - >
    013の主目的はスコア更新ではなく、012を安定補助として扱えるかどうかの危険度判定である。
