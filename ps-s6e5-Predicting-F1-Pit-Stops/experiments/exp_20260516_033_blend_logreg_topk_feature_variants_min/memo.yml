experiment_033_summary:
  source_json: blend_result.json
  source_notebook: ps-s6e5-033_blend_logreg_topk_feature_variants_min.ipynb
  experiment_id: exp_20260516_033_blend_logreg_topk_feature_variants_min
  purpose: >
    shared_xxx_stacking_vibe_codingから、重い多段stacking本体ではなく、
    010ブレンドコードに吸収しやすい小改良だけを検証する。
    具体的にはLogReg topK equal blend、LogReg feature-set variants、
    Ridge feature-set variantsを追加して、現行stackのPublic/LB改善につながるか確認する。
  status: completed
  created_at: "2026-05-16"

  stack:
    - "014"
    - "015"
    - "016"
    - "017"
    - "021"
    - "026"
    - "028"
    - "029"
    - "032"

  dropped_or_excluded:
    - "007"
    - "018"
    - "020"
    - "022"
    - "023"
    - "024"
    - "025"
    - "027"
    - "030"
    - "031"

  notes:
    - 030/031はCV上は強かったがPublic変換が弱いため、Dの検証対象から除外。
    - 018は直近のoptimized blendでほぼゼロ重みだったため、今回の基本stackから除外。
    - Dではfull multi-layer stackingは導入していない。
    - 目的は、現行010コードの範囲内で低コストなLogReg/Ridge改善を試すこと。

