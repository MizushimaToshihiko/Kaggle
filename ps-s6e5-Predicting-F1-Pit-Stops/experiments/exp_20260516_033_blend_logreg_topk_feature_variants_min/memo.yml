D_addition_judgement:
  status: no_public_update
  summary: >
    033 confirms that the clean 9-model stack with 029 and 032 remains strong.
    NM CV reaches 0.9548091063, the highest clean-stack CV so far, but Public LB remains 0.95424.
    The additional D ideas from stacking_vibe_coding did not improve over the existing LogReg baseline:
    top3/top5 equal blends, logit_only, raw_logit, raw_only, and Ridge variants all failed to beat
    logreg_meta_pruned on CV, and the submitted LogReg LB was only 0.95418.
  interpretation:
    - LogReg topK equal blending did not help.
    - raw+rank+logit remains the best LogReg feature set among tested variants.
    - raw_logit and logit_only are not better.
    - Ridge feature variants are not useful.
    - Full multi-layer stacking should not be imported at this stage.
    - 033 NM is a valid candidate but only ties current best Public LB.
    - The main actionable value is confirmation that 029+032 clean stack is robust.

  current_candidate_priority:
    primary:
      name: add029_nm
      public_lb: 0.95424
      reason: >
        First achieved current Public best and remains simplest strong primary candidate.

    tied_attack_candidate:
      name: add032_nm
      public_lb: 0.95424
      reason: >
        Same Public LB as add029 NM, higher OOF CV and includes custom RealMLP signal.
        Candidate for Private diversity.

    tied_clean_stack_candidate:
      name: add033_nm
      public_lb: 0.95424
      reason: >
        Same Public LB with clean 9-model stack and highest CV.
        Candidate if preferring compressed/clean stack.

    stable_backup:
      name: compressed_drop007_022_023_keep027_logreg
      public_lb: 0.95420
      reason: >
        Best known LogReg backup. 033 LogReg was only 0.95418.

    hold_private_diversity:
      - add030_nm
      - add031_nm

  next_action: >
    Do not deepen D blend-code variants further.
    The next useful direction is E: candidate_from_eda,
    starting with a low-risk GBDT feature experiment rather than full Driver TE.

final_decision_after_033:
  keep:
    - add029_nm
    - add032_nm
    - add033_nm

  do_not_promote:
    - logreg_meta_pruned_top3_equal
    - logreg_meta_pruned_top5_equal
    - logreg_meta_pruned_logit_only
    - logreg_meta_pruned_raw_logit
    - logreg_meta_pruned_raw_only
    - ridge_meta_pruned_logit_only
    - ridge_meta_pruned_raw_logit

  reason: >
    D additions increased method coverage but did not improve Public LB.
    The only competitive result is NM, which ties the existing best at 0.95424.
    Since LogReg variants did not improve, this direction should stop here.
