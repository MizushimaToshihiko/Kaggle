experiment:
  id: exp_20260503_008_realmlp_shared001_plus_006b_orig_prior
  title: RealMLP shared001 plus safe original prior graft
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done
  created_at: 2026-05-03

objective:
  summary: >
    007 RealMLP shared001 minimum reproduction に、006b/006c系で有効性を確認した
    safe original prior features を追加する。
    007は単体でCV 0.953270 / Public LB 0.95273を達成し、現時点の主軸となった。
    008では、shared_001 RealMLPがoriginal rowsを学習データにconcatしている状態に対し、
    さらにoriginal target由来の粗いprior特徴をgraftすることで、007単体を更新できるか確認する。
  purpose:
    - 007 RealMLP shared001 min に original prior を追加して単体更新できるか確認する
    - 006b/006cで有効だった original prior mean / minus_global がRealMLPにも効くか確認する
    - RealMLPがoriginal row mergeだけで十分なのか、prior特徴追加によりさらに伸びるのか確認する
    - 007とのOOF相関を確認する
    - 006b/007/008を含むblendで上積みするか確認する
    - 後続のblend台に入れるOOF/pred素材を作成する
  success_criteria:
    - 5fold CV AUCを取得
    - fold別AUCを取得
    - Public LBを記録
    - oof/pred/submissionを保存
    - feature_columns.csvを保存
    - prior_info.jsonを保存
    - cv_result.jsonを保存
    - 007とのCV/LB差分を確認
    - 006b/006c/007とのOOF相関を確認
    - avg_007_008 が007単体を上回るか確認する
    - ORIG_PRIOR_Yearおよび*_count特徴が生成されていないことを確認する

source:
  base_experiment:
    id: exp_20260503_007_realmlp_shared001_min
    model: RealMLP
    feature_set: shared001_realmlp_min
    cv_auc: 0.953270
    public_lb: 0.95273
    judgment: keep
    role: >
      現時点の単体主軸。
      shared_001 RealMLP / PyTabKit の最小再現。
      008はこの007にsafe original priorを追加する派生。
  shared_code:
    id: shared_001
    title: PS-S6-E5 RealMLP PyTabKit
    family: RealMLP
    library: PyTabKit
    note: >
      shared_001 は pytabkit の RealMLP_TD_Classifier を使用する。
      original dataset から Normalized_TyreLife をdropし、
      foldごとに original rows を training side にconcatして学習する構成。
      数値列のfloorカテゴリ化、RaceProgressの200分位bin、
      Race_Compound / Race_Year interaction、
      それらへのTargetEncoderが主な特徴量。
  graft_source:
    based_on:
      - exp_20260503_006b_cat_original_prior_no_year_prior_min
      - exp_20260503_006c_cat_original_prior_no_count_min
    note: >
      006bではYear priorを除外しても002をCV/LBともに上回り、
      original prior軸がYear prior依存ではないことを確認した。
      006cではcount特徴を除外しても002超えを維持したため、
      original prior mean自体にも有効性があると判断した。
      008ではRealMLPに入れるため、より安全側として
      no Year prior / no count のprior graftにする。

data:
  competition_data:
    train_path: /kaggle/input/competitions/playground-series-s6e5/train.csv
    test_path: /kaggle/input/competitions/playground-series-s6e5/test.csv
    sample_submission_path: /kaggle/input/competitions/playground-series-s6e5/sample_submission.csv
  original_data:
    dataset: aadigupta1601/f1-strategy-dataset-pit-stop-prediction
    path: /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
    used: true
    use_method:
      - append original rows to each fold training split
      - create safe original prior mean features
      - create safe original prior minus_global features
    not_used_as:
      - pseudo label source
      - original count/frequency feature source for prior block
      - Year prior source
      - fine-grained Race x Driver x Stint prior source
    danger_col: Normalized_TyreLife
    danger_col_used: false
    note: >
      original rowsは007と同じく各foldのtrain側にのみconcatする。
      さらにoriginal targetから粗いprior特徴を作成し、competition train/test/originalに付与する。
      ただし original のpositive rateはcompetition trainより高いため、
      007よりoriginal情報の二重使用リスクが高い。
  id_col: id
  target_col: PitNextLap
  target_type: binary
  target_distribution:
    competition_train:
      class_0_count: 351759
      class_1_count: 87381
      class_0_rate: 0.801018
      class_1_rate: 0.198982
    original:
      class_1_rate: 0.254797
      abs_class_1_rate_diff_vs_train: 0.055815

