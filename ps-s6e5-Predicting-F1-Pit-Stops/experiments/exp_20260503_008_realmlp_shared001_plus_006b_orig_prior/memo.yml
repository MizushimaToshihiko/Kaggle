decision:
  judgment: hold
  keep_condition:
    - 008が007よりCVまたはPublic LBで上回る
    - または007と同等で、avg_007_008やRidge/ElasticNet/LogRegで上積みする
    - Public LBがCV改善と大きく矛盾しない
    - fold_scoresが安定している
    - original prior追加が過剰利用に見えない
  hold_condition:
    - 008単体は007未満だが、006bや007との相関が少しズレてblendで効く
    - 007とは異なるRealMLP派生としてメタブレンドで正係数になる
    - Public LBは微妙でもCV/相関/blend上の素材価値がある
  drop_condition:
    - 008が007よりCV/LBともに下がる
    - avg_007_008も007単体を下回る
    - 007との相関が極めて高く、弱い近縁派生に留まる
    - CVだけ上がりPublic LBが伸びない
    - original情報の二重使用によるCV盛りが疑われる
  next_action_after_run:
    - Public LBを提出して記録
    - 002/006b/006c/007/008のOOF相関確認
    - avg_007_008, avg_006b_008, avg_006b_007_008 を確認
    - 008がkeepならRealMLP派生主軸候補として保存
    - 008がdropなら007をRealMLP主軸として維持し、shared_003のLGB full-FE単体切り出しを検討
