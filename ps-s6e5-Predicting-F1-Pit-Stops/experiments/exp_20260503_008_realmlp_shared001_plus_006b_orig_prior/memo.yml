    cv_auc: 0.9485750913
    public_lb: 0.94815
    judgment: hold
    role: countなしの安全寄りCatBoost original prior。
  exp_20260503_007_realmlp_shared001_min:
    model: RealMLP
    feature_set: shared001_realmlp_min
    cv_auc: 0.953270
    public_lb: 0.95273
    judgment: keep
    role: >
      現時点の単体主軸。
      008の直接比較対象。

features:
  feature_set: shared001_realmlp_min_plus_safe_orig_prior
  base_features:
    - Driver
    - Compound
    - Race
    - Year
    - PitStop
    - LapNumber
    - Stint
    - TyreLife
    - Position
    - LapTime (s)
    - LapTime_Delta
    - Cumulative_Degradation
    - RaceProgress
    - Position_Change
  shared001_engineered_features:
    numeric_as_category:
      description: >
        007/shared001と同じく、各数値列をfloorした値でfactorizeし、
        {col}_cat_としてカテゴリ特徴化する。
      generated_for:
        - Year
        - PitStop
        - LapNumber
        - Stint
        - TyreLife
        - Position
        - LapTime (s)
        - LapTime_Delta
        - Cumulative_Degradation
        - RaceProgress
        - Position_Change
    arithmetic_features:
      - _LapNumber_/_RaceProgress
      - _TyreLife_/_LapNumber
    binned_features:
      - RaceProgress_200_quantile_bin_
    interaction_categories:
      - Race_Compound_
      - Race_Year_
    target_encoding:
      enabled: true
      columns:
        - Race_Compound_
        - Race_Year_
      generated_features:
        - _Race_Compound_TE
        - _Race_Year_TE
      policy: >
        各outer fold内で、competition fold-train + original fold-train に対して
        sklearn TargetEncoder をfitし、validation/testへtransformする。
  orig_prior_features:
    enabled: true
    policy: >
      original dataset の PitNextLap を使って粗いprior meanを作る。
      competition trainのtargetは使わない。
      Normalized_TyreLifeは事前にdrop済み。
      Year priorと*_count特徴は作らない。
      Race x Driver x Stintのような細かすぎるpriorは作らない。
    categorical_priors:
      source_columns:
        - Driver
        - Compound
        - Race
        - Stint
        - PitStop
        - Position
      excluded_source_columns:
        - Year
      generated_per_column:
        - ORIG_PRIOR_{col}
        - ORIG_PRIOR_{col}_minus_global
      not_generated_per_column:
        - ORIG_PRIOR_{col}_count
    numeric_bin_priors:
      source_columns:
        - LapNumber
        - TyreLife
        - RaceProgress
        - Cumulative_Degradation
        - LapTime_Delta
      binning:
        method: quantile_edges_from_train_test_original_features
        bins: 10
      generated_per_column:
        - ORIG_PRIOR_{col}_bin10
        - ORIG_PRIOR_{col}_bin10_minus_global
      not_generated_per_column:
        - ORIG_PRIOR_{col}_bin10_count
    coarse_pair_priors:
      source_pairs:
        - [Compound, Stint]
        - [Compound, PitStop]
        - [Race, Stint]
        - [Race, PitStop]
      generated_per_pair:
        - ORIG_PRIOR_{col1}__{col2}
        - ORIG_PRIOR_{col1}__{col2}_minus_global
      not_generated_per_pair:
        - ORIG_PRIOR_{col1}__{col2}_count
  excluded_features:
    - Normalized_TyreLife
    - Normalized_TyreLife_proxy
    - ORIG_PRIOR_Year
    - ORIG_PRIOR_Year_count
    - ORIG_PRIOR_Year_minus_global
    - all_ORIG_PRIOR_count_features
    - Race_Driver_Stint_prior
    - Race_x_Driver_x_Stint
    - TyreLife_div_stint_max
    - stint_final_TyreLife
    - test_wide_stint_endpoint_features
    - pseudo_label
  leakage_control:
    - Normalized_TyreLife is dropped before feature engineering
    - no Normalized_TyreLife proxy
    - no test-wide stint endpoint estimation
    - no Year original prior
    - no original count/frequency features in prior block
    - no fine-grained Race x Driver x Stint prior
    - original rows are appended only to fold training side, not validation side
  risk_notes:
    - original row merge plus original prior means original information is used twice
    - original positive rate differs from competition train
    - if CV improves but Public LB is weak, suspect original overuse / prior shift
    - Race_Year TE remains from shared001 and may encode strong Year/context effects

model:
  family: RealMLP
  library: pytabkit
  estimator: RealMLP_TD_Classifier
  task: binary classification
  params:
    random_state: 42
    verbosity: 2
    val_metric_name: 1-auc_ovr
    n_ens: 8
    n_epochs: 4
    batch_size: 256
    use_early_stopping: false
    early_stopping_additive_patience: 10
    early_stopping_multiplicative_patience: 1
    lr: 0.03
    wd: 0.018
    sq_mom: 0.98
    lr_sched: lin_cos_log_15
    first_layer_lr_factor: 0.25
    embedding_size: 6
    max_one_hot_cat_size: 18
    hidden_sizes:
      - 512
      - 256
      - 128
    act: silu
    p_drop: 0.05
    p_drop_sched: expm4t
    plr_hidden_1: 16
    plr_hidden_2: 8
    plr_act_name: gelu
    plr_lr_factor: 0.1151
    plr_sigma: 2.33
    ls_eps: 0.01
    ls_eps_sched: sqrt_cos
    add_front_scale: false
    bias_init_mode: neg-uniform-dynamic-2
    tfms:
      - one_hot
      - median_center
      - robust_scale
      - smooth_clip
      - embedding
      - l2_normalize
  runtime_policy:
    preferred_accelerator: GPU T4/L4/A100
    p100_fallback: cpu
    avoid_accelerator: TPU
    note: >
      P100ではPyTorch/CUDA wheelとpytabkitの相性で
      CUDA error: no kernel image is available for execution on the device
      が出ることがあるため、P100のみCPU fallback。
      T4 x2ではCUDA実行を想定する。
  cv:
    scheme: StratifiedKFold
    n_splits: 5
    shuffle: true
    random_state: 42
    original_split: >
      originalも同じStratifiedKFoldでsplitし、各foldでoriginal train側だけを
      competition train foldへconcatする。

hypothesis:
  main: >
    007 RealMLP shared001 min は現時点の単体主軸であり、
    shared_001由来のRealMLP特徴・original row mergeにより高いCV/LBを出した。
    一方、006b/006cで確認したsafe original priorはshared_001には入っていない。
    008では、RealMLPにsafe original priorを追加することで、
    007よりさらにtarget priorを明示的に使えるようになり、単体CV/LBの上積みを狙う。
  expected_effect:
    - 007よりCVまたはPublic LBが改善する
    - 007と同等以上で、007/006bとのblendに効く
    - ORIG_PRIOR_Compound__Stint, ORIG_PRIOR_Race__Stint,
      ORIG_PRIOR_TyreLife_bin10, ORIG_PRIOR_LapTime_Delta_bin10 などが効く
    - 後続blendで007とは少し異なるRealMLP派生として機能する
  risk:
    - RealMLPはすでにoriginal rowsを学習に混ぜており、prior追加が過剰になる
    - original positive rate差により、CVだけ盛られる
    - 007よりPublic LBが落ちる
    - 007との相関が極めて高く、弱い近縁派生になる
    - feature count増加によりRealMLP側でノイズ化する
  failure_pattern:
    - 008が007よりCV/LBともに下がる
    - avg_007_008が007単体を下回る
    - CVは上がるがPublic LBが鈍い
    - 007との相関が高く、blendでも改善しない
    - original prior追加によりfold間ばらつきが増える

