  current_best_before_060:
    attack:
      name: add052_pruned_nm
      cv_auc: 0.9550261129800026
      public_lb: 0.95435
    stable:
      name: add052_pruned_logreg
      cv_auc: 0.9550030438849962
      public_lb: 0.95432

stack:
  fixed_models:
    - "016"
    - "021"
    - "028"
    - "032"
    - "036"
    - "039"
    - "040"
    - "042"
    - "044"
    - "046"
    - "048"
    - "050"
    - "051"
  excluded:
    - "017"
    - "029"
    - "031"
    - "038"
    - "041"
    - "054"
    - "055"
  note: >
    031はCV盛り疑い、054/055は051高相関かつ追加価値なしのため除外。
    本実験では新規モデルを追加しない。

blend_variants:
