success_criteria:
  attack:
    cv_must_exceed: 0.9550261129800026
    public_lb_must_be_at_least: 0.95435
  stable:
    public_lb_must_be_at_least: 0.95432
    prefer_if_cv_exceeds: 0.9550030438849962
  caution: >
    NM multi-restartでCVだけ上がる場合はOOF過適合の可能性がある。
    LogRegまたはNM/LogReg mixの改善をより重視する。

