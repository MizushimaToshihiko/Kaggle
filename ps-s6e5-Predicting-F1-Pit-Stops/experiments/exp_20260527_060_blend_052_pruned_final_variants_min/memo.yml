    interpretation: >
      060のNM multi-restartは052 NMとほぼ同一の重みに収束。
      052 pruned stackのNM解は安定していると見てよい。

  interpretation:
    - >
      060では新規モデル追加なしで、052 pruned stackのblendのみを最終調整した。
    - >
      NM multi-restart単体では実質改善なし。
      052 NMは局所解として大きく外れていない。
    - >
      最も良かったのはNM 70% + LogReg 30%のconvex mix。
      CVは052 NMをわずかに上回り、Public LBは0.95435で同値維持。
    - >
      Public LB更新ではないが、LogRegを混ぜてもPublic bestを維持したため、
      attack/stable中間の最終候補として保持できる。
    - >
      LogReg派生・Ridge派生は現行052 LogRegを上回らず、不採用。

  final_judgement:
    decision: keep_as_intermediate_final_candidate
    reason: >
      060 bestのNM70/LogReg30 mixはCV 0.9550284050で現時点最高CVとなった。
      Public LBは0.95435で052 NMと同値のため、Public更新ではない。
      ただし、NM単体よりLogReg成分を含むため、Private耐性の中間候補として価値がある。
      攻め枠の052 NM、安定枠の052 LogRegに加え、
      最終候補の第三候補として保持する。

  current_candidate_status_after_060:
    attack:
      name: add052_pruned_nm
      cv_auc: 0.9550261129800026
      public_lb: 0.95435
