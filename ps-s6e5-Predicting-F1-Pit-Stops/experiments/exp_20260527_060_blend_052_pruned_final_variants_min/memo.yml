    stable:
      name: add052_pruned_logreg
      cv_auc: 0.9550030438849962
      public_lb: 0.95432
      note: >
        安定枠。LogReg派生ではこれを上回るものなし。
    intermediate:
      name: mix_nm_softmax_raw_restart_nm_base_70_logreg_meta_pruned_30
      cv_auc: 0.9550284050019342
      public_lb: 0.95435
      note: >
        060で得たNM/LogReg中間候補。
        CV最高かつPublic best同値。
        最終提出2枠に入れるかは、攻め枠/安定枠の役割配分で判断する。

  next_action:
    - >
      060 best mixを最終候補表へ追加する。
    - >
      ただしPublic LBは052 NMと同値のため、052 NMを完全置換する必要はない。
    - >
      最終提出候補は、052 NM、052 LogReg、060 mixの3本で比較する。
    - >
      提出枠が2本の場合、Public重視なら052 NM + 060 mix、
      Private耐性重視なら060 mix + 052 LogReg、
      バランス重視なら052 NM + 052 LogRegを検討する。
    - >
      今後さらにモデル追加・RealMLP派生追加は行わず、提出候補選定とファイル確認に移る。

