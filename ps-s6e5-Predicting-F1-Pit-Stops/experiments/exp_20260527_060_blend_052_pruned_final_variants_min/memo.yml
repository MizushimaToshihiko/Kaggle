objective:
  summary: >
    052 pruned stackを固定し、モデル追加なしでblend方法だけを最終調整する。
    目的は、add052_pruned_nm / add052_pruned_logregを上回る候補、
    または両者の中間的なPrivate耐性候補を作れるか確認すること。

base:
