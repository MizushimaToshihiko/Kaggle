  - hc_nonnegative_raw
  - nm_softmax_raw
  - nm_softmax_raw_multi_restart
  - slsqp_signed_raw_neg005
  - ridge_meta_pruned
  - logreg_meta_pruned
  - logreg_meta_pruned_top3_equal
  - logreg_meta_pruned_top5_equal
