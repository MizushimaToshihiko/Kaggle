blend_policy:
  benchmark_code: code_010_add_slsqp_drop020.txt
  add_to_stack:
    - "007"
    - "014"
    - "015"
    - "016"
    - "017"
    - "018"
    - "021"
    - "022"
    - "023"
    - "026"
    - "027"
  decision_focus:
    - single_cv_vs_018_022_023
    - corr_vs_018_022_023
    - nm_hc_slsqp_weight
    - public_lb_if_submitted
  keep_rule: >
    Keep if CV is near existing RealMLP branch and correlation is meaningfully lower,
    or if blend weight remains at least around 0.02.
  drop_rule: >
    Drop if CV is weak, correlation with 018/022/023 is very high,
    and blend weight is near zero.

judgement:
  status: pending
  summary: >
    CV/LB/correlation/blend weight確認後に keep / hold / drop を判断する。

judgement_after_blend:
  status: keep
  summary: >
    027 single CV is lower than the main RealMLP branch models 018/022/023,
    but it receives stable positive weight around 0.058 across NM/HC/SLSQP.
    Correlation with 018/022/023 is still high, but lower than the correlation among 018/022/023 themselves.
    Therefore, 027 is a useful RealMLP branch candidate and should be kept in the blend pool.
  interpretation:
    - 027 is not a new low-correlation outlier, but it is different enough from the 018/022/023 cluster to help.
    - The add027 NM CV 0.9544377638 is the current best CV among recent blends.
    - 027 improves the blend more clearly than another minor LGB variant would.
    - Public LB confirmation is needed before promoting add027 NM to final submission candidate.
  next_action: >
    Submit add027 NM first if slots allow.
    If Public LB is at least 0.95370, keep add027 NM as a final candidate.
    If Public LB improves over 0.95370, promote add027 NM as the new main candidate.
    Do not tune 027 deeply yet; first verify LB conversion.

