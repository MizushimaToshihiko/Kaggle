decision_rule:
  single_model:
    keep: >
      009または007に近いCV/LBを出し、かつ相関が既存coreと少しでもズレている。
    hold: >
      単体は009未満でも、foldが安定し、blendで重みが残る可能性がある。
    drop: >
      009より大幅に弱く、Public LBにも変換されず、blendで重みが消える。
  after_blend:
    keep: >
      010 core + 012 で LogReg / HC / NM / ElasticNet のいずれかが
      CVとPublic LBの両方、または少なくともPublic LBで010を更新する。
      さらに012に自然な正重みが残る。
    hold: >
      blend更新は小さいが、012に一定の重みが残り、既存coreと異なる誤差を持つ。
    drop: >
      add blendで012の重みがゼロ、またはCVだけ上がってPublic LBが鈍い。
  followup_rule:
    if_keep: >
      013で010 coreへの正式追加blendを整理し、最終候補候補に入れる。
    if_hold_but_risky: >
      no_IsOriginalData / no_Race_Year_group_stats / no_TyreAgeRatio_str の危険要素アブレーションを切る。
    if_drop: >
      shared_004系はいったん閉じ、009b less-year-race または shared_002内の外部artifact設計確認へ進む。

notes:
  - >
    shared_004は単一holdout + full-data final model形式だったため、そのままではOOF資産にならない。
    本実験では5fold OOF / pred保存型に変換する。
  - >
    CatBoost GPUではCPU/GPUの暗黙デフォルト差が問題になりうるため、
    bootstrap_type=Bernoulli, subsample=0.8, border_count=254 を明示固定する。
  - >
    original rowsはfold train側へconcatするが、validation foldにはcompetition trainのみを使う。
  - >
    IsOriginalDataはshared_004由来で残す。
    ただしimportance上位かつLB変換が鈍い場合は、危険特徴として後続で削る。
  - >
    011の失敗により、009へのoriginal prior追加は閉じる。
    012は009近傍ではなく、CatBoost large-FE別family候補として評価する。
