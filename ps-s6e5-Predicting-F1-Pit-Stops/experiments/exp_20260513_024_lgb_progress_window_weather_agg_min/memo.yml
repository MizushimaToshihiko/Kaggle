experiment:
  id: exp_20260513_024_lgb_progress_window_weather_agg_min
  title: LGB progress-window TE + Race-Year weather aggregate
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: completed

objective:
  summary: >
    020 LGB progress-window TE を完全なbaseとして維持し、
    Woods Hole FastF1 weather dataset 由来の Race-Year weather aggregate だけを追加する。
    weatherが020 LGB branchの単体CV/LBまたはblend寄与を改善するか確認する。
  base_experiment: exp_20260511_020_lgb_progress_window_te_min
  intended_role: aux_material_or_020_replacement

implementation_check:
  base_code: code_020.txt
  preserved_from_020:
    - shared_003_style_full_FE
    - original_rows_appended_to_each_fold_train
    - target_x_year_stratification
    - seed_ensemble_3407_42
    - lgb_params_from_020
    - gpu_with_cpu_fallback
    - progress_window_base_features
    - progress_window_count_frequency
    - progress_window_target_encoding
  changed_from_020:
    - add_weather_aggregate_by_year_track
    - add_race_to_track_mapping
  not_added:
    - Race_Year_RaceProgressBin
    - 72_bins
    - original_prior
    - pseudo_label
    - Weather_x_target_TE
    - Time_or_RaceProgress_weather_interpolation
    - Normalized_TyreLife_or_proxy

data:
  competition_train: /kaggle/input/competitions/playground-series-s6e5/train.csv
  competition_test: /kaggle/input/competitions/playground-series-s6e5/test.csv
  original: /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
  weather_dataset: /kaggle/input/playground-series-s6-e5-weather-conditions/F1_Weather_2022_2025.csv
  target: PitNextLap
  danger_col:
    name: Normalized_TyreLife
    used: false

features:
  inherited_from_020:
    - shared_003_full_FE
    - RaceProgressBin_20
    - Race_RaceProgressBin_20
    - Race_Compound_RaceProgressBin_20
    - fold_safe_count_frequency_for_progress_window
    - fold_safe_TE_for_progress_window
  added_weather_aggregate:
    level: Year + Track
    join_policy: >
      RaceをTrackへmappingし、Year + Trackでweather aggregateをmergeする。
      実行後に race_to_track_mapping.csv を必ず確認する。
    columns:
      - AirTemp_mean_min_max_std
      - TrackTemp_mean_min_max_std
      - Humidity_mean_min_max_std
      - Pressure_mean_std
      - WindSpeed_mean_max_std
      - Rainfall_mean_max_sum_any_rate
      - TrackTemp_minus_AirTemp_mean_max
      - TrackTemp_range
      - AirTemp_range
      - WetRace
      - WeatherMissing

model:
  family: LightGBM
  seeds:
    - 3407
    - 42
  cv:
    scheme: StratifiedKFold
    stratification: target_x_Year
    n_splits: 5
    shuffle: true
    random_state: 3407
  params:
    n_estimators: 9000
    learning_rate: 0.022
    num_leaves: 31
    min_child_samples: 120
    subsample: 0.88
    subsample_freq: 1
    colsample_bytree: 0.82
    reg_alpha: 0.25
    reg_lambda: 10.0
    max_bin: 255
    class_weight: balanced
    early_stopping_rounds: 450

result:
  cv_auc: 0.9511783121413456
  public_lb: 0.95086
  fold_scores: [0.9503176820577309, 0.9513950648822692, 0.9509613000632188, 0.9512469090320268, 0.9519908383243532]
  compared_to_020:
    cv_020: 0.9510267120359983
    public_lb_020: 0.95075
    delta_cv: 0.0001516
    delta_lb: 0.00011

artifacts:
  notebook: exp_20260513_024_lgb_progress_window_weather_agg_min.ipynb
  oof: oof_exp_20260513_024_lgb_progress_window_weather_agg_min.npy
  pred: pred_exp_20260513_024_lgb_progress_window_weather_agg_min.npy
  submission: submission_exp_20260513_024_lgb_progress_window_weather_agg_min.csv
  feature_importance: feature_importance.csv
  feature_columns: feature_columns.csv
  race_to_track_mapping: race_to_track_mapping.csv
  weather_aggregate: weather_aggregate_year_track.csv

blend_policy:
  benchmark_code: code_010_add_slsqp.txt
  compare_methods:
    - nm_softmax_raw
    - hc_nonnegative_raw
    - logreg_meta_all
    - slsqp_signed_raw_neg005
  add_or_replace: >
    まず020置換候補として評価する。
    020よりCV/LBが改善する、またはCV同等でも既存stackとの相関が下がる場合のみ
    blend benchmarkに投入する。

judgement:
  status: pending
  summary: >
    CV/LB/相関確認後に keep / hold / drop を判断する。
