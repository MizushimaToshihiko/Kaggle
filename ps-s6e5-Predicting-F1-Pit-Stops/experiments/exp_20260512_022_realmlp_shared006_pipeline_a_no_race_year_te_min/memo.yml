experiment:
  id: exp_20260512_022_realmlp_shared006_pipeline_a_no_race_year_te_min
  title: RealMLP shared006 Pipeline A without Race-Year target encoding
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done

objective:
  summary: >
    018 RealMLP shared006 Pipeline A をベースにし、
    Race_Year_ combo 自体は残したまま、_Race_Year_TE だけを削除する。
    目的は、018の強さを大きく壊さずに、Year artifact寄りのtarget encoding依存を少し弱め、
    018とは異なる誤差を持つ安全寄りRealMLP派生を作ること。
    022は018の置換候補ではなく、018と併用できる低相関補助素材として評価する。

  success_criteria:
    - raw CV AUC を取得
    - Public LB を取得
    - oof / pred を npy で保存
    - oof csv / submission csv を保存
    - fold_scores.csv を保存
    - feature_columns.csv / combo_features.csv / target_encoding_features.csv を保存
    - cv_result.json を保存
    - 018との相関を確認
    - current best stack に追加して Avg / Ridge / ElasticNet / LogReg / HC / NM で比較する

positioning:
  experiment_type: core_model_derivative
  intended_role: safer_realmlp_aux_material
  base_family: realmlp
  base_reference: exp_20260510_018_realmlp_shared006_pipeline_a_min
  why_now: >
    018は現在のstackで最大級の重みを持つcore素材であり、
    単体CV/LBも強い。
    そのため018の派生を作ることは、同じRealMLP family内で
    低相関・安全寄り素材を増やす観点では合理的である。
    一方、S6E5ではYear artifactが強く、Race_Year_TEは強力だがPrivate耐性リスクもある。
    そこでRace_Year_ comboは残しつつ、target encoding版だけを削除する。

data:
  train_path_candidates:
    - /kaggle/input/competitions/playground-series-s6e5/train.csv
    - /kaggle/input/playground-series-s6e5/train.csv
  test_path_candidates:
    - /kaggle/input/competitions/playground-series-s6e5/test.csv
    - /kaggle/input/playground-series-s6e5/test.csv
  original_path_candidates:
    - /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
    - /kaggle/input/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
  target: PitNextLap
  target_candidates:
    - PitNextLap
    - PitNextLab
  id_col: id
  danger_col: Normalized_TyreLife
  danger_col_used: false
  original_usage:
    use_original_rows: true
    original_split: true
    policy: >
      Same as 018.
      Competition train is split by StratifiedKFold.
      Original rows are also split by StratifiedKFold, and only original fold-train side is appended to each fold train.
      Original fold-holdout side is not used for competition validation.
    note: >
      This is inherited from shared006 Pipeline A / 018.
      Normalized_TyreLife is explicitly dropped from original before feature construction.
  forbidden_columns:
    - Normalized_TyreLife
    - Normalized_TyreLife proxy
    - stint endpoint proxy
    - pseudo label

cv:
  scheme: StratifiedKFold
  n_splits: 5
  shuffle: true
  random_state: 42
  original_split:
    enabled: true
    scheme: StratifiedKFold
    n_splits: 5
    shuffle: true
    random_state: 42
    usage: >
      For each fold, original train-side rows are appended to competition fold train.
      Original validation-side rows are held out and not used.
  target_encoding:
    library: sklearn.preprocessing.TargetEncoder
    cv: 5
    smooth: auto
    shuffle: true
    random_state: 42
    source_columns_used:
      - Race_Compound_
    source_columns_removed:
      - Race_Year_
    output_features_used:
      - _Race_Compound_TE
    output_features_removed:
      - _Race_Year_TE
  note: >
    Fold-safe TargetEncoder is fit inside each outer fold after original fold-train rows are appended.
    022 intentionally creates only _Race_Compound_TE and does not create _Race_Year_TE.

model:
  family: RealMLP
  estimator: pytabkit.RealMLP_TD_Classifier
  params:
    random_state: 42
    verbosity: 2
    val_metric_name: 1-auc_ovr
    n_ens: 8
    n_epochs: 4
    batch_size: 256
    use_early_stopping: false
    lr: 0.03
    wd: 0.018
    sq_mom: 0.98
    lr_sched: lin_cos_log_15
    first_layer_lr_factor: 0.25
    embedding_size: 6
    max_one_hot_cat_size: 18
    hidden_sizes:
      - 512
      - 256
      - 128
    act: silu
    p_drop: 0.05
    p_drop_sched: expm4t
    plr_hidden_1: 16
    plr_hidden_2: 8
    plr_act_name: gelu
    plr_lr_factor: 0.1151
    plr_sigma: 2.33
    ls_eps: 0.01
    ls_eps_sched: sqrt_cos
    add_front_scale: false
    bias_init_mode: neg-uniform-dynamic-2
    tfms:
      - one_hot
      - median_center
      - robust_scale
      - smooth_clip
      - embedding
      - l2_normalize
  note: >
    Model parameters are unchanged from 018.
    022 is a feature ablation only.
    No Optuna or parameter tuning is performed.

features:
  base_features:
    source: exp_20260510_018_realmlp_shared006_pipeline_a_min
    expected_feature_count_before_te: 37
    expected_feature_count_after_te: 38
    comparison_to_018:
      expected_feature_count_after_te_018: 39
      removed_features_vs_018:
        - _Race_Year_TE
      total_removed_features_vs_018: 1
    summary: >
      Same as 018 except that _Race_Year_TE is not created.
      Race_Year_ combo itself remains in the feature matrix.
      Race_Compound_ and _Race_Compound_TE remain.

  raw_columns_used:
    categorical:
      - Driver
      - Compound
      - Race
    numeric:
      - Year
      - PitStop
      - LapNumber
      - Stint
      - TyreLife
      - Position
      - LapTime (s)
      - LapTime_Delta
      - Cumulative_Degradation
      - RaceProgress
      - Position_Change

  domain_ratio_features:
    - _LP_RP
    - _TL_LP
  domain_ratio_definitions:
    _LP_RP: LapNumber / RaceProgress
    _TL_LP: TyreLife / LapNumber

  numeric_floor_categorical_features:
    method: >
      For each numeric base column and the two ratio columns,
      floor(value) is factorized using train-fitted categories and stored as string categorical feature.
    expected_examples:
      - Year_cat_
      - PitStop_cat_
      - LapNumber_cat_
      - Stint_cat_
      - TyreLife_cat_
      - Position_cat_
      - LapTime (s)_cat_
      - LapTime_Delta_cat_
      - Cumulative_Degradation_cat_
      - RaceProgress_cat_
      - Position_Change_cat_
      - LP_RP_cat_
      - TL_LP_cat_

  count_encoding:
    columns:
      - Driver
      - Compound
      - Race
      - Year_cat_
      - PitStop_cat_
    output_examples:
      - _Driver_count
      - _Compound_count
      - _Race_count
      - _Year_cat_count
      - _PitStop_cat_count
    fit_scope: competition train feature table
    note: >
      Count maps are fitted during pipeline_a_fe(fit=True) on competition train,
      then applied to test and original.

  quantile_bin_features:
    - RaceProgress_200_qbin_
  quantile_bin_method:
    column: RaceProgress
    n_bins: 200
    strategy: quantile
    encoder: KBinsDiscretizer
    fit_scope: competition train feature table

  combo_features:
    kept:
      - Race_Compound_
      - Race_Year_
    removed:
      - none
    note: >
      Race_Year_ is still kept as a categorical combo feature.
      Only its target-encoded derivative is removed.

  fold_target_encoding:
    enabled: true
    input_columns_used:
      - Race_Compound_
    input_columns_removed:
      - Race_Year_
    output_features_used:
      - _Race_Compound_TE
    output_features_removed:
      - _Race_Year_TE
    method: >
      sklearn TargetEncoder is fit inside each outer fold on Xtr/ytr after original fold-train rows are appended.
      Validation and test are transformed using that fold encoder.
      022 intentionally does not fit/transform Race_Year_ through TargetEncoder.

  changed_from_018:
    - Keep Race_Year_ combo feature.
    - Remove _Race_Year_TE.
    - Keep Race_Compound_ combo feature.
    - Keep _Race_Compound_TE.
  unchanged_from_018:
    - Pipeline A feature construction
    - original split concat policy
    - RealMLP parameters
    - RaceProgress_200_qbin_
    - Race_Compound_
    - Race_Year_
    - PitStop-related raw/categorical/count features
    - Normalized_TyreLife drop policy

  guardrails:
    - Race_Year_ must exist in final_feature_columns.
    - Race_Compound_ must exist in final_feature_columns.
    - _Race_Compound_TE must exist in final_feature_columns.
    - _Race_Year_TE must not exist in final_feature_columns.
    - target_encoding_features.csv should contain _Race_Compound_TE only.
    - Normalized_TyreLife must not exist in any feature list.

  risk_features_to_watch:
    - PitStop
    - PitStop_cat_
    - _PitStop_cat_count
    - Race_Year_
    - LapTime_Delta_cat_
    - Cumulative_Degradation_cat_
  normalized_tyrelife_policy:
    - Normalized_TyreLife is dropped.
    - Direct use is forbidden.
    - Intentional proxy reconstruction is not added.

implementation_notes:
  order:
    - Copy 018 notebook.
    - Change EXP_ID to exp_20260512_022_realmlp_shared006_pipeline_a_no_race_year_te_min.
    - Keep pipeline_a_fe unchanged.
    - Keep combo_names creation unchanged.
    - In fold loop, set TE source columns to Race_Compound_ only.
    - Do not create _Race_Year_TE.
    - Save OOF/pred artifacts using 022 EXP_ID.
    - Add guardrails to confirm Race_Year_ exists and _Race_Year_TE does not exist.
  critical_point: >
    Do not remove Race_Year_ combo itself.
    This experiment removes only the fold-safe target encoding for Race_Year_.
    Removing Race_Year_ itself would be a different and more destructive ablation.

hypothesis:
  main: >
    018's large blend contribution may partially rely on _Race_Year_TE,
    which is likely strong but Year-artifact-sensitive.
    Removing _Race_Year_TE will probably reduce single CV/LB slightly,
    but may create a safer and slightly different RealMLP prediction that can coexist with 018.
  positive_pattern: >
    022 keeps CV above roughly 0.9530 and receives positive weight when added to the current best stack with 018.
    Ideally, 022 has lower correlation with 018 and 3%以上の自然なblend weight.
  failure_pattern: >
    022 single CV drops too much or remains almost identical to 018 while receiving zero weight.
    In that case, removing _Race_Year_TE does not produce useful diversity.
  important_caution: >
    022 is not expected to replace 018.
    If 022 is useful, it should be kept as a thin additional RealMLP derivative alongside 018.

