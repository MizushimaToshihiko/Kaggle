decision_rule:
  single_model:
    keep: >
      CV remains above roughly 0.9530 and correlation with 018 decreases enough to suggest useful diversity.
    hold: >
      CV is 0.9525〜0.9530 but blend weight is positive.
    drop: >
      CV is below 0.9525 or blend weight is zero/near-zero.
  after_blend:
    keep: >
      022 receives meaningful positive weight while 018 remains core,
      and the stack improves or maintains CV/Public LB.
      Practical threshold: 022 weight >= 0.03 in HC/NM/LogReg/ElasticNet,
      or clear improvement in Public LB/CV.
    hold: >
      022 receives 0.01〜0.03 weight and does not harm Public LB.
      Keep as optional safety/diversity material.
    drop: >
      022 receives zero or near-zero weight.
      Stop 018 derivative branch for now.
  next_action_if_keep: >
    If 022 is useful, consider one more small derivative only:
    no_PitStop_cat_count or no_Race_Year_combo.
    Do not run many 018 derivatives.
  next_action_if_drop: >
    Do not continue 018 derivative exploration immediately.
    Return to final candidate selection or external shared-code search.

notes:
  - >
    022 uses the date 2026-05-12 in the experiment ID:
    exp_20260512_022_realmlp_shared006_pipeline_a_no_race_year_te_min.
  - >
    022 is a strict derivative of 018.
    It is not a new model family.
  - >
    The only intended feature change is removing _Race_Year_TE.
  - >
    Race_Year_ combo remains.
    Removing Race_Year_ itself is not part of this experiment.
  - >
    018 remains the core RealMLP model.
    022 should be judged as an additive diversity/safety candidate, not as an 018 replacement.
  - >
    Since the expected effect is small, blend weight matters more than single CV.
  - >
    If 022 does not receive positive blend weight, do not waste further time on minor 018 ablations.
