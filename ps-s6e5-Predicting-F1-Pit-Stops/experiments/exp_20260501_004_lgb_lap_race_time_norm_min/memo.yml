  feature_importance_notes: >
    実行後にadded featuresが上位に入ったかを記載する。

artifacts:
  outdir: /kaggle/working/exp_20260501_004_lgb_lap_race_time_norm_min
  expected_files:
    - oof_exp_20260501_004_lgb_lap_race_time_norm_min.npy
    - pred_exp_20260501_004_lgb_lap_race_time_norm_min.npy
    - submission_exp_20260501_004_lgb_lap_race_time_norm_min.csv
    - cv_result.json
    - feature_columns.csv
    - feature_importance.csv
    - feature_importance_by_fold.csv
  save_for_blend: true

decision:
  judgment: pending
  keep_condition:
    - 001 LGB RAW baselineをCV/LBで明確に上回る
    - 003 LGB Compound系FEをCV/LBで上回る
    - added features が feature importance 上位に入る
    - 002 CatBoost RAWと相関が少しでもズレ、blendでAUCが改善する
  hold_condition:
    - 001/003より少し改善するが002には遠い
    - 単体は弱いが002との相関が十分に低い
    - added featuresの一部が効いており、CatBoost版やXGB版で再利用価値がある
  drop_condition:
    - 001または003と同等以下
    - added features がほぼ使われない
    - 002と高相関で、かつ単体性能も弱い
    - avg_002_004 が002単体を大きく下回る
  next_action_after_run:
    - Public LBを提出して記録
    - 001/002/003/004のOOF相関確認
    - avg_002_004, avg_001_002_004, avg_001_002_003_004 のCV確認
    - 効いた場合は 005_cat_lap_race_time_norm_min を検討
    - 効かなかった場合は original_schema_check または Race x LapNumber を隔離実験で検討
