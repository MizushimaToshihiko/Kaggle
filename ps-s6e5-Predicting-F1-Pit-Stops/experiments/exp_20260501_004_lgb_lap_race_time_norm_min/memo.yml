artifacts:
  outdir: /kaggle/working/exp_20260501_004_lgb_lap_race_time_norm_min
  expected_files:
    - oof_exp_20260501_004_lgb_lap_race_time_norm_min.npy
    - pred_exp_20260501_004_lgb_lap_race_time_norm_min.npy
    - submission_exp_20260501_004_lgb_lap_race_time_norm_min.csv
    - cv_result.json
    - feature_columns.csv
    - feature_importance.csv
    - feature_importance_by_fold.csv
  save_for_blend: true

decision:
  judgment: hold
  reason: >
    004は001 LGB RAW baselineおよび003 LGB Compound系FEをCV/LBともに更新した。
    Race/Driver相対化とTyreLife/RaceProgress系interactionはLGBMに対して一定の効果がある。
    一方で、002 CatBoost RAW baselineにはCV/LBともに大きく届かず、
    avg_002_004も002単体を下回った。
    したがって、現時点では主軸候補でも強いblend素材でもなく、
    LGB系の部品候補としてholdする。
  next_action:
    - 004をそのままCatBoostへ移植する優先度は中程度
    - 先に001b_original_schema_checkを実施してoriginalの列差分とNormalized_TyreLifeの扱いを確定する
    - 次の主実験は002 CatBoost RAWを基準にしたCatBoost safe FE、またはoriginal prior最小版を検討する
