decision_rule:
  single_model:
    keep: >
      020 improves materially over 009 single CV/LB.
      This means progress-window TE improves the LGB family directly.
    hold: >
      020 is close to 009 and has meaningfully different correlation,
      or improves blend despite small single-model difference.
    drop: >
      020 does not improve 009 and does not receive positive blend weight.
  after_blend:
    keep: >
      020 receives meaningful positive weight in HC/NM/LogReg/ElasticNet
      and improves or maintains the 019 compressed stack Public LB/CV.
    hold: >
      020 receives small positive weight without hurting Public LB.
      Keep as optional LGB diversity material.
    drop: >
      020 is zero-weight or worsens optimized blends.
      In that case, progress-window signal is already absorbed elsewhere.
  next_action_if_keep: >
    If 020 is useful, consider one cautious follow-up only:
    RaceProgressBin_40 or remove 009 and keep 020.
    Do not jump to Race_Year_RaceProgressBin unless final risk-taking is justified.
  next_action_if_drop: >
    Close this EDA-derived FE branch.
    Do not spend more time on track-avatar-inspired features.

notes:
  - >
    020 is based on 009 LGB shared003 full-FE single.
    It is not a new model family.
  - >
    The motivating EDA uses stylized track avatars, not real circuit geometry.
    The useful signal is not the drawn track shape, but the empirical
    Race × RaceProgress pit-window pattern.
  - >
    RaceProgressBin_20 is intentionally coarse.
    72-bin features are suitable for visualization but too fine for a first model feature test.
  - >
    Year is intentionally excluded from progress-window interaction features
    to avoid amplifying the known Year artifact.
  - >
    PitStop remains dropped from the LGB feature matrix following 009/shared003 policy.
  - >
    020 should be judged by both 009 replacement value and 019 compressed stack blend value.
  - >
    Expected improvement is modest.
    This experiment is a low-cost check of an EDA-derived interaction, not a high-confidence breakthrough.
