experiment:
  id: exp_20260511_020_lgb_progress_window_te_min
  title: LGB shared003 with RaceProgress window TE
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done

objective:
  summary: >
    009 LGB shared003 full-FE single をベースにし、
    RaceProgress上のpit windowを直接表す progress-window 特徴を追加する。
    EDAディスカッションで示された「RaceごとにRaceProgress上のPitNextLap率が異なる」
    という構造を、Race × RaceProgressBin および
    Race × Compound × RaceProgressBin のfold-safe count/frequency/TEとしてLGBに与える。
    目的は、009 LGB familyを少しズラした追加blend素材になるか確認すること。
  success_criteria:
    - raw CV AUC を取得
    - Public LB を取得
    - oof / pred を npy で保存
    - feature_columns.csv / feature_importance.csv を保存
    - progress_window_features_020.csv を保存
    - cv_result.json を保存
    - 009単体と比較する
    - 019 compressed stack に追加または009置換して、Avg / Ridge / ElasticNet / LogReg / HC / NM で比較する

positioning:
  experiment_type: feature_engineering_ablation
  intended_role: lgb_progress_window_aux_material_or_009_replacement
  base_family: lightgbm
  base_reference: exp_20260503_009_lgb_shared003_full_fe_single_min
  why_now: >
    019 compressed stack は 007/009/014/015/016/017/018 で
    NM Public LB 0.95368 まで到達している。
    一方、EDAではRaceごとにRaceProgress上のpit windowが明確に異なることが示された。
    既存モデルにもRaceProgressやRace_Compound等は入っているが、
    Race × RaceProgressBin を直接fold-safe TEとして入れたLGB素材は未確認である。
    そのため、009 LGBをベースに progress-window TE を追加し、
    009の更新または併用価値を確認する。

data:
  train_path: /kaggle/input/competitions/playground-series-s6e5/train.csv
  test_path: /kaggle/input/competitions/playground-series-s6e5/test.csv
  sample_submission_path: /kaggle/input/competitions/playground-series-s6e5/sample_submission.csv
  original_path: /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
  target: PitNextLap
  id_col: id
  danger_col: Normalized_TyreLife
  danger_col_used: false
  original_usage:
    use_original_rows: true
    policy: >
      Same as 009.
      Original rows are appended to each fold train side.
      Competition validation rows only are used for OOF.
    note: >
      Normalized_TyreLife is explicitly dropped from original.
      No original prior, pseudo label, or intentional proxy reconstruction is added.
  forbidden_columns:
    - Normalized_TyreLife
    - Normalized_TyreLife proxy
    - stint endpoint proxy
    - pseudo label
    - original prior

cv:
  scheme: StratifiedKFold
  n_splits: 5
  shuffle: true
  random_state: 3407
  stratification: target x Year
  seeds:
    - 3407
    - 42
  note: >
    CV setup follows 009.
    For each fold and each seed, LightGBM is trained and predictions are averaged.

model:
  family: LightGBM
  estimator: LGBMClassifier
  params:
    n_estimators: 9000
    learning_rate: 0.022
    num_leaves: 31
    min_child_samples: 120
    subsample: 0.88
    subsample_freq: 1
    colsample_bytree: 0.82
    reg_alpha: 0.25
    reg_lambda: 10.0
    max_bin: 255
    class_weight: balanced
    early_stopping_rounds: 450
    device_requested: gpu
    gpu_use_dp: false
    cpu_fallback: true
  note: >
    Parameters are unchanged from the 009-style LGB full-FE implementation.
    This experiment changes features only.

features:
  base_features:
    source: exp_20260503_009_lgb_shared003_full_fe_single_min
    summary: >
      shared003-style LGB full-FE single.
      Includes base F1 columns, compact domain features, bin features,
      interaction categories, frequency features, lag features,
      and fold-safe target encoding.
  dropped_columns:
    - id
    - PitNextLap
    - _dataset
    - PitStop
  pitstop_policy: >
    PitStop is dropped following shared003-style leakage control.
    020 does not reintroduce PitStop.
  existing_feature_blocks:
    base_categorical:
      - Driver
      - Compound
      - Race
    base_numeric:
      - Year
      - LapNumber
      - Stint
      - TyreLife
      - Position
      - LapTime (s)
      - LapTime_Delta
      - Cumulative_Degradation
      - RaceProgress
      - Position_Change
    domain_features:
      examples:
        - EstimatedTotalLaps
        - LapsRemaining
        - TyreAgeRatio
        - DegPerTyreLap
        - PositionPressure
        - LapProgress_x_LapNumber
        - LapPerTyreLife
        - LapMinusTyreLife
        - TyreLifeMinusLap
        - TyreAgeVsRace
        - PitWindowPressure
        - TyreLife_x_RaceProgress
        - DegPerRaceLap
        - DeltaPerTyreLap
        - DeltaAbs
        - LapTimeDeltaPositive
        - LapTimeDeltaNegative
        - Abs_Cumulative_Degradation
        - Positive_Degradation
        - Abs_Position_Change
        - Gained_Position
        - Lost_Position
        - StintPressure
        - TyreLife_x_Stint
        - Stint_x_LapNumber
        - Is_First_Stint
        - Is_Late_Stint
        - Early_Race
        - Mid_Race
        - Late_Race
    bins:
      - RaceProgressBin
      - TyreLifeBin
    interaction_categories:
      - Driver_Compound
      - Race_Compound
      - Race_Year
      - Driver_Race
      - Driver_Year
      - Stint_Compound
      - Compound_TyreLifeBin
      - Compound_RaceProgressBin
    frequency_features:
      source_columns:
        - Driver
        - Race
        - Compound
        - Driver_Race
        - Race_Year
        - Year_str
    lag_features:
      examples:
        - Delta_lag1
        - Delta_roll3_mean
        - Deg_diff
        - TyreLife_growth
        - LapTime_lag1
        - LapTime_diff
    existing_target_encoding:
      columns:
        - Driver
        - Race_Year
        - Driver_Race
        - Driver_Year
        - Race
        - Stint_Compound
      output_features:
        - TE_Driver
        - TE_Race_Year
        - TE_Driver_Race
        - TE_Driver_Year
        - TE_Race
        - TE_Stint_Compound

  progress_window_020:
    enabled: true
    rationale: >
      EDA shows that PitNextLap risk varies strongly by Race and RaceProgress.
      Race × RaceProgressBin directly represents race-specific pit windows.
      Race × Compound × RaceProgressBin adds tyre strategy context.
      Year is intentionally excluded to avoid amplifying Year artifact.
    bins: 20
    base_features:
      - RaceProgressBin_20
      - Race_RaceProgressBin_20
      - Race_Compound_RaceProgressBin_20
    base_feature_definitions:
      RaceProgressBin_20: >
        floor(clip(RaceProgress, 0, 1) * 20), clipped to 0..19, stored as string.
      Race_RaceProgressBin_20: >
        Race + "_" + RaceProgressBin_20.
      Race_Compound_RaceProgressBin_20: >
        Race + "_" + Compound + "_" + RaceProgressBin_20.
    fold_count_frequency_features:
      fit_scope: outer fold train only after original rows are appended
      features:
        - RaceProgressBin_20_fold_count
        - RaceProgressBin_20_fold_freq
        - Race_RaceProgressBin_20_fold_count
        - Race_RaceProgressBin_20_fold_freq
        - Race_Compound_RaceProgressBin_20_fold_count
        - Race_Compound_RaceProgressBin_20_fold_freq
    fold_target_encoding:
      library: sklearn.preprocessing.TargetEncoder
      fit_scope: outer fold train only after original rows are appended
      cv: 5
      smooth: auto
      shuffle: true
      random_state: 3407
      source_columns:
        - Race_RaceProgressBin_20
        - Race_Compound_RaceProgressBin_20
      output_features:
        - TE_Race_RaceProgressBin_20
        - TE_Race_Compound_RaceProgressBin_20
    expected_added_feature_count: 11
    not_added:
      - Race_Year_RaceProgressBin_20
      - TE_Race_Year_RaceProgressBin_20
      - 72bin progress features
      - Race_Driver_RaceProgressBin_20
      - pseudo label
      - original prior
      - Normalized_TyreLife proxy
    guardrails:
      - RaceProgressBin_20 must exist in train/orig/test feature tables before FEATURE_COLS_BASE is created.
      - Race_RaceProgressBin_20 must exist in final_features.
      - Race_Compound_RaceProgressBin_20 must exist in final_features.
      - TE_Race_RaceProgressBin_20 must exist in final_features.
      - TE_Race_Compound_RaceProgressBin_20 must exist in final_features.
      - Race_Year_RaceProgressBin_20 must not exist in final_features.
      - TE_Race_Year_RaceProgressBin_20 must not exist in final_features.

implementation_notes:
  order:
    - Load train/test/original.
    - Drop Normalized_TyreLife from original.
    - Build shared003-style all_df features.
    - Split all_df into train_fe / orig_fe / test_fe.
    - Apply add_progress_window_base_features to train_fe / orig_fe / test_fe.
    - Restore target dtype.
    - Add progress-window columns to CAT_COLS_FINAL.
    - Build FEATURE_COLS_BASE.
    - OrdinalEncode categorical columns.
    - In each fold, append original rows to fold train.
    - Apply existing fold-safe TE.
    - Apply 020 fold-safe count/frequency for progress-window columns.
    - Apply 020 fold-safe TE for progress-window interaction columns.
    - Train LightGBM.
  critical_point: >
    add_progress_window_base_features must be called before FEATURE_COLS_BASE is created.
    If called later, the new columns will not enter the model.

hypothesis:
  main: >
    If Race-specific pit windows are not fully captured by existing 009 features,
    then Race_RaceProgressBin_20 and Race_Compound_RaceProgressBin_20 fold-safe TE/count features
    should improve 009 or provide a slightly different LGB material for blending.
  positive_pattern: >
    020 single CV/LB improves over 009, or 020 receives positive weight when added to the 019 compressed stack.
  failure_pattern: >
    020 single CV/LB does not improve over 009 and receives zero or near-zero blend weight.
    This would imply that the progress-window signal is already absorbed by 009/014/015/018.
  important_caution: >
    Do not add Year to progress-window features in this experiment.
    Race_Year_RaceProgressBin may overfit Year artifact and should be a separate high-risk experiment only if needed.

