  cv_result: cv_result.json
  feature_columns: feature_columns.csv
  feature_columns_detail: feature_columns_detail.csv

blend_policy:
  benchmark_code: 033_based_simplified
  standard_stack_after_038:
    - "014"
    - "015"
    - "016"
    - "017"
    - "021"
    - "026"
    - "028"
    - "029"
    - "032"
    - "036"
    - "038"
    - "039"
  exclude_by_default:
    - "037"
  decision_focus:
    - single_cv_vs_038
    - corr_vs_038
    - corr_vs_036
    - corr_vs_029
    - nm_weight_039
    - logreg_pruned_or_kept
    - whether_add039_nm_exceeds_add038_nm
    - whether_add039_logreg_exceeds_add038_logreg
    - public_lb_if_submitted
  keep_rule: >
    Keep if 039 maintains reasonable single strength and improves add039 NM or LogReg.
  hold_rule: >
    Hold if single CV is acceptable and 039 receives non-trivial blend weight, even without immediate Public update.
  drop_rule: >
    Drop if 039 is a weaker high-correlation copy of 038 and receives near-zero blend weight.

judgement:
  status: pending
  summary: >
    CV/LB/correlation/blend weight確認後に keep / hold / drop を判断する。
