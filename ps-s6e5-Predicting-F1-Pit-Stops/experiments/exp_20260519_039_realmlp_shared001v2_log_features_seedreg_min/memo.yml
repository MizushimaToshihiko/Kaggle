experiment:
  id: exp_20260519_039_realmlp_shared001v2_log_features_seedreg_min
  title: RealMLP shared001v2 LOG feature variant on 038 seed/reg settings
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: completed

objective:
  summary: >
    038 RealMLP shared001v2 seed/regularization variantをbaseとして、
    seed・正則化・epoch・Race_Year_TE・raw PitStopは維持し、
    LOG系の数値変換特徴だけを追加する。
    038近傍で相関を少しずらし、NM/LogReg blendに残るか確認する。
  base_experiment: exp_20260518_038_realmlp_shared001v2_seed_reg_variant_min
  intended_role: 038_log_feature_variant

source:
  reference_code: ps-s6e5-038-realmlp-shared001v2-seed-reg-valiant.ipynb
  model_family: RealMLP
  notes:
    - RealMLP_TD_Classifier
    - 038 variant
    - LOG-style numerical transform features added
    - Race_Year_TE remains used
    - PitStop remains used
    - PitStop_cat_ and _PitStop_cat_count remain used
    - Normalized_TyreLife is dropped if present
    - n_epochs remains 6
    - seed/p_drop/wd are unchanged from 038

changes_from_038:
  added_features:
    - log1p_abs_LapTime_Delta
    - signed_log1p_abs_LapTime_Delta
    - log1p_abs_Cumulative_Degradation
    - signed_log1p_abs_Cumulative_Degradation
    - log1p_TyreLife
    - log1p_LapNumber
    - log1p_abs_Position_Change
  kept:
    seed: 2026
    random_state: 2026
    p_drop: 0.07
    wd: 0.020
    feature_set_base: 038
    n_epochs: 6
    batch_size: 256
    lr: 0.01
    n_ens: 24
    hidden_sizes:
      - 512
      - 256
      - 128
    Race_Year_TE: true
    raw_PitStop: true

data:
  competition_train: /kaggle/input/competitions/playground-series-s6e5/train.csv
  competition_test: /kaggle/input/competitions/playground-series-s6e5/test.csv
  original: /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
  target: PitNextLap
  caution:
    - raw PitStop remains used
    - Race_Year_TE remains used
    - Normalized_TyreLife is dropped
    - No Normalized_TyreLife proxy is added
    - No future endpoint proxy is added

features:
  combo_features: ['Race_Compound_', 'Race_Year_']
  target_encoding_columns: ['Race_Compound_', 'Race_Year_']
  target_encoding_names: ['_Race_Compound_TE', '_Race_Year_TE']
  log_features_039: ['log1p_abs_LapTime_Delta', 'signed_log1p_abs_LapTime_Delta', 'log1p_abs_Cumulative_Degradation', 'signed_log1p_abs_Cumulative_Degradation', 'log1p_TyreLife', 'log1p_LapNumber', 'log1p_abs_Position_Change']
  notable_features:
    - PitStop
    - PitStop_cat_
    - _PitStop_cat_count
    - Race_Year_
    - _Race_Year_TE
    - RaceProgress_200_quantile_bin_
    - LapTime (s)_7_quantile_bin_
    - floored_numerical_categories
    - count_encoding
  note: >
    039 is not a feature deletion experiment. It is 038 plus the listed LOG features only.

model:
  family: RealMLP
  estimator: RealMLP_TD_Classifier
  folds: 5
  seed: 2026
  params:
    n_ens: 24
    n_epochs: 6
    batch_size: 256
    lr: 0.01
    wd: 0.02
    p_drop: 0.07
    hidden_sizes: [512, 256, 128]
    ls_eps: 0.01

