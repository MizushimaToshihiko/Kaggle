judgement_after_036:
  status: promote
  summary: >
    036 is successful.
    Removing only _Race_Year_TE from 029 preserved single-model strength and created a useful 029 variant.
    Although 036 remains highly correlated with 029, optimized blends assign 036 the largest weight
    while keeping 029 and 032 positive. Submitted NM improves Public LB to 0.95429,
    and submitted LogReg improves the stable backup to 0.95422.
    This is the first clear Public update after the add029/add032/add033 plateau.

  interpretation:
    - 036 should be promoted to the current main stack.
    - 036 does not replace 029 completely; 029 still keeps positive blend weight.
    - 036 and 029 should be kept together for now.
    - 032 remains useful as a secondary NN branch.
    - The Year-light direction is validated.
    - 037 PitStop-light variant is now worth doing, because the 029-variant strategy worked.

  current_candidate_priority:
    primary:
      name: add036_nm
      public_lb: 0.95429
      role: current_public_best

    stable_backup:
      name: add036_logreg
      public_lb: 0.95422
      role: current_best_LogReg_backup

    hold_private_diversity:
      - name: add032_nm
        public_lb: 0.95424
      - name: add033_nm
        public_lb: 0.95424
      - name: add029_nm
        public_lb: 0.95424

    not_promoted:
      - "030"
      - "031"
      - "034"
      - "035"

  decision:
    keep_036: true
    include_036_in_standard_stack: true
    replace_029_with_036: false
    keep_029_and_036_together: true
    next_029_variant_strategy: continue

  next_action: >
    Proceed to 037: 029 PitStop-light variant.
    Because 036 confirmed that a controlled 029 variant can improve both NM and LogReg,
    the next best experiment is to weaken a different dependency axis, namely PitStop-related derived features,
    while trying to preserve 029-level strength.
