artifacts:
  outdir: /kaggle/working/exp_20260501_001b_original_schema_check
  expected_files:
    - check_result.json
    - schema_summary.json
    - original_csv_candidates.csv
    - train_only_vs_original.csv
    - original_only_vs_train.csv
    - dtype_missing_nunique_comparison.csv
    - categorical_value_rate_comparison.csv
    - numeric_distribution_comparison.csv
    - target_distribution_summary.json
    - original_vs_train_target_priors_by_category.csv
    - normalized_tyrelife_danger_summary.json
    - normalized_tyrelife_target_rate_by_bin.csv
    - normalized_tyrelife_proxy_inspection_sample.csv
    - row_overlap_summary.json
  creates_oof: false
  creates_prediction: false
  creates_submission: false
  save_for_blend: false

decision:
  judgment: pending
  proceed_to_original_prior_min_condition:
    - original_only_vs_train が Normalized_TyreLife のみ、または列対応が明確である
    - Compound列名が competition と original で一致、または安全に対応表を作れる
    - target率が大きく乖離していない
    - 主要特徴量の分布差が極端ではない
    - Normalized_TyreLifeを除外したoriginal priorなら安全に試せる
  stop_original_usage_condition:
    - originalとcompetition train/testのschema差が大きい
    - target率や主要特徴量分布が大きく異なる
    - カテゴリ値の対応が曖昧
    - Normalized_TyreLife由来の情報を除外すると使える情報が乏しい
  next_action_after_run:
    - check_result.json と schema_summary.json を確認
    - Normalized_TyreLife はmainline禁止扱いを維持
    - 条件が良ければ 006_original_prior_min_without_normalized を作る
    - 条件が悪ければ 005_cat_safe_fe_min を先に進める
