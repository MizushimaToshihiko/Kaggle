decision:
  judgment: pending
  keep_condition:
    - 007単体CVを明確に上回るblend候補がある
    - Ridge/ElasticNet/LogRegの少なくとも1つが007単体を上回る
    - 009に正の重みが付く
    - 007/008/009の3本構成が安定して強い
    - Public LBが007単体を上回る、または大きく悪化しない
  hold_condition:
    - HC/NMでは強いが、Ridge/ElasticNet/LogRegでは小幅改善に留まる
    - 009の重みは小さいが、avg_007_008_009では改善する
    - 006bは重みが小さいが、別family保険として保持する価値がある
  drop_condition:
    - どのblendも007単体を上回らない
    - 009の重みがほぼ0で、009改造の価値が低い
    - 正則化系metaが007単体未満
    - HC/NMだけが高く、過学習疑いが強い
  next_action_after_run:
    - blend_summary.csvとblend_weights.csvを確認
    - 009に有効重みが付けば、011_lgb_shared003_full_fe_plus_orig_prior_min を作る
    - 009が使われなければ、009+orig priorは後回し
    - 010の有望candidateをPublic提出してLBを記録
    - 010候補と007単体を最終候補群に保持
