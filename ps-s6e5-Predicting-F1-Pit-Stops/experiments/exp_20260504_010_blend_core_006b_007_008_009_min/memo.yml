experiment:
  id: exp_20260504_010_blend_core_006b_007_008_009_min
  title: Core blend comparison with 006b 007 008 009
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done
  created_at: 2026-05-04

objective:
  summary: >
    006b / 007 / 008 / 009 の4本を使い、Avg / Ridge / ElasticNet /
    LogisticRegression / Hill Climb / Nelder-Mead を横比較する。
    007 RealMLP shared001 min が現時点の単体主軸だが、
    008と009は単体では007未満でもOOF平均では007を上回った。
    010では、009 LGB shared003 full-FE single がblend内で有効な重みを持つかを確認し、
    次に 009 + safe original prior を試す価値があるかを判断する。
  purpose:
    - 007単体を上回るblend候補を作る
    - 009に有効な重みが付くか確認する
    - 008がRealMLP近縁派生としてblendに効くか確認する
    - 006b CatBoost軸がblendに残るか確認する
    - Avg / Ridge / ElasticNet / LogReg / HC / NM を横比較する
    - 011で 009 + safe orig prior を作るべきか判断する
    - 後続の本格blend台の最小構成を決める
  success_criteria:
    - 4本のOOF/predを正しく読み込む
    - 個別CV AUCを再計算する
    - OOF Pearson/Spearman相関を保存する
    - Avg系候補を作成する
    - Ridge / ElasticNet / LogisticRegression のmeta-CV候補を作成する
    - HC / NM のweight探索候補を作成する
    - 各blend候補のOOF AUCを比較する
    - 009の重みを確認する
    - blend_summary.csv / blend_weights.csv / blend_result.json を保存する
    - 各候補のsubmissionを保存する

inputs:
  model_pool:
    - key: 006b
      name: 006b_cat_orig_prior_no_year
      experiment_id: exp_20260503_006b_cat_original_prior_no_year_prior_min
      family: CatBoost
      cv_auc: 0.9487943937
      public_lb: 0.94840
      oof_file: oof_exp_20260503_006b_cat_original_prior_no_year_prior_min.npy
      pred_file: pred_exp_20260503_006b_cat_original_prior_no_year_prior_min.npy
      role: >
        CatBoost original prior no Year。
        単体は007より弱いが、別family軸としてblendに残るか確認する。
    - key: 007
      name: 007_realmlp_shared001_min
      experiment_id: exp_20260503_007_realmlp_shared001_min
      family: RealMLP
      cv_auc: 0.953270
      public_lb: 0.95273
      oof_file: oof_exp_20260503_007_realmlp_shared001_min.npy
      pred_file: pred_exp_20260503_007_realmlp_shared001_min.npy
      role: >
        現時点の単体主軸。
        010ではこの007単体を上回るblend候補を探す。
    - key: 008
      name: 008_realmlp_plus_orig_prior
      experiment_id: exp_20260503_008_realmlp_shared001_plus_006b_orig_prior
      family: RealMLP
      cv_auc: 0.953039
      public_lb: 0.95249
      oof_file: oof_exp_20260503_008_realmlp_shared001_plus_006b_orig_prior.npy
      pred_file: pred_exp_20260503_008_realmlp_shared001_plus_006b_orig_prior.npy
      role: >
        007にsafe orig priorを追加したRealMLP近縁派生。
        単体では007より劣化したが、avg_007_008はOOF上で007を上回ったためblend候補。
    - key: 009
      name: 009_lgb_shared003_full_fe_single
      experiment_id: exp_20260503_009_lgb_shared003_full_fe_single_min
      family: LightGBM
      cv_auc: 0.951013
      public_lb: 0.95076
      oof_file: oof_exp_20260503_009_lgb_shared003_full_fe_single_min.npy
      pred_file: pred_exp_20260503_009_lgb_shared003_full_fe_single_min.npy
      role: >
        shared003由来のLGB full-FE single。
        単体は007より弱いが、007との相関が低めでavg_007_009が改善したため、
        別family blend素材として重みが付くか確認する。

data:
  competition_data:
    train_path: /kaggle/input/competitions/playground-series-s6e5/train.csv
    sample_submission_path: /kaggle/input/competitions/playground-series-s6e5/sample_submission.csv
  npy_data:
    base_path: /kaggle/input/datasets/mizushimatoshihiko/npy-files
    required_oof_pred_pairs:
      - 006b
      - 007
      - 008
      - 009
  id_col: id
  target_col: PitNextLap
  target_type: binary
  target_distribution:
    class_0_count: 351759
    class_1_count: 87381
    class_0_rate: 0.801018
    class_1_rate: 0.198982

blend_methods:
  simple_average:
    enabled: true
    candidates:
      - avg_007_008
      - avg_007_009
      - avg_008_009
      - avg_006b_007
      - avg_007_008_009
      - avg_006b_007_009
      - avg_006b_007_008_009
    note: >
      まず単純平均で、007に他モデルを足した時にOOF AUCが伸びるか確認する。
  ridge:
    enabled: true
    meta_features:
      - raw predictions
      - rank-normalized predictions
      - logit predictions
    cv:
      scheme: StratifiedKFold
      n_splits: 5
      shuffle: true
      random_state: 42
    alpha_grid:
      - 0.01
      - 0.03
      - 0.1
      - 0.3
      - 1.0
      - 3.0
      - 10.0
      - 30.0
      - 100.0
    note: >
      Ridgeは高相関OOF群を安定的に扱うための基準メタモデル。
  elasticnet:
    enabled: true
    meta_features:
      - raw predictions
      - rank-normalized predictions
      - logit predictions
    cv:
      scheme: StratifiedKFold
      n_splits: 5
      shuffle: true
      random_state: 42
    alpha_grid:
      - 0.0001
      - 0.0003
      - 0.001
      - 0.003
      - 0.01
      - 0.03
      - 0.1
    l1_ratio_grid:
      - 0.05
      - 0.15
      - 0.3
      - 0.5
      - 0.7
    note: >
      ElasticNetは不要モデルの係数を小さくする目的。
      009や006bが自然に残るかを確認する。
  logistic_regression:
    enabled: true
    meta_features:
      - raw predictions
      - rank-normalized predictions
      - logit predictions
    cv:
      scheme: StratifiedKFold
      n_splits: 5
      shuffle: true
      random_state: 42
    c_grid:
      - 0.01
      - 0.03
      - 0.1
      - 0.3
      - 1.0
      - 3.0
      - 10.0
      - 30.0
      - 100.0
    note: >
      LogRegは確率空間での非線形気味な境界調整候補。
      S6E4でLR stackが取り逃がしの本命になった反省から、必ず横比較する。
  hill_climb:
    enabled: true
    input_features:
      - raw predictions only
    constraint:
      - nonnegative weights
      - sum to 1
    note: >
      HCはOOF全体へ直接最適化するため過学習しやすい。
      CV最高でも単独で盲信しない。
  nelder_mead:
    enabled: true
    input_features:
      - raw predictions only
    constraint:
      - softmax weights
      - sum to 1
    note: >
      NMもOOF全体への直接最適化であり、Public/Private耐性は別途確認が必要。
      HCと同じく攻め寄り候補として扱う。

preprocessing:
  probability_transforms:
    raw:
      description: original OOF/pred probability
    rank:
      description: rankdata(x) / (n + 1)
    logit:
      description: log(p / (1-p)) after clipping
      clip_eps: 0.000001
  validation:
    - assert all OOF length equals train length
    - assert all pred length equals sample_submission length
    - assert all values are finite
    - compute individual CV AUC from loaded OOF
    - compute OOF Pearson/Spearman correlations

hypothesis:
  main: >
    007は単体で最強だが、008と009は単体で007未満でもOOF平均で007を上回った。
    010では、009がRidge/ElasticNet/LogReg/HC/NMで有効な重みを持つかを確認する。
    009に重みが付くなら、次に 009 + safe orig prior を試す価値がある。
    009が使われないなら、009改造より別shared/XGB切り出しを優先する。
  expected_effect:
    - avg_007_008_009 が007単体を上回る
    - Ridge/ElasticNet/LogRegのいずれかが007単体を上回る
    - 009に正の重みが付く
    - 008にも一定の重みが付く
    - 006bが小さくても残る可能性がある
  risk:
    - 007が強すぎて他モデルを足すとPublic LBが落ちる
    - HC/NMがOOFに過剰適合する
    - Ridge/ElasticNet/LogRegでは009がほぼ使われない
    - 008と007の相関が高く、実質的には近縁モデルの平均に留まる
    - CV改善がPublic LBに変換されない
  failure_pattern:
    - どのblendも007単体CVを上回らない
    - 009の重みがほぼ0
    - 009を入れた候補がPublic LBで悪化する
    - HC/NMだけ高く、正則化系metaが伸びない
    - 006b/009など別familyが重みを持たず、RealMLP近縁だけのblendになる

