      class_1_rate: 0.198982

blend_design:
  core_models:
    - 006b
    - 007
    - 008
    - 009
  meta_features:
    raw:
      description: original OOF/pred probabilities
      columns:
        - raw_006b
        - raw_007
        - raw_008
        - raw_009
    rank:
      description: rank-normalized OOF/pred values
      columns:
        - rank_006b
        - rank_007
        - rank_008
        - rank_009
    logit:
      description: clipped logit-transformed OOF/pred values
      columns:
        - logit_006b
        - logit_007
        - logit_008
        - logit_009
  methods:
    simple_average:
      candidates:
        - avg_007_008
        - avg_007_009
        - avg_008_009
        - avg_006b_007
        - avg_007_008_009
        - avg_006b_007_009
        - avg_006b_007_008_009
    ridge:
      model: Ridge
      input_features: raw + rank + logit
      cv: StratifiedKFold 5fold
      search: two_stage
      coarse_grid:
        alpha: geomspace(1e-3, 1e3, 19)
      refined_grid:
        alpha: best_alpha * [0.2, 5.0] with geomspace 21 points
    elasticnet:
      model: ElasticNet
      input_features: raw + rank + logit
      cv: StratifiedKFold 5fold
      search: two_stage
      coarse_grid:
        alpha: geomspace(1e-5, 1e-1, 13)
        l1_ratio:
          - 0.02
          - 0.05
          - 0.10
          - 0.20
          - 0.35
          - 0.50
          - 0.70
          - 0.90
      refined_grid:
        alpha: best_alpha * [0.25, 4.0] with geomspace 17 points
        l1_ratio: best_l1_ratio ± 0.20 plus anchor values
    logistic_regression:
      model: LogisticRegression
      input_features: raw + rank + logit
      cv: StratifiedKFold 5fold
      search: two_stage
      coarse_grid:
        C: geomspace(1e-3, 1e3, 19)
      refined_grid:
        C: best_C * [0.2, 5.0] with geomspace 21 points
    hill_climb:
      input_features: raw probabilities only
      constraint: nonnegative weights, sum to 1
      optimizer: greedy coordinate hill climb
      note: >
        Full OOFに直接最適化するため過学習しやすい。
        安定枠ではなく攻め枠として扱う。
    nelder_mead:
      input_features: raw probabilities only
      constraint: softmax weights, sum to 1
      optimizer: scipy.optimize.minimize(method=Nelder-Mead)
      note: >
        Full OOFに直接最適化するため過学習しやすい。
        HC同様、攻め枠として扱う。

baseline_references:
  best_single:
    key: 007
    cv_auc: 0.953270
    public_lb: 0.95273
    role: >
      blend候補の基準線。
      010では、各blendが007単体をどれだけ上回るかを最重要指標にする。
  previous_oof_blend_probes:
    from_009_corr_notebook:
      avg_007_009_auc: 0.953576
      avg_007_008_009_auc: 0.953870
      avg_006b_007_009_auc: 0.953294
      avg_006b_007_008_009_auc: 0.953678
    interpretation: >
      009単体は007より弱いが、007/008との平均でOOF改善した。
      したがって009は単体ではなくblend素材として評価する価値がある。

hypothesis:
  main: >
    007は単体主軸だが、008と009はそれぞれ007から少しズレたOOF方向を持つ。
    009は単体では弱いが、LGB別familyとしてavg_007_009やavg_007_008_009で効いた。
    010では複数blend方式を横比較し、009がRidge/ElasticNet/LogReg/HC/NMで
    有効な重みを持つかを確認する。
  expected_effect:
    - Avg/Ridge/ElasticNet/LogRegのいずれかが007単体CVを上回る
    - 009に正の重みが付く
    - 008も007近縁派生として一部重みを持つ
    - 006bは小さい重みでもCatBoost別familyとして残る可能性がある
    - HC/NMはRidge/ElasticNet/LogRegより高い可能性があるが、過信しない
  risk:
    - HC/NMがFull OOFに過剰最適化する
    - Ridge/ElasticNet/LogRegが007単体にほぼ寄る
    - 009が重みを持たず、009+orig prior実験の価値が下がる
    - 008が高相関近縁としてノイズ扱いになる
    - Public LBではCV改善が変換されない
  failure_pattern:
    - 全blendが007単体以下
    - 009に重みがほぼ付かない
    - Ridge/ElasticNet/LogRegでは改善せず、HC/NMだけが改善する
    - 重みが極端で、実質007単体と変わらない
    - CV最高候補がPublicで大きく落ちる

