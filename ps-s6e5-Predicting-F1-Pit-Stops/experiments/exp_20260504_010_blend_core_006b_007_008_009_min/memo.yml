experiment:
  id: exp_20260504_010_blend_core_006b_007_008_009_min
  title: Core blend comparison with 006b 007 008 009
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done
  created_at: 2026-05-04

objective:
  summary: >
    006b / 007 / 008 / 009 の4本を使って、最小blend台を作成する。
    目的は、単にCV最高のblendを作ることではなく、
    009 LGB shared003 full-FE single がblend内で有効な重みを持つかを確認し、
    次に 009 + safe original prior を試す価値があるか判断することである。
    同時に、S6E4の反省を踏まえ、Avg / Ridge / ElasticNet / LogReg / HC / NM を横並びで比較する。
  purpose:
    - 007単体主軸に対してblendで上積みできるか確認する
    - 009にRidge/ElasticNet/LogReg/HC/NMで有効な重みが付くか確認する
    - 008がRealMLP近縁派生としてblendで有効か確認する
    - 006b CatBoost軸がblendに残るか確認する
    - 複数blend方式を横比較し、Public提出候補を作る
    - 次の 011_lgb_shared003_full_fe_plus_orig_prior_min の実行価値を判断する
  success_criteria:
    - 各単体OOF AUCを再計算する
    - 4本のPearson/Spearman相関を保存する
    - Avg候補を複数作成する
    - Ridge / ElasticNet / LogReg を二段階探索で比較する
    - HC / NM の非負重みblendを比較する
    - blend_summary.csv を保存する
    - blend_weights.csv を保存する
    - 各candidateのOOF/pred/submissionを保存する
    - 009に有効な重みが付くか判断できる状態にする

inputs:
  models:
    - key: 006b
      name: 006b_cat_orig_prior_no_year
      family: CatBoost
      experiment_id: exp_20260503_006b_cat_original_prior_no_year_prior_min
      oof_file: oof_exp_20260503_006b_cat_original_prior_no_year_prior_min.npy
      pred_file: pred_exp_20260503_006b_cat_original_prior_no_year_prior_min.npy
      cv_auc: 0.9487943937
      public_lb: 0.94840
      role: >
        CatBoost original prior no Year。
        単体では007より弱いが、CatBoost系の別family素材としてblend候補に入れる。
    - key: 007
      name: 007_realmlp_shared001_min
      family: RealMLP
      experiment_id: exp_20260503_007_realmlp_shared001_min
      oof_file: oof_exp_20260503_007_realmlp_shared001_min.npy
      pred_file: pred_exp_20260503_007_realmlp_shared001_min.npy
      cv_auc: 0.953270
      public_lb: 0.95273
      role: >
        現時点の単体主軸。
        全blend候補の基準線。
    - key: 008
      name: 008_realmlp_plus_orig_prior
      family: RealMLP
      experiment_id: exp_20260503_008_realmlp_shared001_plus_006b_orig_prior
      oof_file: oof_exp_20260503_008_realmlp_shared001_plus_006b_orig_prior.npy
      pred_file: pred_exp_20260503_008_realmlp_shared001_plus_006b_orig_prior.npy
      cv_auc: 0.953039
      public_lb: 0.95249
      role: >
        007にsafe original priorを追加したRealMLP近縁派生。
        単体では007より劣化したが、avg_007_008ではOOF上で007を上回ったためblend hold。
    - key: 009
      name: 009_lgb_shared003_full_fe_single
      family: LightGBM
      experiment_id: exp_20260503_009_lgb_shared003_full_fe_single_min
      oof_file: oof_exp_20260503_009_lgb_shared003_full_fe_single_min.npy
      pred_file: pred_exp_20260503_009_lgb_shared003_full_fe_single_min.npy
      cv_auc: 0.951013
      public_lb: 0.95076
      role: >
        shared003由来のLightGBM full-FE単体。
        単体では007に負けるが、avg_007_009 / avg_007_008_009でOOF改善したため、
        別family blend素材として評価する。

