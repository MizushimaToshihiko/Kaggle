decision:
  judgment: pending
  keep_condition:
    - Ridge/ElasticNet/LogReg/Avgの少なくとも1つが007単体CVを明確に上回る
    - 009に自然な正の重みが付く
    - 008に一定の重みが付く、またはavg_007_008_009が強い
    - Public LBで007単体を上回る候補がある
    - 重みが極端すぎず、複数素材を使う合理性がある
  hold_condition:
    - CVでは007を上回るがPublic LB未確認
    - HC/NMのみが高く、安定系metaは改善が小さい
    - 009は平均では効くが、Ridge/ElasticNet/LogRegでは重みが小さい
    - Public次第で攻め枠/安定枠に分ける必要がある
  drop_condition:
    - すべての安定系blendが007単体以下
    - 009に重みがほぼ付かない
    - Public LBで007より明確に悪い
    - CV改善がHC/NMだけで、過学習疑いが強い
  next_action_after_run:
    - blend_summary.csvとblend_weights.csvを確認する
    - 009に正の重みが付くか確認する
    - 009に重みが付く場合は exp_20260504_011_lgb_shared003_full_fe_plus_orig_prior_min を検討する
    - 009に重みが付かない場合は011を後回しにし、shared003 XGB切り出しまたは別shared確認へ進む
    - Public LB提出候補は安定枠と攻め枠に分ける
    - S6E4の反省として、Public最高単体だけでなく安定系stack候補を残す

final_submission_policy:
  principle: >
    S6E4ではPublic最高単体を優先しすぎ、未選択stackがPrivateで大きく勝った。
    S6E5では、最終2枠を攻め枠と安定枠に分ける。
  attack_slot_candidates:
    - HC
    - NM
    - CV最高blend
  stable_slot_candidates:
    - Avg
    - Ridge
    - ElasticNet
    - LogReg
  notes: >
    010段階ではまだ最終提出を決めない。
    目的は、blend方式ごとの挙動と009の重みを確認し、
    次のモデル追加方針を決めることである。
