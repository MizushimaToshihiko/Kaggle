    role: LGB Compound/TyreLife系FEの小幅改善確認
  exp_20260501_004_lgb_lap_race_time_norm_min:
    model: LightGBM
    feature_set: lap_race_time_norm_min
    cv_auc: 0.9416811403305019
    public_lb: 0.94166
    judgment: hold
    role: LGB Race/Driver相対化FEの小幅改善確認

features:
  feature_set: original_prior_min_without_normalized
  base_features:
    - Driver
    - Compound
    - Race
    - Year
    - PitStop
    - LapNumber
    - Stint
    - TyreLife
    - Position
    - LapTime (s)
    - LapTime_Delta
    - Cumulative_Degradation
    - RaceProgress
    - Position_Change
  categorical_features:
    - Driver
    - Compound
    - Race
    - Year
    - LapNumber
    - PitStop
    - Position
    - Stint
  numerical_base_features:
    - TyreLife
    - LapTime (s)
    - LapTime_Delta
    - Cumulative_Degradation
    - RaceProgress
    - Position_Change

  original_prior_features:
    policy: >
      original dataset の PitNextLap を使ってpriorを作る。
      competition trainのtargetは使わない。
      Normalized_TyreLife は事前にdrop済み。
    global_prior:
      - original_global_prior
    categorical_priors:
      source_columns:
        - Driver
        - Compound
        - Race
        - Year
        - Stint
        - PitStop
        - Position
      generated_per_column:
        - ORIG_PRIOR_{col}
        - ORIG_PRIOR_{col}_count
        - ORIG_PRIOR_{col}_minus_global
    numeric_bin_priors:
      source_columns:
        - LapNumber
        - TyreLife
        - RaceProgress
        - Cumulative_Degradation
        - LapTime_Delta
      binning:
        method: quantile_edges_from_train_test_original_features
        bins: 10
      generated_per_column:
        - ORIG_PRIOR_{col}_bin10
        - ORIG_PRIOR_{col}_bin10_count
        - ORIG_PRIOR_{col}_bin10_minus_global
    coarse_pair_priors:
      source_pairs:
        - [Compound, Stint]
        - [Compound, PitStop]
        - [Race, Stint]
        - [Race, PitStop]
      generated_per_pair:
        - ORIG_PRIOR_{col1}__{col2}
        - ORIG_PRIOR_{col1}__{col2}_count
        - ORIG_PRIOR_{col1}__{col2}_minus_global
  excluded_features:
    - Normalized_TyreLife
    - Normalized_TyreLife_proxy
    - TyreLife_div_stint_max
    - stint_final_TyreLife
    - Race_Driver_Stint_end_features
    - original_row_weight
    - original_row_merge
    - competition_train_target_encoding
  preprocessing:
    categorical:
      - CatBoost native categorical handling
      - categorical columns are converted to string and missing values are filled with __MISSING__
    numerical:
      - no scaling
      - no log transform
      - no digit features
      - original prior missing values are filled with original global prior
      - original prior count missing values are filled with 0
  leakage_control:
    - Normalized_TyreLife is dropped before any feature engineering
    - no Normalized_TyreLife proxy
    - no original row merge
    - no pseudo label
    - no competition train target encoding
    - no test-wide stint endpoint estimation
    - no Race x Driver x Stint fine-grained prior in this minimal version

model:
  family: CatBoost
  estimator: CatBoostClassifier
  task: binary classification
  params:
    loss_function: Logloss
    eval_metric: AUC
    iterations: 5000
    learning_rate: 0.03
    depth: 6
    l2_leaf_reg: 3.0
    random_seed: 42
    early_stopping_rounds: 300
    verbose: 300
    allow_writing_files: false
  cv:
    scheme: StratifiedKFold
    n_splits: 5
    shuffle: true
    random_state: 42

hypothesis:
  main: >
    original dataset は competition train/test とschemaがほぼ一致しており、
    Normalized_TyreLifeを除外しても Driver / Race / Compound / Stint / PitStop /
    TyreLife bin などの粗いPitNextLap priorは有効な外部情報になりうる。
    002 CatBoost RAWは強いが、original priorを加えることで
    race/strategy/driverごとの基礎ピット傾向を補える可能性がある。
  expected_effect:
    - 002 CatBoost RAW baseline よりCVまたはPublic LBが改善する
    - original prior features が feature importance 上位または中位に入る
    - 002との相関が完全一致せず、avg_002_006が改善する
  risk:
    - originalのpositive rateがcompetition trainより高いため、prior shiftを持ち込む可能性がある
    - original priorがCVでは効いてもPublic LBに変換されない可能性がある
    - coarse priorでもRace/Driverの分布差に引っ張られる可能性がある
  failure_pattern:
    - CVは上がるがPublic LBが伸びない
    - 002より弱く、avg_002_006でも002を下回る
    - original prior features がほぼ使われない
    - 002と高相関で、単なる近縁劣化版になる

