decision:
  judgment: keep
  keep_condition:
    - 002 CatBoost RAW baselineをCVまたはPublic LBで明確に上回る
    - 002と近い性能で、相関が少しズレてavg_002_006が改善する
    - original prior features が feature importance 上位または中位に入る
    - Public LBがCV改善と大きく矛盾しない
  hold_condition:
    - 002より少し弱いが、original prior features が効いている
    - avg_002_006は改善しないが、今後のCatBoost/XGB/LGB展開に部品価値がある
    - 一部priorだけ有効で、次にprior pruning実験をする価値がある
  drop_condition:
    - 002より弱く、相関も高く、avgでも悪化
    - original prior features がほぼ使われない
    - Public LBがCVに比べて明確に悪い
    - original positive rate差の影響でprior shiftが疑われる
  next_action_after_run:
    - Public LBを提出して記録
    - 001/002/003/004/006のOOF相関確認
    - avg_002_006 と avg_001_002_006 を確認
    - 006が強ければ original prior pruning または XGB/LGB移植を検討
    - 006が弱ければ original系は縮小し、005_cat_safe_fe_min に進む
