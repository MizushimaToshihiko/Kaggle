experiment:
  id: exp_20260501_006_cat_original_prior_min_without_normalized
  title: CatBoost original prior minimal without Normalized_TyreLife
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done
  created_at: 2026-05-01

objective:
  summary: >
    002 CatBoost strict RAW baseline をベースに、公式 original dataset から作った
    coarse original prior features を最小追加する。
    Normalized_TyreLife は competition 側で意図的に削除された危険列であり、
    本実験では完全に除外する。
    original rows を competition train に混ぜるのではなく、
    original 上のカテゴリ別・数値bin別・粗いpair別 PitNextLap率だけを特徴量として付与する。
  purpose:
    - original dataset がS6E5で有効な外部情報源になるか確認する
    - 002 CatBoost RAW baseline を更新できるか確認する
    - original prior がCV/LBに変換されるか確認する
    - Normalized_TyreLife なしでも original 由来情報に価値があるか確認する
    - 後続blend用のOOF/pred素材を作成する
  success_criteria:
    - CV AUCを取得
    - fold別AUCを取得
    - Public LBを記録
    - oof/pred/submissionを保存
    - 002 CatBoost RAW baselineとのCV/LB差分を確認
    - 002とのOOF相関を確認
    - avg_002_006 が002単体を上回るか確認
    - original prior features の feature importance を確認する

data:
  competition_data:
    train_path: /kaggle/input/playground-series-s6e5/train.csv
    test_path: /kaggle/input/playground-series-s6e5/test.csv
    sample_submission_path: /kaggle/input/playground-series-s6e5/sample_submission.csv
  original_data:
    dataset: aadigupta1601/f1-strategy-dataset-pit-stop-prediction
    selected_original_path: null
    expected_file: f1_strategy_dataset_v4.csv
    used: true
    used_as:
      - original target prior source
    not_used_as:
      - original row merge
      - weighted training data
      - pseudo label source
    danger_col: Normalized_TyreLife
    danger_col_used: false
    note: >
      001b_original_schema_check により、original は competition train と列対応が良く、
      original_only_vs_train は Normalized_TyreLife のみだった。
      ただし original の PitNextLap positive rate は competition train より高く、
      prior shift の危険がある。
      そのため本実験では粗い prior のみに限定し、original rows はtrainへ混ぜない。
  id_col: id
  target_col: PitNextLap
  target_type: binary
  target_distribution:
    competition_train:
      class_0_count: 351759
      class_1_count: 87381
      class_0_rate: 0.801018
      class_1_rate: 0.198982
    original:
      class_0_rate: null
      class_1_rate: 0.254797
      abs_class_1_rate_diff_vs_train: 0.055815
  schema_notes:
    - train/test は id と target を除いて同じ特徴量構成
    - original は train から id を除き、Normalized_TyreLife を追加した構成
    - Normalized_TyreLife は本実験開始直後にdropする
    - Compound列名は original でも Compound
    - exact train/test rows found in original は0で、competition dataはoriginalの単純コピーではない

