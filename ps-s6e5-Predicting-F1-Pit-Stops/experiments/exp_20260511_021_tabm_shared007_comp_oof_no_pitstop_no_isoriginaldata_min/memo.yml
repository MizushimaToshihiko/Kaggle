decision_rule:
  single_model:
    keep: >
      Valid competition-only CV is around 0.951〜0.953 or better,
      and correlation with existing models suggests usable diversity.
    hold: >
      CV is somewhat weak but not disastrous, and blend weight remains positive.
    drop: >
      CV is weak and blend weight is zero or near-zero.
  after_blend:
    keep: >
      021 receives meaningful positive weight in HC/NM/LogReg/ElasticNet
      and improves or maintains current best stack CV/Public LB.
      A practical threshold is 0.03以上の自然な重み、または明確なCV/LB改善。
    hold: >
      021 receives small positive weight without damaging LB.
      Keep as optional TabM diversity material.
    drop: >
      021 is zero-weight across optimized blends.
      Close shared_007 branch.
  next_action_if_keep: >
    Consider one follow-up only if 021 shows clear blend value:
    a more aggressive version with PitStop still dropped but IsOriginalData tested separately,
    or a lighter TabM parameter variant for runtime reduction.
  next_action_if_drop: >
    Do not tune TabM or add shared_007 variants.
    The corrected safe version failed to add value.

notes:
  - >
    021 is not a reproduction of the reported shared_007 CV.
    It is a corrected evaluation version.
  - >
    The original shared_007 CV 0.96343 is invalid for comparison because validation includes original rows.
  - >
    021 deliberately drops PitStop and IsOriginalData.
    This is necessary to avoid repeating known evaluation/feature-risk problems.
  - >
    Normalized_TyreLife is dropped from original.
  - >
    If the score falls far below 0.96343, that is expected and not a failure by itself.
  - >
    The real test is whether TabM contributes to the 019+020 best stack.
