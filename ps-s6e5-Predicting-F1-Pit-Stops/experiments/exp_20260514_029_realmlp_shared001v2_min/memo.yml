judgement_after_compressed_drop007_022_023_keep027:
  status: useful_but_incomplete_compression_check
  summary: >
    Dropping 007/022/023 did not hurt the main blend.
    NM CV remains virtually unchanged from full add029 NM, and LogReg Public LB improves slightly to 0.95420.
    However, 027 was accidentally kept. Its NM weight is only around 0.003, so the original plan to drop 027 is still supported.
  public_lb:
    logreg_meta_pruned: 0.95420
    ridge_meta_pruned: 0.95403
  interpretation:
    - 007/022/023 can be dropped when 029 is kept.
    - 027 should also be dropped in the next clean compressed stack.
    - 018 should remain for now, because it still receives a small but nonzero weight around 0.0206.
    - 028 should definitely remain, because it keeps around 0.088 weight.
    - 026 should remain as the LGB representative.
    - 029 remains the dominant RealMLP representative.
  next_clean_stack:
    keep:
      - "014"
      - "015"
      - "016"
      - "017"
      - "018"
      - "021"
      - "026"
      - "028"
      - "029"
    drop:
      - "007"
      - "022"
      - "023"
      - "027"
  next_action: >
    Run one clean compressed stack without 027.
    If NM/LogReg CV and LB are preserved, use the compressed stack for final candidate management.        

