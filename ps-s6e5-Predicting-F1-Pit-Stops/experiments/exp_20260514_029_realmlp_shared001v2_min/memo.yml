judgement_after_blend:
  status: strong_keep
  summary: >
    029 is a very strong RealMLP replacement candidate.
    It is the strongest single model so far with CV 0.9540420785.
    In add029 blend, NM reaches CV 0.9547455892, which is a large improvement over add028 NM CV 0.9544894251.
    NM/HC/SLSQP assign approximately 0.485 weight to 029, while 007, 022, and 023 are almost zeroed out.
    Therefore, 029 should be kept as the new main RealMLP representative.
  interpretation:
    - 029 is not a new family, but it is strong enough to replace weaker RealMLP variants.
    - 007 can likely be dropped if 029 is kept.
    - 022 and 023 are likely absorbed by 029 in the current blend.
    - 027 is almost fully absorbed and can likely be dropped.
    - 018 retains a small positive weight, so it may remain as a complementary RealMLP variant for now.
    - 028 remains clearly useful as a structurally different NN branch.
  current_main_candidate:
    method: nm_softmax_raw
    cv_auc: 0.9547455892437230
    public_lb: null
  next_action: >
    Submit add029 NM first.
    If Public LB improves over add028 NM 0.95375, promote add029 NM as the new main candidate.
    Also consider submitting add029 LogReg if slots allow, because its CV 0.9547023043 is strong and it may be more stable.
    After LB confirmation, run a compressed RealMLP stack dropping 007/022/023/027 to verify that CV/LB are preserved.
