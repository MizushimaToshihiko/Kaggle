  model_family: RealMLP
  reported_cv_auc: 0.95404
  reported_runtime: 15m16s
  notes:
    - RealMLP_TD_Classifier
    - updated shared001
    - likely high correlation with existing RealMLP cluster
    - treat as replacement candidate, not new family

data:
