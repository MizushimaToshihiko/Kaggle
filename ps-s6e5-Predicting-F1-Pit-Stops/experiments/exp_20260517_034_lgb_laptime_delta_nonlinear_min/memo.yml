judgement_after_034:
  status: no_public_update
  summary: >
    034 adds safe LapTime_Delta nonlinear features to 026, but the single model barely improves CV
    and worsens Public LB. In blend stack_1, 034 receives a modest positive NM weight around 0.061
    and 026 is zeroed out, but Public LB only ties the current best at 0.95424.
    In stack_2, adding 031 raises CV substantially but lowers Public LB to 0.95419,
    reinforcing the prior conclusion that 031 is an OOF-optimistic component.

  interpretation:
    - 034 is not a clear upgrade over 026.
    - 034 and 026 are almost identical signals.
    - If one LGB representative is needed, 034 may replace 026 in optimized NM weights,
      but the evidence is weak because single LB is worse.
    - 034 should not be promoted as a new main candidate.
    - 031 should remain hold-only and should not be included in standard blend despite high CV.
    - LapTime_Delta nonlinear features alone are not enough to materially improve the LGB branch.

  current_candidate_priority:
    primary:
      name: add029_nm
      public_lb: 0.95424
      reason: >
        Simple current best.

    tied_private_diversity:
      - name: add032_nm
        public_lb: 0.95424
        reason: >
          Same Public LB with custom RealMLP branch.
      - name: add033_nm
        public_lb: 0.95424
        reason: >
          Clean 9-model stack.
      - name: stack_1_add034_nm
        public_lb: 0.95424
        reason: >
          Same Public LB, but no clear evidence it is better than add033.

    not_promoted:
      - stack_1_add034_logreg
      - stack_2_add034_plus031_nm
      - stack_2_add034_plus031_logreg

  decision:
    keep_034: hold
    replace_026_with_034: optional_but_not_mandatory
    include_031_in_standard_stack: false
    deepen_laptime_delta_nonlinear: false

  next_action: >
    Do not deepen LapTime_Delta nonlinear alone.
    If continuing EDA-derived features, next candidate should be a more distinct feature block,
    such as carefully fold-safe Driver/Compound/Race TE or a different GBDT family variant.
