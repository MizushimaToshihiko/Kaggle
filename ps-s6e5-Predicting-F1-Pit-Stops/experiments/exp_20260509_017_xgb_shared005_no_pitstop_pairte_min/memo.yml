decision_rule:
  single_model:
    keep: >
      017 single CV/LB is close to or better than 016.
      This means PitStop pairwise FE/TE is not essential, and 017 may be a safer XGB auxiliary.
    hold: >
      017 single CV/LB is slightly worse than 016 but correlation differs and blend weight remains positive.
    drop: >
      017 single CV/LB drops clearly and blend weight disappears.
  after_blend:
    keep: >
      017 replaces 016 or coexists with 016 while improving current best stack CV/Public LB.
      Meaningful positive weight in HC/NM/LogReg/ElasticNet is required.
    hold: >
      017 does not update best stack but receives small nonzero weight and offers risk-reduced diversity.
    drop: >
      017 receives zero or near-zero weight and 016 remains clearly better.
  risk_interpretation:
    if_017_close_to_016: >
      PitStop pairwise FE/TE amplification is not necessary.
      PitStop can remain as a base feature without pair interactions.
    if_017_better_than_016: >
      PitStop pairwise FE/TE may be overfitting or amplifying original-dataset inconsistency.
      Prefer 017 over 016 for safer stack candidate.
    if_017_much_worse_than_016: >
      PitStop pairwise FE/TE is an important strength feature in shared005.
      Keep 016 and do not pursue this ablation further.

notes:
  - >
    017 is a strict ablation from 016.
    It is not a new model family and not a full no-PitStop experiment.
  - >
    The experiment date is 2026-05-09, so the ID is
    exp_20260509_017_xgb_shared005_no_pitstop_pairte_min.
  - >
    5seed ensemble is retained: SEEDS = [42, 43, 44, 45, 46].
  - >
    PitStop remains in base FEATURES.
    Only PitStop-containing pairwise FE/TE features are removed.
  - >
    In 016, pairwise source columns were 11 columns, C(11,2)=55 pairs.
    In 017, PitStop is removed from pairwise source, leaving 10 columns, C(10,2)=45 pairs.
  - >
    Expected final features are approximately 219:
    104 base features + single/pairwise frequency features + single/pairwise TE after removing 20 PitStop pairwise features.
  - >
    The original dataset inconsistency discussion raises concern about PitStop/PitNextLap consistency.
    017 does not remove PitStop itself, but prevents PitStop from being amplified through pairwise FE/TE.
  - >
    If 017 is weak and zero-weight, do not continue this branch immediately.
    The next no-PitStop-all experiment should only be considered if 017 shows some signal or if final stack risk control becomes necessary.
