blend_policy:
  benchmark_code: 033_based_simplified
  add_to_stack:
    - "014"
    - "015"
    - "016"
    - "017"
    - "021"
    - "028"
    - "029"
    - "032"
    - "034"
    - "035"
  decision_focus:
    - corr_vs_016
    - corr_vs_017
    - corr_vs_034
    - corr_vs_029
    - corr_vs_032
    - nm_hc_slsqp_weight
    - whether_035_replaces_016_or_017
    - logreg_cv
    - public_lb_if_submitted
  keep_rule: >
    Keep if 035 receives meaningful blend weight, improves LogReg, or replaces 016/017 with equal/better CV/LB.
  drop_rule: >
    Drop if 035 is highly correlated with 016/017 and receives near-zero blend weight.

judgement:
  status: pending
  summary: >
    CV/LB/correlation/blend weight確認後に keep / hold / drop を判断する。
