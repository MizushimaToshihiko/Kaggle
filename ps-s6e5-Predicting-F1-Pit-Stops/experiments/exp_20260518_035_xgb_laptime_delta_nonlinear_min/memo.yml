judgement_after_035:
  status: drop
  summary: >
    035 adds the same LapTime_Delta nonlinear feature block to the XGB branch,
    but it does not improve 016/017 as a single model.
    Correlation with 017 is extremely high, and blend optimization gives 035 only a small positive weight
    while zeroing 017. The resulting NM CV is not better than the previous add034 stack.
    Therefore 035 should be dropped.

  interpretation:
    - LapTime_Delta nonlinear did not help LGB clearly in 034.
    - The same direction also did not help XGB in 035.
    - 035 is almost a duplicate of 017 with slightly worse single CV/LB.
    - The small blend weight is not enough to justify keeping it.
    - CatBoost horizontal expansion should not be run unless there is a separate reason.

  decision:
    keep_035: false
    replace_017_with_035: false
    include_035_in_standard_stack: false
    continue_laptime_delta_nonlinear_to_catboost: false
    E_laptime_delta_nonlinear_direction: stop

  current_candidate_priority:
    primary:
      name: add029_nm
      public_lb: 0.95424
    tied_private_diversity:
      - name: add032_nm
        public_lb: 0.95424
      - name: add033_nm
        public_lb: 0.95424
      - name: stack_1_add034_nm
        public_lb: 0.95424
    not_promoted:
      - "034_logreg"
      - "035"
      - "031_including_stacks"

  next_action: >
    Stop the LapTime_Delta nonlinear horizontal expansion.
    Do not create a CatBoost version from this feature block.
    Move either to a genuinely different EDA-derived feature block, such as fold-safe Driver/Compound/Race TE,
    or begin final candidate consolidation.
