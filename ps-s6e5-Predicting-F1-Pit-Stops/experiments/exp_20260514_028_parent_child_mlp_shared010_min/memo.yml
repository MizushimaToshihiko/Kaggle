    - "015"
    - "016"
    - "017"
    - "018"
    - "021"
    - "022"
    - "023"
    - "026"
    - "027"
    - "028"
  decision_focus:
    - single_cv_vs_021_027
    - corr_vs_021_tabm
    - corr_vs_realmlp_cluster
    - nm_hc_slsqp_weight
  keep_rule: >
    Keep if blend weight remains at least around 0.02,
    even if single CV is below the main RealMLP models.
  drop_rule: >
    Drop if correlation is high and blend weight is near zero.
