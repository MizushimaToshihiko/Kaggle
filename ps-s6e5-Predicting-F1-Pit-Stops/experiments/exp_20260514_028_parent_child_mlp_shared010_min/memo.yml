    nm_softmax_raw:
      cv_auc: 0.9544894250970122
      public_lb: 0.95375
      judgement: main_candidate
      note: >
        This is the current best Public LB and the current best CV.
        Promote add028 NM to the main submission candidate.

    logreg_meta_pruned:
      cv_auc: 0.9544625008178633
      public_lb: 0.95372
      judgement: stable_backup
      note: >
        LogReg also improves over the previous 0.95370 level,
        but it is below add028 NM. Keep as a stable backup candidate.

  comparison:
    previous_best_public_lb: 0.95370
    add027_nm_public_lb: 0.95369
    add026_026_only_nm_public_lb: 0.95370
    add028_nm_delta_vs_previous_best: 0.00005
    add028_logreg_delta_vs_previous_best: 0.00002

judgement_after_blend:
  status: strong_keep
  summary: >
    028 is a clear successful diversity branch.
    Although its single CV is only 0.9513738179 and weaker than the main RealMLP models,
    it receives stable large weights around 0.113 across NM/HC/SLSQP.
    Add028 NM achieves CV 0.9544894251 and Public LB 0.95375,
    which is the current best Public LB.
  interpretation:
    - 028 should be kept in the main blend pool.
    - 028 validates the strategy of adding structurally different NN branches rather than more minor RealMLP/LGB variants.
    - Single CV alone would have incorrectly rejected 028.
    - The current main candidate is add028 NM.
    - add028 LogReg is a reasonable stable backup, but not the main candidate.
  next_action: >
    Update final candidate list with add028 NM as current primary.
    Do not deepen 028 immediately unless there is a very low-cost ablation.
    Next experiments should continue prioritizing structurally different branches or final-selection robustness.

