judgement_after_blend:
  status: keep_hold
  summary: >
    032 is useful as a blend component but does not improve the current Public best.
    Single CV/LB is weaker than 029, and correlation with 029 is high.
    However, NM/HC/SLSQP assign about 0.189 weight to 032, indicating that it contributes
    some complementary signal despite being a RealMLP-like branch.
    Submitted NM reaches Public LB 0.95424, tying the current best add029 NM.
  interpretation:
    - 032 is not a new main candidate.
    - 032 should be kept in the candidate pool as a private-diversity / RealMLP auxiliary signal.
    - 032 does not replace 029; 029 remains the dominant RealMLP representative.
    - 018 and 027 are effectively unnecessary in this optimized blend.
    - 028 still keeps moderate positive weight and should remain.
    - Further custom RealMLP tuning has limited expected value unless it changes correlation versus 029.
  current_candidate_priority:
    primary:
      name: full_add029_nm
      public_lb: 0.95424
    tied_attack_candidate:
      name: add032_nm
      public_lb: 0.95424
      note: >
        Same Public LB as add029 NM but higher OOF CV.
        Consider as a possible second final submission only if seeking Private diversity.
    stable_backup:
      name: compressed_drop007_022_023_keep027_logreg
      public_lb: 0.95420
    add032_logreg:
      public_lb: 0.95418
      role: low_priority
  next_action: >
    Do not deepen 032 immediately.
    Move to 010 blend-code small improvements or a safe GBDT feature experiment from EDA.
