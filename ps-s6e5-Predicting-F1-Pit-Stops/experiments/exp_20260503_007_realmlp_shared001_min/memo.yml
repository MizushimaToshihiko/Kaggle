artifacts:
  outdir: /kaggle/working/exp_20260503_007_realmlp_shared001_min
  expected_files:
    - oof_exp_20260503_007_realmlp_shared001_min.npy
    - pred_exp_20260503_007_realmlp_shared001_min.npy
    - oof_exp_20260503_007_realmlp_shared001_min.csv
    - submission_exp_20260503_007_realmlp_shared001_min.csv
    - cv_result.json
    - feature_columns.csv
  creates_oof: true
  creates_prediction: true
  creates_submission: true
  save_for_blend: true

decision:
  judgment: keep
  keep_condition:
    - 006bより単体CVまたはPublic LBが明確に強い
    - または006bとの相関が十分に低く、avg_006b_007が006b単体を上回る
    - Public LBがCV改善と大きく矛盾しない
    - fold_scoresが安定している
  hold_condition:
    - 単体は006b未満だが、相関が低くblendで効く
    - Public LBは微妙でも、Ridge/ElasticNet/LogRegで正係数として採用される
    - 008で006b型original prior graftを試す価値がある
  drop_condition:
    - 単体も弱く、006bとの相関も高く、avgでも改善しない
    - CVだけ高くPublic LBが明確に低い
    - original row merge由来のCV盛りが疑われる
  next_action_after_run:
    - Public LBを提出して記録
    - 002/006b/006c/007のOOF相関確認
    - avg_006b_007 と avg_002_006b_007 を確認
    - 007がkeep/holdなら 008_realmlp_shared001_plus_006b_orig_prior を検討
    - 007がdropなら shared_003 のLGB full-FE単体切り出しを検討
