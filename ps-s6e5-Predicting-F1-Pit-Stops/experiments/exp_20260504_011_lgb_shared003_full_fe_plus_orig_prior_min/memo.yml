decision_rule:
  single_model:
    keep: >
      009よりCV/LBが明確に改善し、かつCVだけの不自然な上振れではない。
    hold: >
      単体は009以下でも、007/008/009との相関が少しズレており、
      blendで改善余地がある。
    drop: >
      009より単体が悪化し、相関も高く、blendでも更新しない。
  after_blend:
    keep: >
      010のLogReg / ElasticNet / HC / NM のいずれかをCVとLBの両方または
      少なくともLBで更新する。
    hold: >
      CVだけ微増、またはLB同等で重みが自然に残る。
    drop: >
      CVだけ上がってLBが鈍い、または重みが消える、または010を悪化させる。

notes:
  - >
    011は009にsafe original priorを足す実験だが、009はすでにoriginal rowsをfold trainへconcatしている。
    したがってoriginal情報の二重使用リスクがある。
  - >
    CVだけ上がってPublic LBが伸びない場合は危険。
    その場合、単体更新ではなくblend変換率のみで判断する。
  - >
    ORIG_PRIOR_Year、count、Race×Driver×Stint、Normalized_TyreLife proxy は入れない。
  - >
    PitStop は009方針に合わせてdropする。
    ただし将来、PitStopを安全に使う別実験は別IDで切る。
  - >
    011の採否は単体CV/LBではなく、010 blend更新可否を主判定にする。
