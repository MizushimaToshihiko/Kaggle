decision_rule:
  single_model:
    keep: >
      009よりCV/LBが明確に改善し、かつCVだけの不自然な上振れではない。
    hold: >
      単体は009以下でも、007/008/009との相関が少しズレており、
      blendで改善余地がある。
    drop: >
      009より単体が悪化し、相関も高く、blendでも更新しない。
  after_blend:
    keep: >
      010のLogReg / ElasticNet / HC / NM のいずれかをCVとLBの両方、
      または少なくともPublic LBで更新する。
    hold: >
      CVだけ微増、またはLB同等で重みが自然に残る。
    drop: >
      CVだけ上がってLBが鈍い、または重みが消える、または010を悪化させる。

notes:
  - >
    011は009の厳密差分実験である。
    変更してよいのはsafe original prior追加だけ。
  - >
    009のCV split、FE、OrdinalEncoder、TargetEncoder、original全件concat、
    LGB params、seed構成は変えない。
  - >
    make_orig_prior_featuresはadd_fold_target_encodingの後に呼ぶ。
    そうしないとTE 6本が消え、009 + orig priorではなくなる。
  - >
    final feature countが約100であることを確認する。
    約94ならTE呼び出し漏れの可能性が高い。
  - >
    009はすでにoriginal rowsをfold trainへconcatしている。
    したがって011はoriginal情報の二重使用リスクがある。
  - >
    CVだけ上がってPublic LBが伸びない場合は危険。
    その場合、単体更新ではなくblend変換率のみで判断する。
  - >
    ORIG_PRIOR_Year、count、Race×Driver×Stint、Normalized_TyreLife proxy は入れない。
  - >
    PitStop は009方針に合わせてdropする。
    PitStopを安全に使う別実験は別IDで切る。

decision_note:
  decision: drop
  note: >
    006系で効いたorig priorが011では毒になり、cv,lbが共に悪化した
