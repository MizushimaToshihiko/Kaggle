experiment:
  id: exp_20260504_011_lgb_shared003_full_fe_plus_orig_prior_min
  title: LGB shared003 full-FE + safe original prior
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done

objective:
  summary: >
    009 LGB shared003 full-FE single を完全ベースにし、
    009のFE / CV split / OrdinalEncoder / TargetEncoder / original全件concat /
    LGB params / seed構成は変えず、safe original prior のみを追加する。
    目的は、009単体を更新できるか、および010 blendにおいて
    009の置換または追加素材として機能するかを確認すること。
  success_criteria:
    - raw CV AUC を取得
    - Public LB を取得
    - oof / pred を保存
    - 007 / 008 / 009 との相関を確認
    - 010 blend に追加または009置換して Avg / Ridge / ElasticNet / LogReg / HC / NM を比較する

positioning:
  experiment_type: update_candidate
  intended_role: lgb_aux_material_or_009_replacement
  base_family: lightgbm
  base_reference: exp_20260503_009_lgb_shared003_full_fe_single_min
  why_now: >
    010 blendで009はHC/NM重み約0.21を持ち、単体は007より弱いが
    明確にblend素材として有効だった。
    008ではRealMLPにsafe original priorを足すと単体劣化したが、
    blendでは約0.257の重みを持った。
    したがって、009にもsafe original priorを足し、単体更新ではなく
    blend変換率を主眼に確認する価値がある。

data:
  train_path: /kaggle/input/competitions/playground-series-s6e5/train.csv
  test_path: /kaggle/input/competitions/playground-series-s6e5/test.csv
  original_path: /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
  target: PitNextLap
  id_col: id
  danger_col: Normalized_TyreLife
  danger_col_used: false
  original_usage:
    competition_train: used for CV validation and OOF
    original_rows: all original rows are appended to each fold train side, same as 009
    original_prior_source: X_tr after competition fold train + original all rows concat
  forbidden_columns:
    - Normalized_TyreLife
    - Normalized_TyreLife proxy
    - stint endpoint proxy
    - pseudo label

cv:
  scheme: StratifiedKFold
  stratification: target x Year
  n_splits: 5
  shuffle: true
  random_state: 3407
  seeds_base:
    - 3407
    - 42
  note: >
    CV split is intentionally kept identical to 009.
    The stratification key is target + Year.
    This is important because 2023 has an extreme PitNextLap rate artifact.

model:
  family: LightGBM
  estimator: LGBMClassifier
  params:
    objective: binary
    metric: auc
    boosting_type: gbdt
    n_estimators: 9000
    learning_rate: 0.022
    num_leaves: 31
    min_child_samples: 120
    subsample: 0.88
    subsample_freq: 1
    colsample_bytree: 0.82
    reg_alpha: 0.25
    reg_lambda: 10.0
    max_bin: 255
    class_weight: balanced
    early_stopping_rounds: 450
    device_requested: gpu
    cpu_fallback: true
    gpu_use_dp: false
  note: >
    LGB params are unchanged from 009.
    The only intended model-side difference from 009 is the added original prior features.

features:
  base_features:
    source: exp_20260503_009_lgb_shared003_full_fe_single_min
    summary: >
      shared003-style full-FE.
      RaceProgress, TyreLife, degradation, lap delta, position, stint, year,
      interaction categories, frequency, lag/sequential, and fold-safe TargetEncoder are used.
  expected_feature_count:
    code_009: 74
    code_011_expected: 100
    note: >
      009 final features 74 + safe original prior features up to 26.
      If final feature count is around 94, TE is probably missing.
      If final feature count differs substantially from 100, inspect added/dropped columns.
  dropped_features:
    - id
    - target
    - _dataset
    - PitStop
    - Normalized_TyreLife
  categorical_encoding:
    method: OrdinalEncoder
    fit_scope: train_fe + orig_fe + test_fe
    columns:
      - Driver
      - Compound
      - Race
      - Year_str
      - Driver_Compound
      - Race_Compound
      - Race_Year
      - Driver_Race
      - Driver_Year
      - Compound_TyreLifeBin
      - Compound_RaceProgressBin
      - Stint_Compound
    note: >
      Same as 009. Do not change to LightGBM categorical dtype in this experiment.
  race_progress_features:
    - EstimatedTotalLaps
    - LapsRemaining
    - LapProgress_x_LapNumber
    - Early_Race
    - Mid_Race
    - Late_Race
    - RaceProgressBin
  tyre_life_features:
    - TyreAgeRatio
    - LapPerTyreLife
    - LapMinusTyreLife
    - TyreLifeMinusLap
    - TyreAgeVsRace
    - PitWindowPressure
    - TyreLife_x_RaceProgress
    - TyreLifeBin
  degradation_features:
    - DegPerTyreLap
    - DegPerRaceLap
    - Abs_Cumulative_Degradation
    - Positive_Degradation
  lap_delta_features:
    - DeltaPerTyreLap
    - DeltaAbs
    - LapTimeDeltaPositive
    - LapTimeDeltaNegative
  position_features:
    - PositionPressure
    - Abs_Position_Change
    - Gained_Position
    - Lost_Position
  stint_features:
    - StintPressure
    - TyreLife_x_Stint
    - Stint_x_LapNumber
    - Is_First_Stint
    - Is_Late_Stint
  year_features:
    - Year_str
    - is_2023
    - Year_minus_2022
  interaction_categories:
    - Driver_Compound
    - Race_Compound
    - Race_Year
    - Driver_Race
    - Driver_Year
    - Stint_Compound
    - Compound_TyreLifeBin
    - Compound_RaceProgressBin
  frequency_features:
    - Driver_freq
    - Race_freq
    - Compound_freq
    - Driver_Race_freq
    - Race_Year_freq
    - Year_str_freq
  lag_sequential_features:
    - Delta_lag1
    - Delta_roll3_mean
    - Deg_diff
    - TyreLife_growth
    - LapTime_lag1
    - LapTime_diff
  fold_target_encoding:
    enabled: true
    method: sklearn.preprocessing.TargetEncoder
    cv: 5
    smooth: auto
    shuffle: true
    random_state: 3407
    columns:
      - Driver
      - Race_Year
      - Driver_Race
      - Driver_Year
      - Race
      - Stint_Compound
    output_features:
      - TE_Driver
      - TE_Race_Year
      - TE_Driver_Race
      - TE_Driver_Year
      - TE_Race
      - TE_Stint_Compound
    implementation_note: >
      This must be called inside the training loop before make_orig_prior_features.
      If TE features are missing, the experiment is not 009 + orig prior.
  added_original_prior:
    enabled: true
    implementation: make_orig_prior_features
    source: X_tr after fold train + original all rows concat
    summary: >
      For each fold, original prior features are created from X_tr and y_tr.
      Since 009 appends all original rows to each fold train side,
      this keeps 009's design unchanged.
      The added features are mean and minus_global only.
    include:
      - ORIG_PRIOR_* mean
      - ORIG_PRIOR_*_minus_global
    source_columns:
      - Driver
      - Compound
      - Race
      - Stint
      - Position
      - TyreLifeBin
      - RaceProgressBin
      - Driver_Compound
      - Race_Compound
      - Driver_Race
      - Stint_Compound
      - Compound_TyreLifeBin
      - Compound_RaceProgressBin
    excluded_by_design:
      - ORIG_PRIOR_Year
      - any Year-based original prior
      - *_count
      - Race_x_Driver_x_Stint
      - Normalized_TyreLife
      - Normalized_TyreLife proxy
      - stint endpoint proxy
      - pseudo label
    expected_added_feature_count: 26

hypothesis:
  main: >
    009は007/008と相関が相対的に低く、010 blendで約21%の重みを持った。
    009にsafe original priorを足すことで、単体AUCまたはblend内での残差補完力が改善する可能性がある。
  positive_pattern: >
    009単体CV/LBを小幅以上更新する。
    もしくは単体更新が弱くても、010 coreに追加したときに
    LogReg / ElasticNet / HC / NM のいずれかで010を更新する。
  failure_pattern: >
    CVだけ上がってPublic LBが鈍い。
    009との相関が高まり、blendで重みが小さくなる。
    original全件concatとoriginal priorの二重使用によりCVが過大評価される。
  critical_check: >
    final feature count should be around 100 and TE_* features must exist.
    If final feature count is around 94, the notebook likely forgot to call add_fold_target_encoding.

comparison_plan:
  single_compare_against:
    - exp_20260503_007_realmlp_shared001_min
    - exp_20260503_008_realmlp_shared001_plus_006b_orig_prior
    - exp_20260503_009_lgb_shared003_full_fe_single_min
  blend_compare:
    base_blend: exp_20260504_010_blend_core_006b_007_008_009_min
    modes:
      - add_011_to_006b_007_008_009
      - replace_009_with_011
      - keep_009_and_011_together
    strategies:
      - avg
      - Ridge
      - ElasticNet
      - LogisticRegression
      - Hill Climb
      - Nelder-Mead
  metrics:
    - cv_auc
    - public_lb
    - pearson_corr_with_007
    - pearson_corr_with_008
    - pearson_corr_with_009
    - spearman_corr_with_007
    - spearman_corr_with_008
    - spearman_corr_with_009
    - blend_cv
    - blend_public_lb
    - blend_weight

artifacts:
  outdir: /kaggle/working/exp_20260504_011_lgb_shared003_full_fe_plus_orig_prior_min
  files_expected:
    - oof_exp_20260504_011_lgb_shared003_full_fe_plus_orig_prior_min.npy
    - pred_exp_20260504_011_lgb_shared003_full_fe_plus_orig_prior_min.npy
    - oof_exp_20260504_011_lgb_shared003_full_fe_plus_orig_prior_min.csv
    - submission_exp_20260504_011_lgb_shared003_full_fe_plus_orig_prior_min.csv
    - cv_result.json
    - fold_seed_scores.csv
    - feature_columns.csv
    - orig_prior_features.csv
    - feature_importance_by_fold_seed.csv
    - feature_importance.csv
  save_for_blend:
    - oof_exp_20260504_011_lgb_shared003_full_fe_plus_orig_prior_min.npy
    - pred_exp_20260504_011_lgb_shared003_full_fe_plus_orig_prior_min.npy

