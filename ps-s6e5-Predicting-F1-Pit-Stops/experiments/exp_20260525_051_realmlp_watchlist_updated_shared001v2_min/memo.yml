      vs_042: 0.9770118988834429
      vs_046: 0.9777196343748198
      vs_048: 0.9723792968258532
    interpretation: >
      051は029/036/038/039/044と高相関のRealMLP近傍モデル。
      特に029/036とは極めて近い。
      低相関新素材ではないが、単体Public LBとblend重みが非常に強く、
      既存RealMLP branchの上位置換として扱える。

  current_candidate_status_after_051:
    public_attack_candidates:
      - name: add051_nm
        cv_auc: 0.9550260532475361
        public_lb: 0.95435
        note: current_public_best_and_current_best_cv
      - name: add050_fixed_nm
        cv_auc: 0.9550174162126694
        public_lb: 0.95433
        note: previous_public_best
      - name: add048_nm
        cv_auc: 0.9550141257866351
        public_lb: 0.95431
