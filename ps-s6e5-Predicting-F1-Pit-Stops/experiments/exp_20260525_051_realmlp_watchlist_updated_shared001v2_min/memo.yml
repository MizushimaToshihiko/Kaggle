  final_judgement:
    decision: keep_as_current_best_attack_and_stable_candidate
    reason: >
      051はwatchlist更新版RealMLPとして単体CV 0.9540932673、Public LB 0.95407を再現した。
      Add051 NMはCV 0.9550260532、Public LB 0.95435で現時点最高。
      Add051 LogRegもCV 0.9549996655、Public LB 0.95431でLogReg最高。
      RealMLP近傍で相関は高いが、Publicにも明確に変換されているため、
      攻め枠・安定枠の両方で第一候補に昇格させる。
    current_best_after_051:
      attack:
        name: add051_nm
        cv_auc: 0.9550260532475361
        public_lb: 0.95435
      stable:
        name: add051_logreg
        cv_auc: 0.9549996654869631
        public_lb: 0.95431
      conservative_backup:
        name: add042_logreg
        cv_auc: 0.9549723928660285
        public_lb: 0.95430
        note: >
          add051_logregの方がCV/LBともに上だが、
          051はRealMLP近傍追加であるため、保守的バックアップとしてadd042_logregも保持。

  next_action:
    - >
      051を正式採用し、最終候補表を更新する。
      攻め枠はadd051_nm、安定枠はadd051_logregを第一候補にする。
    - >
      ただし051はRealMLP近傍であり、既存RealMLP branchとの相関が高い。
      CV/LBは良いが、RealMLP過多リスクは残るため、最終候補からadd042_logregを消さない。
    - >
      今後の標準stackでは、029/036/038の一部を削る整理実験を検討する価値がある。
      特に029と038はNMでほぼゼロ化しており、051/039/044に置換された可能性が高い。
    - >
      次に行うなら、新規モデル追加ではなく、051採用後のpruned stack確認。
      029/038/017/041を外し、051/050/044/039/032/042/046/040/048を残す整理版を確認する。
