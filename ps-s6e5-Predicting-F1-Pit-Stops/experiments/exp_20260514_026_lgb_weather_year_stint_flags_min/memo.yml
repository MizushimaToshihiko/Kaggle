experiment:
  id: exp_20260514_026_lgb_weather_year_stint_flags_min
  title: LGB weather aggregate + Year/Stint explicit flags
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: completed

objective:
  summary: >
    020 LGB progress-window TE を完全なbaseとして維持し、
    024 weather aggregate と 025 Year/Stint flags を同時に追加する。
    024/025を1本のLGB branchへ圧縮できるか確認する。
  base_experiment: exp_20260511_020_lgb_progress_window_te_min
  intended_role: 024_025_replacement_candidate

implementation_check:
  base_code: code_020.txt
  preserved_from_020:
    - shared_003_style_full_FE
    - original_rows_appended_to_each_fold_train
    - target_x_year_stratification
    - seed_ensemble_3407_42
    - lgb_params_from_020
    - gpu_with_cpu_fallback
    - progress_window_base_features
    - progress_window_count_frequency
    - progress_window_target_encoding
  merged_components:
    - 024_weather_aggregate_by_year_track
    - 025_year_stint_flags
    - 025_minimal_year_stint_crosses
    - 025_frequency_for_year_stint_crosses
  not_added:
    - Race_Year_RaceProgressBin
    - 72_bins
    - original_prior
    - pseudo_label
    - Weather_x_target_TE
    - Time_or_RaceProgress_weather_interpolation
    - Normalized_TyreLife_or_proxy
    - Stint_x_Normalized
    - Norm_x_Hardness
    - TyreLife_div_inferred_stint_length
    - future_or_endpoint_proxy
    - TE_Year_Stint_025
    - TE_Year_Compound_025

data:
  competition_train: /kaggle/input/competitions/playground-series-s6e5/train.csv
  competition_test: /kaggle/input/competitions/playground-series-s6e5/test.csv
  original: /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
  weather_dataset: /kaggle/input/playground-series-s6-e5-weather-conditions/F1_Weather_2022_2025.csv
  target: PitNextLap
  danger_col:
    name: Normalized_TyreLife
    used: false

features:
  inherited_from_020:
    - shared_003_full_FE
    - RaceProgressBin_20
    - Race_RaceProgressBin_20
    - Race_Compound_RaceProgressBin_20
    - fold_safe_count_frequency_for_progress_window
    - fold_safe_TE_for_progress_window
  added_from_024:
    weather_aggregate:
      level: Year + Track
      join_policy: >
        RaceをTrackへmappingし、Year + Trackでweather aggregateをmergeする。
        実行後に race_to_track_mapping.csv を必ず確認する。
  added_from_025:
    year_flags:
      - Is_2022_025
      - Is_2023_025
      - Is_2024_025
      - Is_2025_025
    stint_flags:
      - Is_Stint1_025
      - Is_Stint2_025
      - Is_Stint3_025
      - Is_Stint4Plus_025
      - Is_Second_Stint_025
      - Is_Third_StintPlus_025
    tyre_wear:
      - TyreLife_sq_025
      - TyreLife_sqrt_025
      - TyreLife_log1p_025
      - LapTime_Delta_abs_025
      - Cumulative_Degradation_abs_025
    interactions:
      - Stint_x_RaceProgress_025
      - Stint_x_TyreLife_sq_025
      - TyreLife_sq_x_RaceProgress_025
    categorical_cross:
      - Year_Stint_025
      - Year_Compound_025
    frequency:
      - Year_Stint_025_freq
      - Year_Compound_025_freq
  te_policy:
    added_year_stint_te: false
    weather_target_te: false

model:
  family: LightGBM
  seeds:
    - 3407
    - 42
  cv:
    scheme: StratifiedKFold
    stratification: target_x_Year
    n_splits: 5
    shuffle: true
    random_state: 3407

result:
  cv_auc: 0.9512793484860437
  public_lb: null
  fold_scores: [
      0.9504766154597106,
      0.9515449695900999,
      0.9510228620856115,
      0.9513541349125838,
      0.9520214761865811,
    ]
  compared_to_024:
    cv_024: 0.9511783121413456
    public_lb_024: 0.95086
    delta_cv: 0.000101036
    delta_lb: null
  compared_to_025:
    cv_025: 0.9511230993
    public_lb_025: 0.95092
    delta_cv: 0.000156249
    delta_lb: null

artifacts:
  notebook: exp_20260514_026_lgb_weather_year_stint_flags_min.ipynb
  oof: oof_exp_20260514_026_lgb_weather_year_stint_flags_min.npy
  pred: pred_exp_20260514_026_lgb_weather_year_stint_flags_min.npy
  submission: submission_exp_20260514_026_lgb_weather_year_stint_flags_min.csv
  race_to_track_mapping: race_to_track_mapping.csv
  weather_features: weather_features_024.csv
  year_stint_features: year_stint_features_025.csv

blend_policy:
  benchmark_code: code_010_add_slsqp_drop020.txt
  first_check_stack:
    - "007"
    - "014"
    - "015"
    - "016"
    - "017"
    - "018"
    - "021"
    - "022"
    - "023"
    - "024"
    - "025"
    - "026"
  second_check_stack_if_026_absorbs_024_025:
    - "007"
    - "014"
    - "015"
    - "016"
    - "017"
    - "018"
    - "021"
    - "022"
    - "023"
    - "026"
  compare_methods:
    - avg
    - hc_nonnegative_raw
    - nm_softmax_raw
    - slsqp_signed_raw_neg005
    - ridge_meta_pruned
    - logreg_meta_pruned
  decision_rule:
    replace_024_025_with_026: >
      026単体が024/025以上で、blendで026に0.06以上の重みがつき、
      024/025の合計重みが0.02未満になる場合。
    keep_all: >
      026にも重みがつくが、024/025にもまだ残る場合。
    drop_026: >
      026単体が弱く、blendで026の重みがほぼ残らない場合。

judgement:
  status: pending
  summary: >
    CV/LB/相関/blend weight確認後に keep / hold / drop を判断する。
