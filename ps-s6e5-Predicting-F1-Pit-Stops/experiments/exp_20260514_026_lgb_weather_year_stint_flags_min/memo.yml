    ridge_meta_pruned:
      cv_auc: 0.9538724912000125
      public_lb: null
      params:
        alpha: 25.306397985574122
      notes: >
        Ridge uses raw + rank + logit meta features after pruning.
        CV is far below NM/HC/SLSQP/LogReg and is not a submission priority.

