  source_json: blend_result.json
  benchmark_code: code_010_add_slsqp_drop020.txt

  note: >
    The JSON has a model_keys overwrite issue after pruning.
    inputs.model_keys and blend_weights omit 024/025, but blend_summary weights are in the
    12-model order shown in avg notes.
    Therefore, weights below use the 12-model order:
    007, 014, 015, 016, 017, 018, 021, 022, 023, 024, 025, 026.

