  race_to_track_mapping: race_to_track_mapping.csv
  weather_features: weather_features_024.csv
  year_stint_features: year_stint_features_025.csv

blend_policy:
  benchmark_code: code_010_add_slsqp_drop020.txt
  first_check_stack:
    - "007"
    - "014"
    - "015"
    - "016"
    - "017"
    - "018"
    - "021"
    - "022"
    - "023"
    - "024"
    - "025"
    - "026"
  second_check_stack_if_026_absorbs_024_025:
    - "007"
    - "014"
    - "015"
    - "016"
    - "017"
    - "018"
    - "021"
    - "022"
    - "023"
    - "026"
  compare_methods:
    - avg
    - hc_nonnegative_raw
    - nm_softmax_raw
    - slsqp_signed_raw_neg005
    - ridge_meta_pruned
    - logreg_meta_pruned
  decision_rule:
    replace_024_025_with_026: >
      026単体が024/025以上で、blendで026に0.06以上の重みがつき、
      024/025の合計重みが0.02未満になる場合。
    keep_all: >
      026にも重みがつくが、024/025にもまだ残る場合。
    drop_026: >
      026単体が弱く、blendで026の重みがほぼ残らない場合。

judgement:
  status: pending
  summary: >
    CV/LB/相関/blend weight確認後に keep / hold / drop を判断する。
