    Pearson vs 029 is 0.99540, vs 036 is 0.99558, and vs 037 is 0.99535.
    Spearman vs 029 is 0.99101, vs 036 is 0.99201, and vs 037 is 0.99105.
    This is a stronger diversity result than 037, which stayed closer to 029/036.

