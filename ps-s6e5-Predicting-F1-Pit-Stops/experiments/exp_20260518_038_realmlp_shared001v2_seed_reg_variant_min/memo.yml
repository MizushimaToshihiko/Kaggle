  benchmark_code: 033_based_simplified

  purpose: >
    038 RealMLP shared001v2 seed/regularization variant が、029/036/037の単なる高相関コピーではなく、
    追加blend価値を持つか確認する。
    038では特徴量は029と同一のまま、seed=2026、p_drop=0.07、wd=0.020に変更している。

  stack_full_for_avg_hc_nm_slsqp:
    - "014"
    - "015"
    - "016"
    - "017"
    - "021"
    - "026"
    - "028"
    - "029"
    - "032"
    - "036"
    - "037"
    - "038"

  stack_pruned_for_ridge_logreg:
    - "014"
    - "015"
    - "016"
    - "021"
    - "026"
    - "028"
    - "029"
    - "032"
    - "036"
    - "038"

  note_on_pruning: >
    Avg/HC/NM/SLSQP are run on the full stack.
    Ridge/LogReg are run after pruning weak-weight models.
    In this result, 017 and 037 are pruned for Ridge/LogReg.

  submitted:
    nm_softmax_raw:
      public_lb: null
      note: >
        Submission pending because today's 10 submission slots were already used.
    logreg_meta_pruned:
      public_lb: null
      note: >
        Submission pending if selected tomorrow.

