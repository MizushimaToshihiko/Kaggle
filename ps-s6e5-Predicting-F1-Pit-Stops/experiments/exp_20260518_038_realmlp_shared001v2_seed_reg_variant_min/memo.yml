judgement_after_038:
  status: pending_public_but_promising
  summary: >
    038 is the strongest 029-family variant by blend CV so far.
    It keeps the same feature set as 029, but seed/regularization changes create enough diversity
    for optimized blends to assign it the largest weight.
    It also improves LogReg CV substantially over add036, which is important because LogReg has been
    a useful stability reference.
    However, Public LB has not yet been submitted due to the daily submission limit.

  interpretation:
    - 038 should be submitted tomorrow, at least NM and LogReg.
    - 038 is clearly more useful than 037 in blend CV.
    - 037 is effectively displaced by 038 and can be dropped from standard stack.
    - 036 remains important and should stay.
    - 029 is reduced but still positive in optimized blends.
    - 032 remains useful as a different RealMLP/custom RealMLP branch.
    - The seed/regularization variant direction is validated on CV.
    - Public LB is required before full promotion.

  decision:
    keep_038: pending_public
    include_038_in_standard_stack: likely_yes_if_public_does_not_regress
    drop_037_from_standard_stack: true
    keep_036: true
    keep_029: true
    keep_032: true

  submit_next:
    priority_1:
      name: add038_nm_softmax_raw
      reason: >
        Best CV so far and largest 038 weight.
    priority_2:
      name: add038_logreg_meta_pruned
      reason: >
        Best LogReg CV so far; important stability candidate.
    optional:
      name: add038_slsqp_signed_raw_neg005
      reason: >
        Nearly identical to NM. Submit only if enough slots and attack candidate needed.

  current_candidate_priority_before_public_check:
    primary:
      name: add036_nm
      public_lb: 0.95429
      role: current_public_best
    likely_next_primary_if_lb_confirms:
      name: add038_nm
      public_lb: null
      role: highest_CV_candidate
    stable_backup:
      name: add036_logreg
      public_lb: 0.95422
    likely_next_stable_backup_if_lb_confirms:
      name: add038_logreg
      public_lb: null
      role: highest_LogReg_CV_candidate
    hold_private_diversity:
      - add032_nm
      - add033_nm
      - add029_nm
    drop_or_low_priority:
      - add037_nm
      - "030"
      - "031"
      - "034"
      - "035"

  next_action: >
    Tomorrow, submit add038 NM and add038 LogReg first.
    If either improves or ties add036 with better CV profile, update final candidate pool.
    Do not continue 037 direction unless add038 unexpectedly fails on Public.
