decision_rule:
  single_model:
    keep: >
      012からのCV/LB低下が小さく、かつPublic LBが同等以上。
      Race_Year group statsなしでもCatBoost shared004素材が成立していると判断する。
    hold: >
      単体は012より少し落ちるが、012/013/014との相関がややズレており、
      blendで自然に残る。
    drop: >
      単体CV/LBが明確に落ち、blendでも012の代替にも追加素材にもならない。
  after_blend:
    keep: >
      007/008/009/015、007/008/009/012/015、または
      007/008/009/012/013/014/015 で、
      HC/NM/LogReg/ElasticNetのいずれかが既存bestを更新する。
    hold: >
      既存best更新はしないが、015が正の重みで残り、
      012とは違う安全寄りまたは補助素材として使える。
    drop: >
      重みが消える、または012の代替で明確に悪化する。
  risk_interpretation:
    if_015_close_to_012: >
      Race_Year group stats依存は限定的。
      012 familyはRace_Year集約統計なしでも強い。
    if_015_much_worse_than_012: >
      012の強さはRace_Year group statsにかなり依存している。
      Race_Year group statsは攻撃力のある特徴だが、Year artifact依存の危険ブロックとして扱う。

notes:
  - >
    015は012のRace_Year group-stat blockアブレーションであり、
    新規学習方針の実験ではない。
  - >
    実験IDは実行日 2026-05-08 に合わせて
    exp_20260508_015_cat_shared004_no_race_year_groupstats_min とする。
  - >
    このコードではfeature_colsという名前ではなく common_features が最終特徴量リストである。
  - >
    Race_Year group statsの除外は common_features 作成直後、
    X_comp / X_test_final / X_orig をcommon_featuresでsubsetする前に行う。
  - >
    削除パターンは _by_Race_Year。
    想定削除本数は4 value columns × 3 stats = 12本。
  - >
    Race_Year本体は015では落とさない。
    Race_Year_count / Race_Year_freq も落とさない。
  - >
    IsOriginalDataは015では落とさない。
    IsOriginalDataを落とした実験は013で確認済み。
  - >
    TyreAgeRatio_strは015では落とさない。
    TyreAgeRatio_strを落とした実験は014で確認済み。
  - >
    Race_Compound_Stint group stats、Driver_Race group stats、Compound_Stint group statsは今回落とさない。
    これらは016以降の別アブレーション候補。
  - >
    012入りblendでは006bの重みがほぼ0だったため、
    006b pruneだけの別実験は不要。
  - >
    015の主目的はスコア更新ではなく、
    Race_Year group statsの危険度と必要性の判定である。
