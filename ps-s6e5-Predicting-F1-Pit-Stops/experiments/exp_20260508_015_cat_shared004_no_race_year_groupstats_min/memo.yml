experiment:
  id: exp_20260508_015_cat_shared004_no_race_year_groupstats_min
  title: CatBoost shared004 full-FE without Race_Year group stats
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done

objective:
  summary: >
    012 CatBoost shared004 full-FE OOF を完全ベースにし、
    Race_Year 本体は残したまま、Race_Year を group key にして作成された
    group-stat features だけを除外する。
    目的は、012 family の強さが Race_Year group stats に依存しているかを確認すること。
    新規モデル探索ではなく、012 family のブロック単位アブレーションである。
  success_criteria:
    - raw CV AUC を取得
    - Public LB を取得
    - oof / pred を保存
    - 012 / 013 / 014 との相関を確認
    - 007 / 008 / 009 / 012 / 015 のblend比較を行う
    - 015が012の置換候補または併用補助素材になるか判断する

positioning:
  experiment_type: risk_feature_block_ablation
  intended_role: safe_catboost_aux_material_or_012_replacement
  base_family: catboost
  base_reference: exp_20260505_012_cat_shared004_full_fe_oof_min
  previous_related_experiments:
    - exp_20260505_013_cat_shared004_no_isoriginaldata_min
    - exp_20260508_014_cat_shared004_no_tyreageratio_str_min
  why_now: >
    012は010 coreに追加したblendでHC/NMのCVとPublic LBを更新し、
    CatBoost shared004系の有効性を示した。
    013では IsOriginalData を落とすと単体CV/LBがやや落ちたが、
    012との併用では補助素材として残った。
    014では TyreAgeRatio_str を落としても012単体とほぼ同等だった。
    次は、Year artifactを直接拾い得る Race_Year group stats が
    012 family の強さにどれだけ寄与しているかを切り分ける。

data:
  train_path_candidates:
    - /kaggle/input/competitions/playground-series-s6e5/train.csv
    - /kaggle/input/playground-series-s6e5/train.csv
  test_path_candidates:
    - /kaggle/input/competitions/playground-series-s6e5/test.csv
    - /kaggle/input/playground-series-s6e5/test.csv
  original_path_candidates:
    - /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
    - /kaggle/input/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
  target: PitNextLap
  target_candidates:
    - PitNextLap
    - PitNextLab
  id_col: id
  danger_col: Normalized_TyreLife
  danger_col_used: false
  original_usage:
    use_original_rows: true
    policy: >
      Same as 012.
      Original rows are appended to each fold train side only.
      Competition validation rows only are used for OOF.
    note: >
      Race_Year itself is intentionally kept.
      IsOriginalData is intentionally kept.
      TyreAgeRatio_str is intentionally kept.
      This experiment drops only Race_Year group-stat features.
  forbidden_columns:
    - Normalized_TyreLife
    - Normalized_TyreLife proxy
    - stint endpoint proxy
    - pseudo label

cv:
  scheme: StratifiedKFold
  n_splits: 5
  shuffle: true
  random_state: 42
  note: >
    CV split is unchanged from 012 / 013 / 014.
    This experiment must isolate only the effect of dropping Race_Year group-stat features.

model:
  family: CatBoost
  estimator: CatBoostClassifier
  params:
    iterations: 9000
    learning_rate: 0.033
    depth: 8
    l2_leaf_reg: 7.0
    random_strength: 0.8
    bootstrap_type: Bernoulli
    subsample: 0.8
    border_count: 254
    loss_function: Logloss
    eval_metric: AUC
    auto_class_weights: Balanced
    early_stopping_rounds: 350
    task_type_requested: GPU
    devices_requested: "0:1"
    cpu_fallback: true
    verbose: 200
  note: >
    CatBoost parameters are unchanged from 012.
    GPU hidden-default guard parameters are explicitly fixed:
    bootstrap_type, subsample, and border_count.

features:
  base_features:
    source: exp_20260505_012_cat_shared004_full_fe_oof_min
    summary: >
      shared004 large-FE design converted to 5fold OOF/pred artifact generator.
      Domain features, digit features, float signature features,
      string precision features, frequency features, and light group stats are used.
  changed_from_012:
    - Drop Race_Year group-stat features only.
  unchanged_from_012:
    - CV split
    - CatBoost params
    - original rows concat policy
    - shared004 full-FE blocks except dropped Race_Year group stats
    - OOF/pred save format
    - blend evaluation policy
    - Race_Year itself remains included
    - IsOriginalData remains included
    - TyreAgeRatio_str remains included
  dropped_groupstat_block:
    group_key: Race_Year
    drop_pattern: "_by_Race_Year"
    expected_dropped_feature_count: 12
    expected_dropped_features:
      - LapTime_Delta_mean_by_Race_Year
      - LapTime_Delta_std_by_Race_Year
      - LapTime_Delta_diff_mean_by_Race_Year
      - Position_Change_mean_by_Race_Year
      - Position_Change_std_by_Race_Year
      - Position_Change_diff_mean_by_Race_Year
      - RaceProgress_mean_by_Race_Year
      - RaceProgress_std_by_Race_Year
      - RaceProgress_diff_mean_by_Race_Year
      - TyreLife_mean_by_Race_Year
      - TyreLife_std_by_Race_Year
      - TyreLife_diff_mean_by_Race_Year
  dropped_features_policy:
    implementation: >
      In this codebase, the final model feature list is common_features.
      Race_Year group-stat features are removed immediately after common_features is created
      and before X_comp / X_test_final / X_orig are subset.
    expected_code_location: >
      Prepare Matrices section:
      after common_features = [c for c in X_comp.columns if c in X_test_final.columns]
      before X_comp = X_comp[common_features].reset_index(drop=True)
    guardrails:
      - assert_015_feature_policy(common_features)
      - no feature containing _by_Race_Year should remain in common_features
      - Race_Year itself must remain in common_features
      - IsOriginalData must remain in common_features
      - TyreAgeRatio_str must remain in common_features
      - dropped feature count should be around 12
  not_dropped_in_015:
    - Race_Year
    - Race_Year_count
    - Race_Year_freq
    - IsOriginalData
    - TyreAgeRatio_str
    - Race_Compound_Stint
    - Race_Compound_Stint group stats
    - Driver_Race group stats
    - Compound_Stint group stats
  feature_blocks:
    domain_features:
      examples:
        - EstimatedTotalLaps
        - LapsRemaining
        - LapProgress_x_LapNumber
        - TyreAgeRatio
        - LapPerTyreLife
        - LapMinusTyreLife
        - TyreLifeMinusLap
        - TyreAgeVsRace
        - PitWindowPressure
        - TyreLife_x_RaceProgress
        - TyreLife_to_LapsRemaining
        - LapsRemaining_to_TyreLife
        - DegPerTyreLap
        - AbsDegPerTyreLap
        - DegPerRaceLap
        - DeltaPerTyreLap
        - AbsDeltaPerTyreLap
        - DeltaAbs
        - PositionPressure
        - StintPressure
    bins_and_phases:
      - RacePhase
      - LapBin
      - TyreLifeBin
      - PositionBin
    interaction_categories:
      - Race_Year
      - Compound_Stint
      - Driver_Race
      - Driver_Compound
      - Race_Compound
      - Race_Compound_Stint
      - Compound_RacePhase
      - Compound_TyreLifeBin
      - RacePhase_TyreLifeBin
    digit_features:
      summary: >
        Integer digit and decimal digit features are added for selected numeric/domain columns.
    float_signature_features:
      summary: >
        Signature digits are added for selected floating/domain columns.
    string_precision_features:
      kept:
        - RaceProgress_str
        - EstimatedTotalLaps_str
        - TyreAgeRatio_str
    frequency_features:
      summary: >
        Count and frequency features are created from train/test/original combined frames.
      kept_race_year_features:
        - Race_Year_count
        - Race_Year_freq
    light_group_stats:
      kept_group_cols:
        - Race_Compound_Stint
        - Driver_Race
        - Compound_Stint
      dropped_group_cols:
        - Race_Year
      value_cols:
        - LapTime_Delta
        - Position_Change
        - RaceProgress
        - TyreLife
      stats:
        - mean
        - std
        - diff_mean
  categorical_features:
    source: fill_missing_and_types
    note: >
      cat_cols must be filtered after common_features is pruned.
      Race_Year itself should remain as a categorical feature.
      Race_Year group-stat features are numeric and should not remain in feature_columns.csv.
  risk_features_to_watch:
    - Race_Year
    - Race_Year_count
    - Race_Year_freq
    - IsOriginalData
    - TyreAgeRatio_str
    - Race_Compound_Stint
    - Race_Compound_Stint group stats
  normalized_tyrelife_policy:
    - Normalized_TyreLife is dropped.
    - Direct use is forbidden.
    - Intentional proxy reconstruction is not added.

hypothesis:
  main: >
    If 015 remains close to 012 in CV/LB and blend performance,
    then Race_Year group stats are not essential and the shared004 CatBoost family
    can retain most of its strength without this Year-artifact-heavy block.
    If 015 drops clearly, Race_Year group stats are an important strength/risk block.
  positive_pattern: >
    CV/LB drop from 012 is small, and 015 naturally receives positive weight in
    HC/NM/LogReg/ElasticNet when compared with 007/008/009/012.
  failure_pattern: >
    CV/LB and blend conversion clearly deteriorate after removing Race_Year group stats.
    This would imply that Race_Year group stats materially contribute to 012's performance.
  important_caution: >
    Do not remove Race_Year itself in this experiment.
    Do not remove IsOriginalData or TyreAgeRatio_str.
    Removing multiple risk blocks at once would destroy attribution.

