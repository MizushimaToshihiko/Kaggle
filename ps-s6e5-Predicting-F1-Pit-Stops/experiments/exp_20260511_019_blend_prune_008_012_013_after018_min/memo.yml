notes:
  - >
    019 is a blend pruning experiment, not a new model training experiment.
  - >
    The experiment date is 2026-05-11, so the ID is
    exp_20260511_019_blend_prune_008_012_013_after018_min.
  - >
    The code should be based on the existing add018 / reduce008 blend notebook.
  - >
    Remove 012 and 013 from the member list.
    Since reduce008 is already completed, this experiment also excludes 008.
  - >
    Do not remove 007.
    reduce007 already showed that 007 still has value.
  - >
    Do not remove 014 or 015 yet.
    They are the stronger/saner CatBoost shared004 derivatives after 012/013.
  - >
    Do not remove 016 or 017.
    They represent the shared005 XGB branch and both have demonstrated blend value.
  - >
    018 must remain in the stack and should be expected to receive a large positive weight.
  - >
    If compressed stack is nearly equal to full add018, it becomes a cleaner final candidate.
  - >
    If compressed stack drops, keep full add018 as the attack candidate and treat compressed stack as secondary only.
