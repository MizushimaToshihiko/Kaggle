decision_rule:
  single_model:
    keep: >
      Single CV/LB unexpectedly approaches or exceeds 012/014/015,
      or single performance is slightly weaker but correlations are meaningfully different.
    hold: >
      Single CV is weaker but not disastrous, and OOF correlation suggests possible auxiliary value.
    drop: >
      Single CV is weak and correlations are high with existing 009/012/015 family.
  after_blend:
    keep: >
      016 receives meaningful positive weight in HC/NM/LogReg/ElasticNet
      and improves current best stack CV or Public LB.
      A rough practical threshold is at least 0.03 to 0.05 positive weight
      or clear improvement in LB/CV.
    hold: >
      016 receives small but nonzero weight and does not harm Public LB.
      Keep as optional diversity material.
    drop: >
      016 receives zero or near-zero weight across HC/NM/LogReg,
      or worsens avg and does not improve any optimized blend.
  next_action_if_keep: >
    Consider 017 as lightweight shared_005 refinement or ablation,
    such as reducing risky pairwise TE, testing no PitStop pairwise TE,
    or testing single-seed/smaller seed ensemble for faster iteration.
  next_action_if_drop: >
    Close shared_005 branch.
    Do not spend time on Optuna or additional FE for this family.

notes:
  - >
    016 is a conversion of shared_005 into the current reproducible experiment workflow.
    It is not meant to be judged only by single CV.
  - >
    The original shared_005 code saved only CSV files named by cv_auc.
    016 fixes artifact names using EXP_ID and saves npy files for blend.
  - >
    Normalized_TyreLife is explicitly dropped from original.
    No direct use or intentional proxy reconstruction is allowed.
  - >
    The model count is heavy: 5 folds × 5 seeds = 25 XGB models.
    Runtime cost should be justified only if blend conversion is promising.
  - >
    Because 012〜015 are all CatBoost shared004 derivatives,
    adding a weaker but different XGB model can still be useful if its errors differ.
  - >
    If 016 is zero-weight in the current best stack,
    continuing this branch would likely be opportunity-cost negative.
