experiment:
  id: exp_20260508_016_xgb_shared005_fe_te_seedens_min
  title: XGBoost shared005 FE/TE seed ensemble artifact generator
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done

objective:
  summary: >
    shared_005 の XGBoost + Frequency Encoding + Target Encoding + Seed Ensemble 構成を、
    現在の実験管理・blend運用に合わせて OOF/pred artifact generator 化する。
    目的は、012〜015 CatBoost shared004 family とは異なる XGB family の補助素材を作り、
    007/008/009/012/013/014/015 stack に追加したときに自然な重みが残るかを確認すること。
    単体主軸更新ではなく、低相関・別family候補の確認実験である。
  success_criteria:
    - raw CV AUC を取得
    - Public LB を取得
    - oof / pred を npy で保存
    - fold_scores.csv / seed_scores.csv を保存
    - feature_columns.csv / bigram_specs.csv を保存
    - cv_result.json を保存
    - 007 / 008 / 009 / 012 / 013 / 014 / 015 との相関を確認
    - current best stack に追加して、LogReg / HC / NM / ElasticNet で重みが残るか確認する

positioning:
  experiment_type: low_corr_candidate
  intended_role: xgb_aux_material
  base_family: xgboost
  base_reference: shared_005
  why_now: >
    012〜015では CatBoost shared004 family の危険特徴アブレーションを進め、
    012/013/014/015 を併用した stack が現時点のbestになっている。
    ただし同一family派生の追加による上積みは小さくなっている。
    ここからは別family素材の探索が必要であり、shared_005 は
    XGB + FE/TE + seed ensemble という構成のため、
    CatBoost shared004 family とは異なる誤差構造を持つ可能性がある。

data:
  train_path_candidates:
    - /kaggle/input/competitions/playground-series-s6e5/train.csv
    - /kaggle/input/playground-series-s6e5/train.csv
  test_path_candidates:
    - /kaggle/input/competitions/playground-series-s6e5/test.csv
    - /kaggle/input/playground-series-s6e5/test.csv
  original_path_candidates:
    - /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
    - /kaggle/input/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
  target: PitNextLap
  target_candidates:
    - PitNextLap
    - PitNextLab
  id_col: id
  danger_col: Normalized_TyreLife
  danger_col_used: false
  original_usage:
    use_original_rows: true
    policy: >
      Same as shared_005.
      For each outer fold, competition train split is concatenated with original rows.
      Validation fold is always competition train only.
    note: >
      Normalized_TyreLife is explicitly dropped from original before feature construction.
      No intentional proxy reconstruction is added.
  forbidden_columns:
    - Normalized_TyreLife
    - Normalized_TyreLife proxy
    - stint endpoint proxy
    - pseudo label

cv:
  scheme: StratifiedKFold
  n_splits: 5
  shuffle: true
  random_state: 42
  target_encoding:
    library: cuML TargetEncoder
    inner_folds: 5
    smooth: 20
    split_method: random
    stat: mean
    multi_feature_mode: combination
  seed_ensemble:
    seeds:
      - 42
      - 43
      - 44
      - 45
      - 46
    seeds_per_fold: 5
    total_models: 25
  note: >
    Outer validation rows are competition train only.
    Target encoding is fit inside each outer fold after original rows are appended to the fold train side.
    Final fold prediction is the average of 5 XGB seed models.

model:
  family: XGBoost
  estimator: XGBClassifier
  params:
    n_estimators: 10000
    learning_rate: 0.03
    grow_policy: lossguide
    max_depth: 0
    max_leaves: 64
    min_child_weight: 5
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 2.0
    objective: binary:logistic
    eval_metric: auc
    tree_method: hist
    device: cuda
    n_jobs: -1
    enable_categorical: true
    early_stopping_rounds: 200
  note: >
    Parameters are kept close to shared_005.
    This experiment does not perform Optuna or hyperparameter tuning.
    Its value is judged by blend conversion, not single-model CV alone.

features:
  base_features:
    source: shared_005
    baseline_features:
      - Driver
      - Compound
      - Race
      - Year
      - PitStop
      - LapNumber
      - Stint
      - TyreLife
      - Position
      - LapTime (s)
      - LapTime_Delta
      - Cumulative_Degradation
      - RaceProgress
      - Position_Change
    summary: >
      The feature set starts from the original competition columns, then adds
      numeric-as-categorical features, digit features, frequency encodings, and target encodings.
  categorical_mapping:
    columns:
      - Driver
      - Compound
      - Race
    fit_scope: train + test + original
    note: >
      Category vocabulary is mapped using train/test/original combined values.
      This is not target leakage, but it does use test/original category vocabulary.
  numeric_as_categorical:
    exact_features:
      - LapTime (s)_cat
      - LapTime_Delta_cat
      - Cumulative_Degradation_cat
    rounded_features:
      LapTime (s):
        round_digits:
          - 1
          - 0
        round_steps:
          - 0.5
          - 1.0
          - 2.0
          - 5.0
      LapTime_Delta:
        round_digits:
          - 1
          - 0
        round_steps:
          - 0.5
          - 1.0
          - 2.0
          - 5.0
          - 10.0
      Cumulative_Degradation:
        round_digits:
          - 1
          - 0
        round_steps:
          - 1.0
          - 2.0
          - 5.0
          - 10.0
          - 20.0
    expected_count: 23
  digit_features:
    source_columns:
      - Year
      - PitStop
      - LapNumber
      - Stint
      - TyreLife
      - Position
      - LapTime (s)
      - LapTime_Delta
      - Cumulative_Degradation
      - RaceProgress
      - Position_Change
    integer_positions:
      - 1
      - 10
      - 100
      - 1000
    decimal_source_columns:
      - LapTime (s)
      - LapTime_Delta
      - Cumulative_Degradation
      - RaceProgress
    decimal_positions:
      - 1
      - 2
      - 3
    expected_count: 67
  frequency_encoding:
    single_columns:
      - Driver
      - NUM_as_CAT features
    pairwise_columns:
      source_columns:
        - Driver
        - Compound
        - Race
        - Year
        - PitStop
        - LapNumber
        - Stint
        - TyreLife
        - Position
        - RaceProgress
        - Position_Change
      expected_pair_count: 55
    method: >
      Frequency maps are created from X_tr only within each outer fold.
      Validation and test are mapped using the fold train map.
  target_encoding:
    single_columns:
      - Driver
      - NUM_as_CAT features
    pairwise_columns:
      source_columns:
        - Driver
        - Compound
        - Race
        - Year
        - PitStop
        - LapNumber
        - Stint
        - TyreLife
        - Position
        - RaceProgress
        - Position_Change
      expected_pair_count: 55
    method: >
      cuML TargetEncoder with inner fold ids.
      Target encoding is performed inside each outer fold using fold train data
      after appending original rows.
  expected_feature_counts:
    base_features_before_fe_te: 104
    after_frequency_encoding: 183
    after_target_encoding: 239
    note: >
      These are expected from shared_005.
      If counts differ materially, inspect missing columns or feature construction changes.
  risk_features_to_watch:
    - Year
    - Race
    - Race-Year interactions via pairwise FE/TE
    - PitStop
    - LapNumber/TyreLife/RaceProgress pairwise FE/TE
    - exact numeric-as-categorical features for continuous columns
  normalized_tyrelife_policy:
    - Normalized_TyreLife is dropped.
    - Direct use is forbidden.
    - Intentional proxy reconstruction is not added.

hypothesis:
  main: >
    shared_005 is unlikely to update the best single model because its original OOF AUC is around 0.95203,
    below 012/014/015 CatBoost shared004 family.
    However, because it is XGB with FE/TE and seed ensemble,
    it may have a different error profile and contribute as an auxiliary blend material.
  positive_pattern: >
    016 receives natural positive weight in LogReg / HC / NM / ElasticNet
    when added to 007/008/009/012/013/014/015.
    Even if single CV is weaker, blend CV/LB improves or remains stable with a meaningful positive weight.
  failure_pattern: >
    016 has high correlation with existing 009/012 family and receives zero or near-zero weight
    in HC/NM/LogReg, or worsens avg without compensating blend gain.
  important_caution: >
    Do not perform Optuna or add further FE before checking blend conversion.
    If 016 is zero-weight, close shared_005 branch.
    If 016 receives meaningful weight, then and only then consider 017 as a lightweight ablation or refinement.

