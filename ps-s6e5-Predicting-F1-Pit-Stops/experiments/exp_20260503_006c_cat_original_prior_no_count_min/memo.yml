    006bよりPublic LBが少し下がっても、002を上回り、count特徴なしで
    original priorが効いているなら、006cは安全寄り候補として保持する価値がある。

artifacts:
  outdir: /kaggle/working/exp_20260503_006c_cat_original_prior_no_count_min
  expected_files:
    - oof_exp_20260503_006c_cat_original_prior_no_count_min.npy
    - pred_exp_20260503_006c_cat_original_prior_no_count_min.npy
    - submission_exp_20260503_006c_cat_original_prior_no_count_min.csv
    - cv_result.json
    - prior_info.json
    - feature_columns.csv
    - feature_importance.csv
    - feature_importance_by_fold.csv
  creates_oof: true
  creates_prediction: true
  creates_submission: true
  save_for_blend: true

decision:
  judgment: pending
  keep_condition:
    - 002 CatBoost RAW baselineをCVまたはPublic LBで上回る
    - 006bより少し弱くても、count特徴除外後に002超えを維持する
    - avg_002_006c または avg_002_006b_006c が改善する
    - count特徴なしでoriginal prior featuresがFI上で使われる
    - Public LBがCV改善と大きく矛盾しない
  hold_condition:
    - 002より少し上だが006bより下
    - count特徴なしの安全寄り候補として意味がある
    - 一部priorだけ有効で、次にpair/numeric-bin限定を試す価値がある
  drop_condition:
    - 002以下に落ちる
    - avg_002_006cも002単体を下回る
    - 006bの改善がcount特徴依存だったと判断される
    - original prior featuresがほぼ使われない
  next_action_after_run:
    - Public LBを提出して記録
    - 002/006/006b/006cのOOF相関確認
    - avg_002_006c, avg_006b_006c, avg_002_006b_006c を確認
    - 006cが002超えを維持すれば original prior軸の安全性を一段引き上げる
    - 006cが大きく落ちれば006b/006はcount依存として慎重扱いにする
    - 006c確認後、共有コード候補の事前調査または005_cat_safe_fe_minへ進む
