    cv_auc: 0.948784
    public_lb: 0.94841
    judgment: keep
    role: >
      Year prior込みのoriginal prior min。
      002をCV/LBともに更新したが、FI上位にORIG_PRIOR_Year系が出たため、
      006bでYear prior依存を確認した。
  exp_20260503_006b_cat_original_prior_no_year_prior_min:
    model: CatBoost
    feature_set: original_prior_no_year_prior_min
    cv_auc: 0.9487943937
    public_lb: 0.94840
    judgment: keep
    role: >
      006からORIG_PRIOR_Year系を除外した安全寄り派生。
      006と実質同等で、002をCV/LBともに上回った。
