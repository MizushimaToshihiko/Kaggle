decision:
  judgment: pending
  keep_condition:
    - 002 CatBoost RAW baselineをCVまたはPublic LBで上回る
    - 006bより少し弱くても、count特徴除外後に002超えを維持する
    - avg_002_006c または avg_002_006b_006c が改善する
    - count特徴なしでoriginal prior featuresがFI上で使われる
    - Public LBがCV改善と大きく矛盾しない
  hold_condition:
    - 002より少し上だが006bより下
    - count特徴なしの安全寄り候補として意味がある
    - 一部priorだけ有効で、次にpair/numeric-bin限定を試す価値がある
  drop_condition:
    - 002以下に落ちる
    - avg_002_006cも002単体を下回る
    - 006bの改善がcount特徴依存だったと判断される
    - original prior featuresがほぼ使われない
  next_action_after_run:
    - Public LBを提出して記録
    - 002/006/006b/006cのOOF相関確認
    - avg_002_006c, avg_006b_006c, avg_002_006b_006c を確認
    - 006cが002超えを維持すれば original prior軸の安全性を一段引き上げる
    - 006cが大きく落ちれば006b/006はcount依存として慎重扱いにする
    - 006c確認後、共有コード候補の事前調査または005_cat_safe_fe_minへ進む
