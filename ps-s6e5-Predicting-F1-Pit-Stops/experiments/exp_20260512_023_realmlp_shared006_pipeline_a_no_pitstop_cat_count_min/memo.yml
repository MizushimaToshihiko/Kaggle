decision_rule:
  single_model:
    keep: >
      CV remains above roughly 0.9530 and correlation with 018/022 decreases enough to suggest useful diversity.
    hold: >
      CV is 0.9525〜0.9530 but blend weight is positive.
    drop: >
      CV is below 0.9525 or blend weight is zero/near-zero.
  after_blend:
    keep: >
      023 receives meaningful positive weight while 018 and/or 022 remain core,
      and the stack improves or maintains CV/Public LB.
      Practical threshold: 023 weight >= 0.03 in HC/NM/LogReg/ElasticNet,
      or clear improvement in Public LB/CV.
    hold: >
      023 receives 0.01〜0.03 weight and does not harm Public LB.
      Keep as optional safety/diversity material.
    drop: >
      023 receives zero or near-zero weight.
      Stop this PitStop-count ablation branch.
  next_action_if_keep: >
    If 023 is useful, consider final stack pruning among 018/022/023.
    Do not automatically add more 018 derivatives.
  next_action_if_drop: >
    Do not continue PitStop-count derivative exploration immediately.
    Return to final candidate selection or external shared-code search.

notes:
  - >
    023 uses the date 2026-05-12 in the experiment ID:
    exp_20260512_023_realmlp_shared006_pipeline_a_no_pitstop_cat_count_min.
  - >
    023 is a strict derivative of 018.
    It is not a new model family.
  - >
    The only intended feature change is removing _PitStop_cat_count.
  - >
    PitStop and PitStop_cat_ remain.
    Full PitStop removal is not part of this experiment.
  - >
    Race_Year_TE remains.
    Therefore 023 is different from 022.
  - >
    018 remains the core RealMLP model.
    023 should be judged as an additive diversity/safety candidate, not as an 018 replacement.
  - >
    Since the expected effect is small, blend weight matters more than single CV.
  - >
    If 023 does not receive positive blend weight, do not waste further time on minor PitStop-count ablations.
