experiment:
  id: exp_20260525_059_blend_add054055_realmlp_variants_min
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  created_at: 2026-05-25
  type: blend_diagnostic
  status: planned

objective:
  summary: >
    052 pruned stackをベースに、051近傍のRealMLP variantである054/055を追加し、
    blend上で補助素材として機能するか確認する。
    054/055単体は051より弱いため、主目的は単体更新ではなく、
    相関差・重み・LogReg/NM改善の有無を確認すること。

base:
  experiment: exp_20260525_052_blend_pruned_after_051_min
  current_best:
    attack:
      name: add052_pruned_nm
      cv_auc: 0.9550261129800026
      public_lb: 0.95435
    stable:
      name: add052_pruned_logreg
      cv_auc: 0.9550030438849962
      public_lb: 0.95432

add_models:
  "054":
    experiment: exp_20260525_054_realmlp_watchlist_updated_optuna_refit_min
    cv_auc: 0.954066947138
    public_lb: 0.95389
    note: >
      053 best paramsをn_ens=20/n_epochs=5で正式refitしたRealMLP variant。
      051より単体CV/LBは低い。
  "055":
    experiment: exp_20260525_055_realmlp_watchlist_updated_optuna_refit_epoch6_min
    cv_auc: 0.953907994181
    public_lb: 0.95390
    note: >
      054からn_epochsのみ6へ増やしたRealMLP variant。
      051より単体CV/LBは低い。

