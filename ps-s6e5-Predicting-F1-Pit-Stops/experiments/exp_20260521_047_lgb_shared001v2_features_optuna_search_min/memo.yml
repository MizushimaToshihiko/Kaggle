  folds: same_as_040
  original_rows: same_as_040
  target: PitNextLap
  metric: AUC
  forbidden:
    - Normalized_TyreLife
    - Normalized_TyreLife_proxy
    - future_endpoint_proxy
    - pseudo_label
    - new_feature_engineering
    - 039_LOG_features

search_space:
