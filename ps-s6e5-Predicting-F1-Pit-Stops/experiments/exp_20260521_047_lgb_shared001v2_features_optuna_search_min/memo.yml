  reg_alpha: [0.001, 5.0]
  reg_lambda: [1.0, 50.0]
  max_bin: [127, 255]
  max_depth: [-1, 5, 7, 9]

optuna:
  direction: maximize
  n_trials_requested: 40
  n_trials_completed: 23
  timeout_sec: 36000
  sampler: TPESampler
  seed: 3407
  search_seeds: [3407]
