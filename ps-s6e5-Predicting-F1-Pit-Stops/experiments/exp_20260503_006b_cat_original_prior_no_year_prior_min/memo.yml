decision:
  judgment: pending
  keep_condition:
    - 002 CatBoost RAW baselineをCVまたはPublic LBで上回る
    - 006より少し弱くても、Year prior除外後に002超えを維持する
    - avg_002_006b または avg_002_006_006b が改善する
    - Year priorなしでoriginal prior featuresがFI上で使われる
    - Public LBがCV改善と大きく矛盾しない
  hold_condition:
    - 002より少し上だが006より下
    - Year priorを外した安全寄り候補として意味がある
    - 一部priorだけ有効で、次にcount削除やpair/numeric-bin限定を試す価値がある
  drop_condition:
    - 002以下に落ちる
    - avg_002_006bも002単体を下回る
    - 006の改善がYear prior依存だったと判断される
    - original prior featuresがほぼ使われない
  next_action_after_run:
    - Public LBを提出して記録
    - 002/006/006bのOOF相関確認
    - avg_002_006b, avg_006_006b, avg_002_006_006b を確認
    - 006bが002超えを維持すれば 006c_no_count_min を検討
    - 006bが大きく落ちれば006はYear prior依存として慎重扱いにする
