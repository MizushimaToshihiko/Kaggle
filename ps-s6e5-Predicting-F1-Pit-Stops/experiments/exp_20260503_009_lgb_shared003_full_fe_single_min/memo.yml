experiment:
  id: exp_20260503_009_lgb_shared003_full_fe_single_min
  title: LightGBM shared003 full-FE single model minimum extraction
  competition: PS S6E5 Predicting F1 Pit Stops
  metric: AUC
  status: done
  created_at: 2026-05-03

objective:
  summary: >
    shared_003 の全体stackを丸ごと再現するのではなく、
    その中の LightGBM full-FE single member だけを切り出して再現する。
    007 RealMLP shared001 min が現時点の単体主軸となったため、
    次に必要なのは RealMLP とは異なるGBDT系素材である。
    009では shared_003-style full feature engineering + LightGBM を用いて、
    OOF/pred/submissionを作成し、007/008/006bとの相関・blend効果を確認する。
  purpose:
    - shared_003由来のLightGBM full-FE単体素材を作る
    - 007 RealMLPとは異なるGBDT familyのOOF/predを得る
    - 007/008/006bとのOOF相関を確認する
    - avg/Ridge/ElasticNet/LogReg/HC/NM blendで効くか確認する
    - shared_003全体stackを丸ごと再現する前に、LGB単体の素材価値を測る
  success_criteria:
    - 5fold CV AUCを取得
    - fold別AUCを取得
    - seed別fold AUCを取得
    - Public LBを記録
    - oof/pred/submissionを保存
    - feature_columns.csvを保存
    - feature_importance.csvを保存
    - cv_result.jsonを保存
    - 006b/007/008とのOOF相関を確認
    - avg_007_009 が007単体を上回るか確認する

source:
  shared_code:
    id: shared_003
    title: RealMLP + XGB + LGB + blend style notebook
    extraction_target: LightGBM full-FE member only
    note: >
      shared_003はRealMLP、XGBoost、LightGBM、XGBoost RealMLP-view、
      OOF search、LR stack、committee blendまで含む大きなnotebookである。
      本実験では全体を再現せず、LightGBM full-FE単体だけを切り出す。
  extracted_component:
    model_family: LightGBM
    component_name: LGB full-FE conservative
    expected_shared003_oof_reference: 0.95925
    caveat: >
      shared_003上のLGB OOFはoriginal append後の全体設計に依存している。
      009ではcompetition trainに対するOOFを作るため、
      validationはcompetition rowsのみに限定する。
      そのためshared_003表示CVより低く出ても不自然ではない。

data:
  competition_data:
    train_path: /kaggle/input/competitions/playground-series-s6e5/train.csv
    test_path: /kaggle/input/competitions/playground-series-s6e5/test.csv
    sample_submission_path: /kaggle/input/competitions/playground-series-s6e5/sample_submission.csv
  original_data:
    dataset: aadigupta1601/f1-strategy-dataset-pit-stop-prediction
    path: /kaggle/input/datasets/aadigupta1601/f1-strategy-dataset-pit-stop-prediction/f1_strategy_dataset_v4.csv
    used: true
    use_method:
      - append original rows to each fold training split
      - use original rows in train/test/original combined feature engineering
    not_used_as:
      - validation rows
      - pseudo label source
      - ORIG_PRIOR feature source
    danger_col: Normalized_TyreLife
    danger_col_used: false
    note: >
      originalからNormalized_TyreLifeをdropしてから使用する。
      original rowsは各foldのtrain側に追加するが、validationはcompetition rowsのみとする。
      これにより、competition train長のOOFを作り、後続blendへ使えるようにする。
  id_col: id
  target_col: PitNextLap
  target_type: binary
  target_distribution:
    competition_train:
      class_0_count: 351759
      class_1_count: 87381
      class_0_rate: 0.801018
      class_1_rate: 0.198982
    original:
      class_1_rate: 0.254797
      abs_class_1_rate_diff_vs_train: 0.055815

baseline_references:
  exp_20260503_006b_cat_original_prior_no_year_prior_min:
    model: CatBoost
    feature_set: original_prior_no_year_prior_min
    cv_auc: 0.9487943937
    public_lb: 0.94840
    judgment: keep
