decision:
  judgment: pending
  note: >
    完全再現ができなかった。下記RealMLPのログを参考にFEをやり直してみてはどうだろうか
    Columns classified as continuous: ['Year', 'PitStop', 'LapNumber', 'Stint', 'TyreLife', 'Position', 'LapTime_s', 'LapTime_Delta', 'Cumulative_Degradation', 'RaceProgress', 'Position_Change', '_LapNumber_/_RaceProgress', '_TyreLife_/_LapNumber']
    Columns classified as categorical: ['Driver', 'Compound', 'Race', 'Year_cat_', 'PitStop_cat_', 'LapNumber_cat_', 'Stint_cat_', 'TyreLife_cat_', 'Position_cat_', 'LapTime_s_cat_', 'LapTime_Delta_cat_', 'Cumulative_Degradation_cat_', 'RaceProgress_cat_', 'Position_Change_cat_', 'RaceProgress_200_quantile_bin_']
  keep_condition:
    - 009が007に近いCV/LBを出す
    - または007より単体は低くても、avg_007_009が007単体を上回る
    - Ridge/ElasticNet/LogReg/HC/NMで正の重みが付く
    - 007との相関がRealMLP派生同士より低い
    - Public LBがCVと大きく矛盾しない
  hold_condition:
    - 単体は007未満だが、blendで改善する
    - LGB full-FEという別family素材として意味がある
    - 007/008/006bとは異なるOOF方向を持つ
  drop_condition:
    - 009単体が弱く、007との相関も高く、avgでも改善しない
    - CVだけ高くPublic LBが低い
    - feature importanceが危険な分布依存特徴に偏る
    - 学習コストに対して素材価値が低い
  next_action_after_run:
    - Public LBを提出して記録
    - 006b/007/008/009のOOF相関確認
    - avg_007_009, avg_007_008_009, avg_006b_007_009 を確認
    - 009がkeep/holdならblend台作成へ進む
    - 009がdropならshared_003のXGB full-FEまたはshared_004 CatBoost確認へ進む
