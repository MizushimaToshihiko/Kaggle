experiment:
  exp_id: exp_20260410_038_ridge_screen_dao037_vs_core
  title: Ridge screening of dao037 against core stack
  competition: PS S6E4 Predicting Irrigation Need
  metric: balanced_accuracy
  status: planned

purpose:
  objective: >
    037 を既存主力群に加えたとき、025 単体や既存 core set を超えるかを確認し、
    Dao 系が最終スタック候補として意味を持つかを判定する。
  questions:
    - 037 を足すと 025 単体を超えるか
    - 018/025/026 の既存 core set に対して追加価値があるか
    - 037 は置換候補か、追加候補か
    - Dao 系は単体止まりか、stack 素材として生き残るか

design:
  blend_type: ridge_screening
  use_raw_proba: true
  cv:
    fold_type: StratifiedKFold
    n_splits: 5
    seed: 42
  ridge:
    alphas: logspace(-3, 3, 25)

inputs:
  candidates:
    - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
    - exp_20260409_025_lgb_digit_te_min
    - exp_20260409_026_realmlp_pair_te_min
    - exp_20260410_037_dao_xgb_pair_te_posthoc_only

screen_sets:
  primary:
    baseline_025:
      - exp_20260409_025_lgb_digit_te_min
    set_018_025:
      - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
      - exp_20260409_025_lgb_digit_te_min
    set_018_025_026:
      - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
      - exp_20260409_025_lgb_digit_te_min
      - exp_20260409_026_realmlp_pair_te_min
    set_018_025_037:
      - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
      - exp_20260409_025_lgb_digit_te_min
      - exp_20260410_037_dao_xgb_pair_te_posthoc_only
    set_018_025_026_037:
      - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
      - exp_20260409_025_lgb_digit_te_min
      - exp_20260409_026_realmlp_pair_te_min
      - exp_20260410_037_dao_xgb_pair_te_posthoc_only
  optional:
    set_025_037:
      - exp_20260409_025_lgb_digit_te_min
      - exp_20260410_037_dao_xgb_pair_te_posthoc_only
    set_018_037:
      - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
      - exp_20260410_037_dao_xgb_pair_te_posthoc_only

