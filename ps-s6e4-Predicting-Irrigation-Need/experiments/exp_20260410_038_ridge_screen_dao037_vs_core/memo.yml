next_action:
  if_good: >
    keep 037 as a stack candidate and consider HC or rank blend with 037 included.
  if_unclear: >
    inspect coefficients and raw/rank correlations more closely and compare against 025 single.
  if_bad: >
    close Dao branch as stack candidate and keep 037 only as single-model reference.
