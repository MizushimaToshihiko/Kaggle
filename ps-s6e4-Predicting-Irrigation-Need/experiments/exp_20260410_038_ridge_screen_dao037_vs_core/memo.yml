decision_rule:
  keep:
    - set with 037 exceeds baseline_025
    - 037 has meaningful positive role in ridge coefficients
    - cv/lb improvement is not negligible
  hold:
    - cv improves slightly but lb is flat
    - 037 coefficient is small but positive
    - potential auxiliary material
  drop:
    - adding 037 does not beat baseline_025
    - coefficients are near zero or unstable
    - cv/lb do not improve

expected_interpretation:
  best_case: >
    037 is not only a strong single model but also a useful stack material,
    especially as an additional component on top of 018/025/026.
  neutral_case: >
    037 is a decent single but only a weak additive material.
  worst_case: >
    037 is just a sharpened version of 034 and does not materially help the final stack.

