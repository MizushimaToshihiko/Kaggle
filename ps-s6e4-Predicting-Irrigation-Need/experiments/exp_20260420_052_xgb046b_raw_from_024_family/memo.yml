    blend benchmark 後の解釈を書く。
    例:
    - 旧 050 より改善したが still 補助止まり
    - NM にだけ効いた
    - 046 family RAW は close 確定
  decision_after_blend: drop寄りのkeep

operational_notes:
  summary: >
    旧 050 は drop だったが、family 骨格のズレが原因だった可能性を切るため、
    今回は 046b 実コード骨格に合わせた RAW 再試験を行う。
    これで still 弱いなら、046 family の RAW は close してよい。
  current_global_rule: >
    新モデル作成のたびに blend benchmark を通す。
    何でも benchmark に入れない。
    主力更新候補は差し替え、別人格候補は追加。
    提出は benchmark 上位2〜3本に絞る。 :contentReference[oaicite:2]{index=2}

risk:
  - 旧 050 と本質的に同じ結果になる可能性
  - 046b に対する近縁劣化版になる可能性
  - RAW 化しても相関が十分に下がらない可能性
  - 単体微差改善が blend 改善に変換されない可能性

next_action:
  - 052 を実行して raw_cv / refined_biased_cv / public_lb を記録
  - 046b / 025 / 048 / 050 / 051 との raw / rank 相関を確認
  - gate_rule_before_blend を満たすか判定
  - 満たす場合のみ blend benchmark に追加
  - keep / hold / drop を確定
