experiment:
  exp_id: exp_20260407_018_cat_pairwise_te_bias_from_shared_min
  title: Minimum reproduction of shared CatBoost pairwise TE and bias tuning notebook
  phase: shared_code_review
  status: done
  kind: training

competition:
  name: PS S6E4 Predicting Irrigation Need
  metric: Balanced Accuracy

purpose:
  summary: >
    公開 notebook「0.979 CV Single CAT: Pairwise TE + Bias Tuning」の骨格を、
    自分の exp_* 管理形式で最小再現する。
    初回は full copy ではなく minimum reproduction とし、
    共有コードの主要要素が自分の strict 管理下で再現できるかを確認する。
  hypothesis:
    - pairwise categorical combinations を in-fold Target Encoding して CatBoost に入れる設計は、
      これまで試した単列 high-IV 系より強い可能性がある
    - original data をそのまま混ぜるのではなく、重みを落として train fold にだけ混ぜる設計は有効な可能性がある
    - post-processing の bias tuning は CatBoost 主軸の更新に寄与する可能性がある
    - 共有コードの勝ち筋は、pairwise 単体ではなく
      original mixing + pairwise TE + SymmetricTree + bias tuning の組み合わせにある可能性が高い
  non_goals:
    - 初回から共有 notebook の full 再現はしない
    - 可視化や presentation 用セルは持ち込まない
    - pairwise の更なる大量展開や Optuna はまだやらない
    - この実験だけで最終形を決めない

source_notebook:
  title: 0.979 CV Single CAT: Pairwise TE + Bias Tuning
  author: UtaAzu
  source_type: kaggle_shared_notebook
  review_status: code_text_received
  shared_notebook_summary:
    - original data を train fold 側に重み付きで追加
    - adversarial validation で drift を確認
    - physical/domain features を3本追加
    - base feature 同士の pairwise combinations を生成
    - pairwise columns のみに multiclass TargetEncoder を in-fold 適用
    - CatBoost SymmetricTree を使用
    - OOF probability に対して bias tuning を実施
  known_shared_results:
    raw_cv_ba: 0.977157
    tuned_cv_ba: 0.979110
    public_lb: 0.97841

data:
  source:
    - train.csv
    - test.csv
    - original.csv
  target: Irrigation_Need
  row_scope:
    train: full_train
    test: full_test
    original: available
  raw_feature_groups:
    numeric_cols:
      - Soil_pH
      - Soil_Moisture
      - Organic_Carbon
      - Electrical_Conductivity
      - Temperature_C
      - Humidity
      - Rainfall_mm
      - Sunlight_Hours
      - Wind_Speed_kmh
      - Field_Area_hectare
      - Previous_Irrigation_mm
    categorical_cols:
      - Soil_Type
      - Crop_Type
      - Crop_Growth_Stage
      - Season
      - Irrigation_Type
      - Water_Source
      - Mulching_Used
      - Region
  derived_feature_groups_expected:
    - physical_features
    - TE_ORIG_base_features
    - pairwise_combinations
    - in_fold_pairwise_te_features

method:
  model_family: CatBoost
  model_name: CatBoostClassifier
  reproduction_level: minimum
  shared_components_to_keep:
    - original_weighted_merge
    - physical_features
    - target_encoding_prior_from_original
    - pairwise_combinations
    - in_fold_target_encoding_for_pairwise
    - SymmetricTree
    - bias_tuning
    - artifact_saving
  shared_components_to_skip:
    - notebook presentation cells
    - drift feature importance plots
    - distribution plots
    - cosmetic visualization blocks
  feature_engineering:
    physical_features:
      - ET_proxy
      - water_deficit
      - soil_quality
    original_target_prior_features:
      description: >
        original target を numeric 化して base columns ごとに prior mean を作る。
        categorical は category mean、numeric は histogram bins=10 ベースの mean を使う。
    pairwise_combinations:
      source_columns:
        - Soil_pH
        - Soil_Moisture
        - Organic_Carbon
        - Electrical_Conductivity
        - Temperature_C
        - Humidity
        - Rainfall_mm
        - Sunlight_Hours
        - Wind_Speed_kmh
        - Field_Area_hectare
        - Previous_Irrigation_mm
        - Soil_Type
        - Crop_Type
        - Crop_Growth_Stage
        - Season
        - Irrigation_Type
        - Water_Source
        - Mulching_Used
        - Region
      raw_pair_count_expected: 171
      filtering_rule: >
        factorize 後のユニーク数が全体件数の半分以下のものだけ採用する。
      accepted_pair_count_from_shared: 135
    target_encoding:
      apply_to: pairwise_columns_only
      encoder: sklearn.preprocessing.TargetEncoder
      target_type: multiclass
      inner_cv: 3
      leak_policy: in-fold only
  original_merge_policy:
    merge_scope: outer_train_only
    original_row_weight: 0.35
    class_weighting: balanced
  cv:
    scheme: StratifiedKFold
    n_splits: 5
    shuffle: true
    seed: 42
  catboost_params_expected:
    iterations: 3000
    learning_rate: 0.03
    depth: 8
    grow_policy: SymmetricTree
    loss_function: MultiClass
    eval_metric: TotalF1
    early_stopping_rounds: 150
    task_type: GPU
  bias_tuning:
    apply_to: logit_of_oof_probabilities
    objective: Balanced Accuracy
    search_method: coordinate_descent
    step_schedule:
      - 1.0
      - 0.5
      - 0.2
      - 0.1
      - 0.05
      - 0.02
      - 0.01
      - 0.005
      - 0.002
    shared_best_bias:
      - -1.3
      - -1.3
      - 1.043
  outputs_expected:
    - oof probability numpy
    - test probability numpy
    - submission csv
    - best_class_bias.npy
    - feature_columns.csv
    - cv_result.json

implementation_policy:
  principles:
    - strict CV を崩さない
    - 共有コードを丸写しせず、自分の artifact 管理に合わせる
    - minimum reproduction で先に強さを確認する
    - full 再現やアブレーションは次段で行う
  open_questions:
    - shared の 135 pair が自分の実装でも同数になるか
    - shared notebook の CV/LB にどこまで近づけるか
    - original weighting と bias tuning のどちらが主因か
    - adversarial validation は初回 minimum で必須か、後で切り出すべきか

comparison:
  against:
    - cat_digit_min_bias
    - cat_strict_baseline_bias_wide
    - cat_log_min_bias
    - exp_20260406_013_gbdt_catnum_top4_min
    - exp_20260406_014_gbdt_te_top4_min
    - exp_20260406_017_nn_bias_wide
  focus:
    - CatBoost 主軸を更新できるか
    - pairwise TE 設計が単列 high-IV 系より強いか
    - original weighted merge が有効か
    - bias tuning がどれだけ改善幅を持つか
    - 共有コードの勝ち筋が minimum reproduction でも再現されるか

result:
