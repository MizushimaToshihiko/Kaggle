  notes:
    - 共有コード本文は確認済み
    - まだ notebook 未実装
    - minimum reproduction から開始
    - 完走後に raw/biased CV, pair count, LB, 判定を記録する

decision:
  verdict: pending
  reason: >
    共有コード本文は確認できたが、まだ自分の exp 形式での minimum 実装を行っていない。
    まずは minimum reproduction を実行し、既存 CatBoost 主軸との比較を行う。
  next_action:
    - notebook を exp_* 形式で実装する
    - minimum reproduction を完走させる
    - raw CV / biased CV / pair count / Public LB を確認する
    - 強ければ次に ablation か full 化を検討する

artifacts:
