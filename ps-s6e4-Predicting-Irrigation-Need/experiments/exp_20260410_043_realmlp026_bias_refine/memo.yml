experiment:
  exp_id: exp_20260410_043_realmlp026_bias_refine
  title: Refine bias tuning for 026 RealMLP pair TE
  competition: PS S6E4 Predicting Irrigation Need
  metric: balanced_accuracy
  status: done

purpose:
  objective: >
    026 の既存 bias が局所解でないかを確認し、
    bias 後処理だけを再探索して単体CV/LBの微更新を狙う。
    本命更新ではなく、補助候補としてもう一段マシになるかを見る。
  questions:
    - 026 の current best bias は十分詰め切れているか
    - raw CV からさらに biased CV を押し上げられるか
    - Public LB が改善するか
    - 補助素材としての価値を少しでも上げられるか

design:
  base_parent: exp_20260409_026_realmlp_pair_te_min
  retraining: false
  posthoc_only: true
  bias_space: class-wise additive bias in log-prob space
  search_style: coarse_to_local_to_ultra_local

inputs:
  raw_oof: oof_realmlp_pair_te_min_proba.npy
  raw_pred: pred_realmlp_pair_te_min_proba.npy

search_plan:
  stage1:
    range: [-1.0, 1.0]
    step: 0.1
  stage2:
    width_around_stage1_best: 0.10
    step: 0.02
  stage3:
    width_around_stage2_best: 0.02
    step: 0.005

artifacts:
  expected_outputs:
    - oof_realmlp_pair_te_min_proba_biased_refined.npy
    - pred_realmlp_pair_te_min_proba_biased_refined.npy
    - best_class_bias_refined.npy
    - submission_realmlp_pair_te_min_bias_refined.csv
    - cv_result.json

comparison:
  primary_baselines:
    - current_026_raw
    - current_026_biased
    - single_025
    - refined_024
  compare_items:
    - raw_cv
    - refined_biased_cv
    - public_lb
    - delta_vs_old_biased_cv
    - delta_vs_old_biased_lb

result:
  summary: ""
  verdict: ""
  notes: ""

  cv:
    raw_026: null
    old_biased_026: null
    refined_biased_026: null

  lb_public:
    old_biased_026: null
    refined_biased_026: null
    single_025_reference: 0.97981
    refined_024_reference: 0.97976

  delta:
    refined_vs_old_biased_cv: null
    refined_vs_old_biased_lb: null
    refined_vs_single_025_lb: null
    refined_vs_refined_024_lb: null

  best_bias:
    old_bias: []
    refined_bias: []

decision_rule:
  keep:
    - refined biased CV improves over old biased CV
    - and Public LB also improves
    - and 026 remains a plausible auxiliary candidate
  hold:
    - CV improves slightly but LB is flat
    - still usable as refreshed 026 reference
  drop:
    - no meaningful CV gain
    - and LB does not improve

expected_interpretation:
  best_case: >
    026 becomes a stronger auxiliary model while keeping its different role from 024/025.
  neutral_case: >
    bias refinement gives only a tiny gain and does not change overall ranking.
  worst_case: >
    current 026 bias was already near-optimal, and extra search is wasted motion.

judgement_template:
  what_happened: ""
  why_it_matters: ""
  next_decision: ""

next_action:
  if_good: >
    keep refreshed 026 as a stronger auxiliary candidate and reconsider small safe blends later.
  if_unclear: >
    keep refined 026 as reference but do not overinvest further.
  if_bad: >
    stop spending time on 026 bias refinement and move to 041 lightweight bias check or another family.
