experiment:
  exp_id: exp_20260406_016_nn_digit_log_light
  title: NN digit/log light on strict baseline numerical features
  phase: feature_selection
  status: done
  kind: training

competition:
  name: PS S6E4 Predicting Irrigation Need
  metric: Balanced Accuracy

purpose:
  summary: >
    NN strict baseline を土台に、数値列へ軽量な digit/log 特徴を追加して
    NN系で有効かを確認する。CATNUM / TE / high-IV 起点統計特徴はまだ入れない。
  hypothesis:
    - raw strict baseline より、NN は軽量な数値表現追加で改善する可能性がある
    - digit/log light は GBDT 的な単列統計特徴より NN に自然な入力になりうる
    - 数値表現の改善余地があれば、NN family を続行する根拠になる
  non_goals:
    - CATNUM はまだ入れない
    - TE はまだ入れない
    - high-IV 起点の強調はまだ入れない
    - bias wide はまだ入れない
    - Optuna はまだやらない

data:
  source:
    - train.csv
    - test.csv
  target: Irrigation_Need
  row_scope:
    train: full_train
    test: full_test
  raw_numeric_cols:
    - Soil_pH
    - Soil_Moisture
    - Organic_Carbon
    - Electrical_Conductivity
    - Temperature_C
    - Humidity
    - Rainfall_mm
    - Sunlight_Hours
    - Wind_Speed_kmh
    - Field_Area_hectare
    - Previous_Irrigation_mm
  categorical_cols:
    - Soil_Type
    - Crop_Type
    - Crop_Growth_Stage
    - Season
    - Irrigation_Type
    - Water_Source
    - Region
    - Mulching_Used
  light_num_targets:
    - Soil_Moisture
    - Organic_Carbon
    - Electrical_Conductivity
    - Rainfall_mm
    - Sunlight_Hours
    - Wind_Speed_kmh
    - Field_Area_hectare
    - Previous_Irrigation_mm

method:
  model_family: NeuralNetwork
  model_name: TabularMLP
  numerical_preprocess: StandardScaler
  categorical_preprocess: fold-wise integer indexing for embedding
  engineered_numeric_features:
    - log1p
    - sqrt
    - is_zero
    - integer_part
    - frac_part
    - first_decimal
    - second_decimal
    - integer_like_flag
  architecture:
    embedding_rule: min(32, max(4, int(sqrt(cardinality)) + 1))
    hidden_layers:
      - 256
      - 128
      - 64
    activation: ReLU
    batch_norm: true
    dropout:
      - 0.2
      - 0.2
      - 0.1
  optimization:
    optimizer: AdamW
    lr: 0.001
    weight_decay: 0.00001
    batch_size: 1024
    epochs: 30
    early_stopping_patience: 5
  cv:
    scheme: StratifiedKFold
    n_splits: 5
    shuffle: true
    seed: 42
  target_classes:
    - Low
    - Medium
    - High
  outputs:
    - oof_nn_digit_log_light_proba.npy
    - pred_nn_digit_log_light_proba.npy
    - submission_nn_digit_log_light.csv
    - feature_columns.csv
    - cv_result.json

result:
  cv:
    score: 0.961227
    fold_scores:
    - 0.96013245534979
    - 0.9623076884881746
    - 0.961504798337831
    - 0.9611252885400822
    - 0.9610635539319544
  lb:
    public: 0.96120
    private: null
  selected_feature_group:
    - raw_num
    - raw_cat
    - digit_log_light_num
  notes:
    - 完走
    - NN strict baselineと比べてCV/LBが明確に改善した

comparison:
  against:
    - exp_20260406_015_nn_strict_baseline
    - cat_strict_baseline_bias_wide
    - cat_digit_min_bias
    - cat_log_min_bias
  focus:
    - NN strict baseline より改善するか
    - NN family を続行する価値があるか
    - bias wide を足す前に数値表現だけでどこまで伸びるか

decision:
  verdict: "hold"
  reason: >
    - NN strict baselineと比べてCV/LBが改善したので一旦holdとする
  next_action:
    - 明確に改善したので nn_high_iv_focus_min または nn_bias_wide を検討

artifacts:
  files:
    - ps-s6e4-nn-digit-log-light.ipynb
    - memo.yml
