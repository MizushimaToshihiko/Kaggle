operational_notes:
  summary: >
    synthetic-threshold 系は discussion687460 由来の知識だが、
    exact formula の追求はしない。
    026 family の別枠性を壊さずに少量追加することが目的であり、
    pair source の作り直しはしない。
  current_global_rule: >
    新モデル作成のたびに blend benchmark を通す。
    何でも benchmark に入れない。
    主力更新候補は差し替え、別人格候補は追加。
    提出は benchmark 上位2〜3本に絞る。 

risk:
  - 026 の別枠性を壊す可能性
  - threshold 追加で 025 / 046b に寄るだけになる可能性
  - CPU お試しの微改善が full 実行では消える可能性
  - 単体改善しても blend 改善に変換されない可能性

next_action:
  - 054 を full 実行して raw_cv_ba / refined_biased_cv / public_lb を記録
  - 026 / 025 / 046b / 048 / 053 との raw / rank 相関を確認
  - gate_rule_before_blend を満たすか判定
  - 満たす場合のみ blend benchmark に追加
  - keep / hold / drop を確定
