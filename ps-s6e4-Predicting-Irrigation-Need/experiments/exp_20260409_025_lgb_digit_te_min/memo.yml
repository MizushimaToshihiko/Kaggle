experiment:
  exp_id: exp_20260409_025_lgb_digit_te_min
  title: LGB digit features + multiclass TargetEncoder minimum reproduction
  competition: PS S6E4 Predicting Irrigation Need
  objective: >
    yunsuxiaozi_lgb_lb0.97971 の骨格から、
    digit features + frequency remap + multiclass TargetEncoder + LGBMClassifier
    だけを残した最小再現版を作る。
    018 / 024 と異なる人格候補になりうるかを確認する。

status:
  stage: done
  verdict: adopt

source_reference:
  notebook_name: code_yunsuxiaozi_lgb_lb0.97971
  reference_type: shared_code
  key_elements:
    - digit features
    - category frequency remap
    - multiclass TargetEncoder
    - LGBMClassifier
    - class weight tuning
  intentionally_removed:
    - Optuna class weight tuning
    - extra surrounding optimization

design:
  model_family: LightGBM
  target_type: multiclass
  seed: 2026
  n_folds: 5
  cv_type: KFold
  use_digit_features: true
  use_frequency_remap: true
  use_multiclass_target_encoder: true
  use_optuna: false
  bias_tuning_type: simple_manual_grid

data:
  train_path: /kaggle/input/competitions/playground-series-s6e4/train.csv
  test_path: /kaggle/input/competitions/playground-series-s6e4/test.csv
  target_col: Irrigation_Need
  id_col: id

features:
  raw_categorical:
    - Soil_Type
    - Crop_Type
    - Crop_Growth_Stage
    - Season
    - Irrigation_Type
    - Water_Source
    - Mulching_Used
    - Region

  raw_numeric:
    - Soil_pH
    - Soil_Moisture
    - Organic_Carbon
    - Electrical_Conductivity
    - Temperature_C
    - Humidity
    - Rainfall_mm
    - Sunlight_Hours
    - Wind_Speed_kmh
    - Field_Area_hectare
    - Previous_Irrigation_mm

  feature_engineering:
    digit_features:
      enabled: true
      rule: >
        各数値列について k=-4..3 の digit 特徴を作成し、
        その後に元数値列を最大値に応じて round(3/2/1) する。
    drop_constant_digit_columns:
      enabled: true
    frequency_remap:
      enabled: true
      target: raw_categorical + digit_features
      rule: >
        train の value_counts() を使い、count>=5 のカテゴリを順に id 化し、
        それ未満は default bucket に落とす。
    multiclass_target_encoder:
      enabled: true
      target_columns:
        - all FEATURES
      params:
        target_type: multiclass
        smooth: auto
        cv: 5
        random_state: 42
      note: >
        shared code 準拠で FEATURES 全体に multiclass TargetEncoder をかける。
        その後、元カテゴリ列 CATS は drop する。

lgb_params:
  n_estimators: 6000
  boosting_type: gbdt
  max_depth: 4
  num_leaves: 32
  learning_rate: 0.05
  feature_fraction: 0.6
  bagging_fraction: 0.7
  bagging_freq: 1
  lambda_l1: 10
  lambda_l2: 10
  min_child_samples: 12
  random_state: 2026
  n_jobs: -1
  max_bin: 15000
  verbosity: -1
  subsample: 0.5
  subsample_for_bin: 100000
  subsample_freq: 1

class_weighting:
  base_sample_weight:
    enabled: true
    rule: balanced_per_class_frequency
  post_bias_tuning:
    enabled: true
    method: simple_grid
    note: >
      shared code の Optuna は使わず、
      少数の class weight 候補のみで簡易確認する。

hypothesis:
  - digit + multiclass TE の骨格だけでも実戦圏に乗る可能性がある
  - 024 と近い発想だが学習器が LightGBM なので、相関が少しズレる可能性がある
  - 018 と比べると pairwise 主体ではないため、keep 候補になりうる

comparison_plan:
  primary_compare_to:
    - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
    - exp_20260409_024_xgb_digit_orderedte_min
  secondary_compare_to:
    - exp_20260405_008_cat_digit_min_bias
    - exp_20260405_006_cat_strict_baseline_bias_wide
    - exp_20260405_011_cat_log_min_bias
  metrics:
    - raw_cv_ba
    - biased_cv_ba
    - public_lb
    - future_corr_vs_018
    - future_corr_vs_024

expected_read:
  strong_result:
    raw_cv_ba: "0.978台前半以上"
    biased_cv_ba: "0.979台前後以上"
    interpretation: >
      最小再現でもかなり強い。018 / 024 に次ぐ keep 候補として有力。
  medium_result:
    raw_cv_ba: "0.976台後半〜0.978未満"
    biased_cv_ba: "0.978台前半〜0.979未満"
    interpretation: >
      単体最強ではないが、相関がズレるなら keep 候補。
  weak_result:
    raw_cv_ba: "< 0.9765"
    biased_cv_ba: "< 0.9780"
    interpretation: >
      最小再現としては弱い。相関妙味がない限り drop 寄り。

results:
  raw_cv_ba: 0.9792273875999572
  biased_cv_ba: 0.9793964215510969
  public_lb: 0.97981
  improvement_from_bias: 0.000169
  n_features_before_te: 85
  n_features_after_te: 332
  fold_scores:
    - 0.9786321173057708
    - 0.9802635418697236
    - 0.9793860229727533
    - 0.979920286211565
    - 0.9779558284095116
  best_class_weights: [
    1.8,
    1.5,
    2.4,
  ]
  summary_interpretation: "最小再現でもかなり強い。018 / 024 に次ぐ keep 候補として有力。"
  verdict: adopt

future_corr_check:
  planned: true
  target_mainline:
    - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
    - exp_20260409_024_xgb_digit_orderedte_min
  raw_pearson_flatten_vs_018: 0.994775
  rank_spearman_flatten_vs_018: 0.945456
  raw_pearson_flatten_vs_024: 0.998641
  rank_spearman_flatten_vs_024: 0.992057
  interpretation: >
    018 に対してはそこそこズレているが、024 に対しては非常に高相関。
    完全な別人格とは言えず、digit+TE 系の近縁候補とみなすのが妥当。

artifacts:
  planned_outputs:
    - oof_lgb_digit_te_min_proba.npy
    - pred_lgb_digit_te_min_proba.npy
    - oof_lgb_digit_te_min_proba_biased.npy
    - pred_lgb_digit_te_min_proba_biased.npy
    - submission_lgb_digit_te_min.csv
    - feature_columns.csv
    - cv_result.json

decision:
  implication_for_next_step: >
    025 は単体性能は非常に強いが、024 と高相関で役割が近い。
    したがって 024 と 025 を同時に深掘りするより、
    まずはより異なる系統の候補探索を優先すべき。
  recommended_next_action: >
    025 は keep するが、次は Mahog_RealMLP の最小再現に進む。
  avoid_action: >
    025 を 024 とは独立した強い別人格として過大評価しない。

notes:
  - この実験は shared code 全再現ではなく、別人格候補判定のための最小再現
  - 024 と比較して、LGB がどれだけズレるかを見る
  - 単体CVだけで採否を即断しない
  - Optuna は今はやらない

post_run_fill:
  completed_at: "2026-04-09"
  runtime_note: "39m 3s · GPU P100"
  file_check:
    oof_saved: true
    pred_saved: true
    submission_saved: fatruelse
    cv_result_saved: true
  final_comment: ""
