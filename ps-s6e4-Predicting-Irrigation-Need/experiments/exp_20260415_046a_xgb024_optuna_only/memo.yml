experiment:
  exp_id: exp_20260415_046a_xgb024_optuna_only
  title: Optuna only tuning for 024 XGB digit orderedTE
  competition: PS S6E4 Predicting Irrigation Need
  metric: balanced_accuracy
  status: done

purpose:
  objective: >
    024 系の feature pipeline を維持したまま、XGB ハイパーパラメータだけを Optuna で探索する。
    まずは探索結果だけを取得し、重い後段学習は分離して 046b で実施する。
  questions:
    - 024 raw モデル本体に改善余地があるか
    - Optuna best trial の raw CV はどこまで伸びるか
    - 探索空間の中で有望なパラメータ帯はどこか
    - 046b を実行する価値があるか

design:
  phase: optuna_only
  base_parent: exp_20260409_024_xgb_digit_orderedte_min
  feature_pipeline: same_as_024
  optuna_target: xgb_hyperparameters_only
  retraining: false
  posthoc_bias_included: false
  ordered_te_in_fold: true
  cv:
    fold_type: KFold
    n_splits: 5
    shuffle: true
    random_state: 42
  model_seed: 2026

search_space:
  n_estimators:
    low: 1500
    high: 5000
    step: 500
  max_depth:
    low: 3
    high: 7
  learning_rate:
    low: 0.01
    high: 0.08
    log: true
  min_child_weight:
    low: 1.0
    high: 10.0
    log: true
  subsample:
    low: 0.65
    high: 1.0
  colsample_bytree:
    low: 0.45
    high: 1.0
  gamma:
    low: 0.0
    high: 5.0
  reg_alpha:
    low: 1.0e-8
    high: 10.0
    log: true
  reg_lambda:
    low: 1.0e-6
    high: 20.0
    log: true
  max_delta_step:
    low: 0.0
    high: 5.0

optuna:
  n_trials: 25
  direction: maximize

artifacts:
  expected_outputs:
    - optuna_trials.csv
    - best_params.json
    - cv_result.json

comparison:
  primary_baselines:
    - current_024_raw
    - refined_024_biased
    - current_025_biased
  compare_items:
    - best_cv_raw
    - trial_distribution
    - best_params
    - fold_scores

result:
  summary: ""
  verdict: ""
  notes: ""

  cv:
    old_raw_024: 0.978635
    refined_biased_024_reference: 0.979624
    optuna_best_raw_024: null

  lb_public:
    refined_024_reference: 0.97976
    single_025_reference: 0.97981
    optuna_best_raw_024: null

  delta:
    optuna_vs_old_raw_cv: null
    optuna_vs_refined_024_cv: null
    optuna_vs_refined_024_lb: null
    optuna_vs_single_025_lb: null

  best_trial:
    number: null
    params: {}
    fold_scores: []

decision_rule:
  keep:
    - optuna best raw CV clearly improves over old raw 024
    - and results justify running 046b fixed-train
  hold:
    - some improvement exists but not enough to justify immediate 046b
  drop:
    - no meaningful improvement
    - or trial behavior suggests 024 raw is already near its limit

expected_interpretation:
  best_case: >
    024 raw has clear headroom, and 046b is justified as the next step.
  neutral_case: >
    raw CV improves only slightly; 046b may be optional.
  worst_case: >
    024 was already near saturation, and Optuna adds little practical value.

judgement_template:
  what_happened: ""
  why_it_matters: ""
  next_decision: ""

next_action:
  if_good: >
    Run 046b using best_params.json to generate OOF/test predictions, then compare against refined_024 and 025.
  if_unclear: >
    Inspect trial distribution and best parameter stability before deciding on 046b.
  if_bad: >
    Stop deeper work on 024 Optuna and move the next heavy search to 026 or another family.
