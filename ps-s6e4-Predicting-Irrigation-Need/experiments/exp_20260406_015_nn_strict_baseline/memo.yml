experiment:
  exp_id: exp_20260406_015_nn_strict_baseline
  title: NN strict baseline with raw numerical and categorical inputs
  phase: feature_selection
  status: done
  kind: training

competition:
  name: PS S6E4 Predicting Irrigation Need
  metric: Balanced Accuracy

purpose:
  summary: >
    NN系の素の基準線を作るため、数値11列とカテゴリ8列のみを入力にした
    strict baseline を実行する。digit/log/CATNUM/TE はまだ入れない。
  hypothesis:
    - GBDT系で弱かった high-IV 起点特徴を無理に流用せず、NN素の基準線を先に確認すべき
    - raw numerical + categorical embedding だけでも一定の性能が出る可能性がある
    - ここを基準線にしてから NN向けの軽量特徴追加を判断する
  non_goals:
    - digit/log 特徴はまだ入れない
    - CATNUM / TE はまだ入れない
    - high-IV 起点の強調はまだ入れない
    - Optuna はまだやらない

data:
  source:
    - train.csv
    - test.csv
  target: Irrigation_Need
  row_scope:
    train: full_train
    test: full_test
  numeric_cols:
    - Soil_pH
    - Soil_Moisture
    - Organic_Carbon
    - Electrical_Conductivity
    - Temperature_C
    - Humidity
    - Rainfall_mm
    - Sunlight_Hours
    - Wind_Speed_kmh
    - Field_Area_hectare
    - Previous_Irrigation_mm
  categorical_cols:
    - Soil_Type
    - Crop_Type
    - Crop_Growth_Stage
    - Season
    - Irrigation_Type
    - Water_Source
    - Region
    - Mulching_Used

method:
  model_family: NeuralNetwork
  model_name: TabularMLP
  numerical_preprocess: StandardScaler
  categorical_preprocess: fold-wise integer indexing for embedding
  architecture:
    embedding_rule: min(32, max(4, int(sqrt(cardinality)) + 1))
    hidden_layers:
      - 256
      - 128
      - 64
    activation: ReLU
    batch_norm: true
    dropout:
      - 0.2
      - 0.2
      - 0.1
  optimization:
    optimizer: AdamW
    lr: 0.001
    weight_decay: 0.00001
    batch_size: 1024
    epochs: 30
    early_stopping_patience: 5
  cv:
    scheme: StratifiedKFold
    n_splits: 5
    shuffle: true
    seed: 42
  target_classes:
    - Low
    - Medium
    - High
  outputs:
    - oof_nn_strict_baseline_proba.npy
    - pred_nn_strict_baseline_proba.npy
    - submission_nn_strict_baseline.csv
    - feature_columns.csv
    - cv_result.json

result:
  cv:
    score: 0.958089
    fold_scores: 
    - 0.9588365230631926
    - 0.9614739407131961
    - 0.9565792813846946
    - 0.9548218908637028
    - 0.9587333180147374
  lb:
    public: 0.95833
    private: null
  selected_feature_group:
    - raw_num
    - raw_cat
  notes:
    - 完走
    - CV/LB共にCatBoost 主軸群を更新できず

comparison:
  against:
    - cat_strict_baseline_bias_wide
    - cat_digit_min_bias
    - cat_log_min_bias
    - exp_20260406_013_gbdt_catnum_top4_min
    - exp_20260406_014_gbdt_te_top4_min
  focus:
    - NN素の基準線がどの程度出るか->基準は出せた
    - GBDT単列特徴より素のNNの方が強いか->Cat baseline LB0.95920よりわずかに下回った
    - 次に digit/log light を足す価値があるか->biasも試してみた方が良いかも

decision:
  verdict: "drop
  reason: >
    CAT baselineにもCV/LBが及ばなかった
  next_action:
    - NN family / 学習設定の見直しを検討

artifacts:
  files:
    - ps-s6e4-nn-strict-baseline.ipynb
    - memo.yml
