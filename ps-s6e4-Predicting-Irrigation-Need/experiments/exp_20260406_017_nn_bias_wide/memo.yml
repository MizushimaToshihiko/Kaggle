experiment:
  exp_id: exp_20260406_017_nn_bias_wide
  title: NN bias wide on digit/log light baseline
  phase: feature_selection
  status: done
  kind: training

competition:
  name: PS S6E4 Predicting Irrigation Need
  metric: Balanced Accuracy

purpose:
  summary: >
    016_nn_digit_log_light を土台に、後処理の class bias wide search を追加し、
    NN系で bias wide が有効かを確認する。モデル本体は変えず、
    OOF / test probability に対してクラス別 bias を適用する。
  hypothesis:
    - NN digit/log light の出力確率に対して class bias を加えることで
      Balanced Accuracy が改善する可能性がある
    - モデル本体よりクラス境界の調整が効くなら、NN family 続行の根拠になる
    - CatBoost で効いた bias wide が NN でも部分的に効く可能性がある
  non_goals:
    - high-IV 起点の強調はまだ入れない
    - TE / CATNUM はまだ入れない
    - Optuna はまだやらない
    - モデル構造自体は変えない

data:
  source:
    - train.csv
    - test.csv
  target: Irrigation_Need
  row_scope:
    train: full_train
    test: full_test
  raw_numeric_cols:
    - Soil_pH
    - Soil_Moisture
    - Organic_Carbon
    - Electrical_Conductivity
    - Temperature_C
    - Humidity
    - Rainfall_mm
    - Sunlight_Hours
    - Wind_Speed_kmh
    - Field_Area_hectare
    - Previous_Irrigation_mm
  categorical_cols:
    - Soil_Type
    - Crop_Type
    - Crop_Growth_Stage
    - Season
    - Irrigation_Type
    - Water_Source
    - Region
    - Mulching_Used
  light_num_targets:
    - Soil_Moisture
    - Organic_Carbon
    - Electrical_Conductivity
    - Rainfall_mm
    - Sunlight_Hours
    - Wind_Speed_kmh
    - Field_Area_hectare
    - Previous_Irrigation_mm

method:
  model_family: NeuralNetwork
  model_name: TabularMLP
  base_experiment: exp_20260406_016_nn_digit_log_light
  numerical_preprocess: StandardScaler
  categorical_preprocess: fold-wise integer indexing for embedding
  engineered_numeric_features:
    - log1p
    - sqrt
    - is_zero
    - integer_part
    - frac_part
    - first_decimal
    - second_decimal
    - integer_like_flag
  architecture:
    embedding_rule: min(32, max(4, int(sqrt(cardinality)) + 1))
    hidden_layers:
      - 256
      - 128
      - 64
    activation: ReLU
    batch_norm: true
    dropout:
      - 0.2
      - 0.2
      - 0.1
  optimization:
    optimizer: AdamW
    lr: 0.001
    weight_decay: 0.00001
    batch_size: 1024
    epochs: 30
    early_stopping_patience: 5
  cv:
    scheme: StratifiedKFold
    n_splits: 5
    shuffle: true
    seed: 42
  target_classes:
    - Low
    - Medium
    - High
  bias_wide:
    apply_to: log_proba
    grid_min: -0.30
    grid_max: 0.30
    grid_step: 0.02
    search_space: class-wise 3d grid
  outputs:
    - oof_nn_bias_wide_proba.npy
    - pred_nn_bias_wide_proba.npy
    - best_class_bias.npy
    - submission_nn_bias_wide.csv
    - feature_columns.csv
    - cv_result.json

result:
  cv:
    score_raw: 0.961197
    score_biased: 0.962928
    fold_scores:
      - 0.9606708162703755
      - 0.9620438448153213
      - 0.96094252244266
      - 0.9610492794123052
      - 0.9612791099479834
  lb:
    public: 0.96142
    private: null
  best_bias:
    - -0.30000001192092896
    - -0.30000001192092896
    - 0.30000001192092896
  selected_feature_group:
    - raw_num
    - raw_cat
    - digit_log_light_num
    - class_bias_wide
  notes:
    - 完走
    - cv.score_raw は 016 比でほぼ同等
    - cv.score_biased は改善
    - best_bias は [-0.3, -0.3, 0.3]
    - これは Low / Medium を選びにくくし、High を選びやすくする補正を意味する
    - best_bias が探索範囲の端に張り付いているため、必要なら bias search range の再検討余地あり

comparison:
  against:
    - exp_20260406_015_nn_strict_baseline: cv,lb共に上回った
    - exp_20260406_016_nn_digit_log_light: cv,lb共に上回った
    - cat_digit_min_bias: cv,lbともに及ばなかった
    - cat_strict_baseline_bias_wide: cv,lbともに及ばなかった
  focus:
    - 016 より改善するか->改善した
    - NN において bias wide が有効か->有効だった
    - high-IV emphasis に進む前に class boundary 調整でどこまで伸びるか->?

decision:
  verdict: hold
  reason: >
    016_nn_digit_log_light に class bias wide を追加した結果、
    raw CV は 0.961197 とほぼ同等だったが、
    biased CV は 0.962928、Public LB は 0.96142 まで改善した。
    NN系では現時点の最高点であり、bias wide が有効であることを確認できた。
    ただし CatBoost 主軸群にはまだ届かないため、主戦力ではなく keep 寄り hold とする。
  next_action:
    - NN系の細掘りはここでいったん止める
    - 4/10〜4/20 の共有コード確認で NN に効く入力表現を確認する
    - 共有コード確認後、NN family を残すなら 017 を起点に Optuna を検討する

artifacts:
  files:
    - ps-s6e4-nn-bias-wide.ipynb
    - memo.yml
