  mean_rank_corr_vs_046b: null
  mean_raw_corr_vs_048: null
  mean_rank_corr_vs_048: null
  mean_raw_corr_vs_053: null
  mean_rank_corr_vs_053: null
  mean_raw_corr_vs_054: null
  mean_rank_corr_vs_054: null
  decision_single: null

post_blend_benchmark:
  executed: false
  benchmark_notebook: ps-s6e4-safe-blend-v7-two-stage-ridge.ipynb
  mode: null
  stack_change:
    type: null
    description: null
  results:
    nelder_mead_cv: null
    hill_climb_cv: null
    stack_lr_cv: null
    equal_avg_cv: null
    ridge_cv: null
    public_lb_nelder_mead: null
    public_lb_hill_climb: null
    public_lb_stack_lr: null
    public_lb_equal_avg: null
    public_lb_ridge: null
  interpretation: >
    blend benchmark 後の解釈を書く。
    例:
    - NM にだけ効いた
    - HC では崩れた
    - 018 の補助 sibling として採用
    - 054 より近縁化した
  decision_after_blend: null

operational_notes:
  summary: >
    018 family はもともと pairwise / orig-prior / bias で人工構造を吸っている。
    そのため threshold-min の追加は、
    補強として働く可能性と近縁化のリスクが両方ある。
    exact formula の追求はしない。
    018 family の骨格比較を優先する。
  current_global_rule: >
    新モデル作成のたびに blend benchmark を通す。
    何でも benchmark に入れない。
    主力更新候補は差し替え、別人格候補は追加。
    提出は benchmark 上位2〜3本に絞る。

risk:
  - 018 family の人工構造が強すぎて threshold-min が冗長になる可能性
  - 046b や 053 に寄るだけになる可能性
  - pairwise source の拡張で特徴が増えすぎる可能性
  - 単体改善しても blend 改善に変換されない可能性

next_action:
  - 055 を実行して raw_cv_ba / refined_biased_cv / public_lb を記録
  - 018 / 025 / 046b / 048 / 053 / 054 との raw / rank 相関を確認
  - gate_rule_before_blend を満たすか判定
  - 満たす場合のみ blend benchmark に追加
  - keep / hold / drop を確定
