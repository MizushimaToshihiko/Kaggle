  mean_rank_corr_vs_018: 0.9386690173103277
  mean_raw_corr_vs_024_current: null
  mean_rank_corr_vs_024_current: null
  mean_raw_corr_vs_025: 0.9927810435834893
  mean_rank_corr_vs_025: 0.952268359821289
  mean_raw_corr_vs_046b: 0.9949026472740331
  mean_rank_corr_vs_046b: 0.968169704940796
  mean_raw_corr_vs_048: 0.9928021204909644
  mean_rank_corr_vs_048: 0.9533666594566408
  mean_raw_corr_vs_050: 0.9780268621843312
  mean_rank_corr_vs_050: 0.9546186676163985
  decision_single: drop寄りkeep

post_blend_benchmark:
  executed: false
  benchmark_notebook: ps-s6e4-safe-blend-v7-two-stage-ridge.ipynb
  mode: null
  stack_change:
    type: null
    description: null
  results:
    nelder_mead_cv: null
    hill_climb_cv: null
    stack_lr_cv: null
    equal_avg_cv: null
    ridge_cv: null
    public_lb_nelder_mead: null
    public_lb_hill_climb: null
    public_lb_stack_lr: null
    public_lb_equal_avg: null
    public_lb_ridge: null
  interpretation: >
    blend benchmark 後の解釈を書く。
    例:
    - NM にだけ効いた
    - HC では崩れた
    - 追加価値なし
    - 046b の補助 sibling として採用
  decision_after_blend: null

operational_notes:
  summary: >
    050 の RAW sibling は close。
    したがって、同 family で次に確認すべき表現差は LOG。
    今回も family 内比較が目的であり、
    046b 実コード準拠の骨格は保つが、Triko 全盛りにはしない。
  current_global_rule: >
    新モデル作成のたびに blend benchmark を通す。
    何でも benchmark に入れない。
    主力更新候補は差し替え、別人格候補は追加。
    提出は benchmark 上位2〜3本に絞る。 :contentReference[oaicite:2]{index=2}

risk:
  - 046b に対する近縁劣化版になる可能性
  - LOG 化しても相関がほとんど下がらない可能性
  - 単体微差改善が blend 改善に変換されない可能性
  - RAW と同様に HC / NM / LogReg 全てで崩れる可能性

next_action:
  - 051 を実行して raw_cv / refined_biased_cv / public_lb を記録
  - 046b / 025 / 048 / 050 との raw / rank 相関を確認
  - gate_rule_before_blend を満たすか判定
  - 満たす場合のみ blend benchmark に追加
  - keep / hold / drop を確定
