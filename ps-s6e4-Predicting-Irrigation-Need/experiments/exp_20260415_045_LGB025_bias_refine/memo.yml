experiment:
  exp_id: exp_20260415_045_LGB025_bias_refine
  title: Refine bias tuning for 025 LGB digit TE
  competition: PS S6E4 Predicting Irrigation Need
  metric: balanced_accuracy
  status: done

purpose:
  objective: >
    025 の既存 bias 探索が粗い可能性を踏まえ、post-hoc bias を再探索して
    単体CV/LBの微更新を狙う。Optuna より前に、現構成のままでどこまで詰められるかを確認する。
  questions:
    - 025 の current best bias は十分詰め切れているか
    - raw CV からさらに biased CV を押し上げられるか
    - Public LB が改善するか
    - 025 を本命単体としてさらに強化できるか

design:
  base_parent: exp_20260409_025_lgb_digit_te_min
  retraining: false
  posthoc_only: true
  bias_space: class-wise additive bias in log-prob space
  search_style: coarse_to_local_to_ultra_local

inputs:
  raw_oof: oof_lgb_digit_te_min_proba.npy
  raw_pred: pred_lgb_digit_te_min_proba.npy

search_plan:
  stage1:
    range: [-1.0, 1.0]
    step: 0.1
  stage2:
    width_around_stage1_best: 0.10
    step: 0.02
  stage3:
    width_around_stage2_best: 0.02
    step: 0.005

artifacts:
  expected_outputs:
    - oof_lgb_digit_te_min_proba_biased_refined.npy
    - pred_lgb_digit_te_min_proba_biased_refined.npy
    - best_class_bias_refined.npy
    - submission_lgb_digit_te_min_bias_refined.csv
    - cv_result.json

comparison:
  primary_baselines:
    - current_025_raw
    - current_025_biased
    - refined_024
  compare_items:
    - raw_cv
    - refined_biased_cv
    - public_lb
    - delta_vs_old_biased_cv
    - delta_vs_old_biased_lb
    - delta_vs_refined_024_lb

result:
  summary: ""
  verdict: "drop"
  notes: >
    CVは改善したがLBは悪化した。PS S6E4 Safe Blend Compareで025を入れ替えて実行提出したら、
    CV(0.980025->0.980015),LB(0.97974->0.97939)共に悪化したのでdrop。

  cv:
    raw_025: 0.979227
    old_biased_025: 0.979396
    refined_biased_025: 0.979430

  lb_public:
    old_biased_025: 0.97981
    refined_biased_025: 0.97810
    refined_024_reference: 0.97976

  delta:
    refined_vs_old_biased_cv: 0.000034
    refined_vs_old_biased_lb: -0.00171
    refined_vs_refined_024_lb: -0.00166

  best_bias:
    old_bias: [1.8, 1.5, 2.4]
    refined_bias: [-1.06, -1.09, 0.905]

decision_rule:
  keep:
    - refined biased CV improves over old biased CV
    - and Public LB also improves
    - and 025 remains the strongest single model
  hold:
    - CV improves slightly but LB is flat
    - 025 stays as mainline but extra refinement is not very meaningful
  drop:
    - no meaningful CV gain
    - and LB does not improve

expected_interpretation:
  best_case: >
    025 can be refreshed as an even stronger mainline single model without retraining.
  neutral_case: >
    bias refinement gives only a tiny gain and does not change the overall ranking.
  worst_case: >
    current 025 bias was already near-optimal, and extra search is wasted motion.

judgement_template:
  what_happened: ""
  why_it_matters: ""
  next_decision: ""

next_action:
  if_good: >
    adopt refined 025 as the new mainline single reference before considering Optuna.
  if_unclear: >
    keep current 025 as mainline and treat refined 025 as a near-equivalent reference.
  if_bad: >
    stop spending time on 025 bias refinement and move to Optuna only if still justified.
