experiment:
  exp_id: exp_20260410_034_dao_xgb_pair_te_core_min
  title: Dao XGB pairwise TE core minimum reproduction
  competition: PS S6E4 Predicting Irrigation Need
  metric: balanced_accuracy
  status: done

purpose:
  objective: >
    Dao 共有コードの核だけを最小再現し、018 の XGB 版として成立するかを確認する。
    改善の主因を pairwise TE + XGB 本体に限定して観察する。
  questions:
    - pairwise 171 -> accepted 135 の interaction 群は単体でどれだけ効くか
    - pairwise 列のみに multiclass TE を入れた XGB は 018 の別実装として意味があるか
    - 025 より相関が明確にズレる素材になるか
    - pseudo-label や post-hoc 最適化抜きでも戦えるか

design:
  model_family: xgb
  algorithm: XGBoost multiclass softprob
  cv:
    fold_type: StratifiedKFold
    n_splits: 5
    seed: 42
  target_encoding:
    enabled: true
    scope: pairwise_columns_only
    type: multiclass_target_encoder
    inner_cv: 5
    leak_free: true
  pairwise:
    source_columns:
      - Soil_pH
      - Soil_Moisture
      - Organic_Carbon
      - Electrical_Conductivity
      - Temperature_C
      - Humidity
      - Rainfall_mm
      - Sunlight_Hours
      - Wind_Speed_kmh
      - Field_Area_hectare
      - Previous_Irrigation_mm
      - Soil_Type
      - Crop_Type
      - Crop_Growth_Stage
      - Season
      - Irrigation_Type
      - Water_Source
      - Mulching_Used
      - Region
    raw_pair_count: 171
    acceptance_rule: nunique_total <= total_rows_combined * 0.5
    expected_pair_count: 135
  kept_elements:
    - raw numerical 11
    - raw categorical 8
    - pairwise interactions
    - pairwise multiclass TE
    - class weights
    - XGB core training
  removed_elements:
    - pseudo-label
    - post-hoc class weight optimization
    - formula/logit features
    - digit features
    - ordered target encoding
    - original merge
    - original priors
    - large EDA / statistical testing
    - optuna

features:
  raw_numeric:
    - Soil_pH
    - Soil_Moisture
    - Organic_Carbon
    - Electrical_Conductivity
    - Temperature_C
    - Humidity
    - Rainfall_mm
    - Sunlight_Hours
    - Wind_Speed_kmh
    - Field_Area_hectare
    - Previous_Irrigation_mm
  raw_categorical:
    - Soil_Type
    - Crop_Type
    - Crop_Growth_Stage
    - Season
    - Irrigation_Type
    - Water_Source
    - Mulching_Used
    - Region
  base_feature_count_expected: 19
  pair_te_feature_count_expected: 135 * 3

params:
  xgb:
    n_estimators: 20000
    max_depth: 4
    learning_rate: 0.03
    min_child_weight: 2.333941903991847
    subsample: 0.9766412297733108
    colsample_bytree: 0.535324419516146
    gamma: 4.258489082295074
    reg_alpha: 4.082875850185249e-08
    reg_lambda: 0.00013528868091784412
    objective: multi:softprob
    num_class: 3
    tree_method: hist
    eval_metric: mlogloss
    random_state: 42
    early_stopping_rounds: 300

artifacts:
  outputs:
    - oof_dao_xgb_pair_te_core_min_proba.npy
    - pred_dao_xgb_pair_te_core_min_proba.npy
    - submission_dao_xgb_pair_te_core_min.csv
    - feature_columns.csv
    - feature_importance.csv
    - pair_feature_meta.csv
    - cv_result.json

comparison:
  primary_targets:
    - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
    - exp_20260409_025_lgb_digit_te_min
    - exp_20260409_026_realmlp_pair_te_min
  compare_items:
    - raw_cv
    - public_lb
    - raw_corr
    - rank_corr

decision_rule:
  keep:
    - raw_cv >= 0.977 as rough guide
    - rank correlation clearly lower than 025
    - not just a weaker clone of 018
  hold:
    - cv slightly weaker but rank correlation meaningfully lower
    - potential stack material
  drop:
    - weak cv and close to both 018 and 025
    - only becomes competitive when later tricks are added

expected_interpretation:
  best_case: >
    018 の CatBoost pairwise 系と 025 の digit+TE 系の中間ではなく、
    018 の XGB 変種として stack 価値のある別素材になる。
  neutral_case: >
    単体はそこそこだが、018 と近すぎず 025 よりズレるので補助候補として keep。
  worst_case: >
    018 の劣化コピーであり、pseudo-label や post-hoc を乗せないと戦えない。

next_action:
  if_good: exp_20260410_035_dao_xgb_pair_te_plus_formula_min
  if_unclear: run correlation notebook against 018 / 025 / 026
  if_bad: drop and move to next family
