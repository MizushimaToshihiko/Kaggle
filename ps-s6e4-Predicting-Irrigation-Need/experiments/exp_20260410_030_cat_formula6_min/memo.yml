experiment:
  exp_id: exp_20260410_030_cat_formula6_min
  title: CatBoost formula-inspired minimum model with 6 key features
  competition: PS S6E4 Predicting Irrigation Need
  objective: >
    Chris Deotte の "Original Data's Exact Formula" discussion で示唆された
    6重要特徴
    - Soil_Moisture
    - Rainfall_mm
    - Temperature_C
    - Wind_Speed_kmh
    - Crop_Growth_Stage
    - Mulching_Used
    を使って、
    threshold features + score features を明示的に作成した
    formula-inspired な最小 CatBoost モデルを検証する。
    018 / 024 / 025 / 026 とは異なる思想の別人格候補になるかを確認する。

status:
  stage: done
  verdict: done

source_reference:
  discussion_title: Chris Deotte - Original Data's Exact Formula
  source_type: competition_discussion
  key_takeaways:
    - original data は 6重要特徴と閾値ルールで完全分離できる
    - 重要特徴は Soil_Moisture / Rainfall_mm / Temperature_C / Wind_Speed_kmh / Crop_Growth_Stage / Mulching_Used
    - simple score rule でも元データの構造をかなり表現できる
  intended_use:
    - 重要特徴の絞り込み
    - 閾値特徴の明示的作成
    - formula_score 系特徴の作成

design:
  model_family: CatBoost
  target_type: multiclass
  seed: 42
  n_folds: 5
  cv_type: StratifiedKFold
  use_original_data: true
  use_pairwise: false
  note: >
    今回は 6特徴 + threshold + score の最小構成のみを見る。
    6重要特徴同士の pair はまだ入れない。
    まず formula 系特徴だけで人格が立つかを確認する。

data:
  train_path: /kaggle/input/competitions/playground-series-s6e4/train.csv
  test_path: /kaggle/input/competitions/playground-series-s6e4/test.csv
  original_path: /kaggle/input/datasets/miadul/irrigation-water-requirement-prediction-dataset/irrigation_prediction.csv
  target_col: Irrigation_Need
  id_col: id

features:
  important_numeric:
    - Soil_Moisture
    - Rainfall_mm
    - Temperature_C
    - Wind_Speed_kmh

  important_categorical:
    - Crop_Growth_Stage
    - Mulching_Used

  threshold_features:
    - soil_lt_25
    - rain_lt_300
    - temp_gt_30
    - wind_gt_10

  category_indicator_features:
    - is_harvest
    - is_sowing
    - is_flowering
    - is_vegetative
    - mulch_yes
    - mulch_no

  score_features:
    - high_score
    - low_score
    - formula_score
    - score_abs
    - soil_rain_combo
    - temp_wind_combo

  note: >
    Chris discussion の簡易式を feature 化する。
    high_score = 2*soil_lt_25 + 2*rain_lt_300 + temp_gt_30 + wind_gt_10
    low_score = 2*is_harvest + 2*is_sowing + mulch_yes
    formula_score = high_score - low_score

catboost_params:
  iterations: 3000
  learning_rate: 0.03
  depth: 6
  grow_policy: SymmetricTree
  loss_function: MultiClass
  eval_metric: TotalF1:average=Macro
  early_stopping_rounds: 150
  task_type: GPU if torch.cuda.is_available() else CPU
  devices: '"0" only if GPU'
  verbose: 200

postprocess:
  bias_tuning:
    enabled: true
    method: simple_class_weight_grid
    grid:
      - [1.0, 1.0, 1.0]
      - [1.2, 1.2, 1.2]
      - [1.5, 1.5, 1.5]
      - [1.5, 1.3, 1.8]
      - [1.7, 1.5, 2.3]
      - [1.8, 1.5, 2.4]

hypothesis:
  - 6重要特徴 + 閾値 + score だけでも、実戦圏の単体モデルになる可能性がある
  - pairwise 全開や digit+TE 系とは異なる思想なので、相関妙味を持つ可能性がある
  - 単体性能が少し弱くても、既存候補とズレるなら keep 候補になりうる

comparison_plan:
  primary_compare_to:
    - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
    - exp_20260409_024_xgb_digit_orderedte_min
    - exp_20260409_025_lgb_digit_te_min
    - exp_20260409_026_realmlp_pair_te_min
  metrics:
    - raw_cv_ba
    - biased_cv_ba
    - public_lb
    - future_corr_vs_018
    - future_corr_vs_024
    - future_corr_vs_025
    - future_corr_vs_026

expected_read:
  strong_result:
    raw_cv_ba: "0.977台後半以上"
    biased_cv_ba: "0.978台前半以上"
    interpretation: >
      formula-inspired 最小構成でも十分強い。単体でも keep、相関がズレれば有力。
  medium_result:
    raw_cv_ba: "0.976台後半〜0.977前半"
    biased_cv_ba: "0.977台前半〜0.978未満"
    interpretation: >
      単体は少し弱いが、相関がズレるなら keep 候補。
  weak_result:
    raw_cv_ba: "< 0.9765"
    biased_cv_ba: "< 0.9775"
    interpretation: >
      最小構成としては弱い。pair や他補助特徴追加前に一旦評価を止める。

results:
  raw_cv_ba: 0.9598984123192418
  biased_cv_ba: 0.9598984123192418
  public_lb: 0.95678
  improvement_from_bias: 0.0
  n_features: 22
  original_formula_ba: 1
  fold_scores:
    - 0.9595034087768575
    - 0.9612844297002984
    - 0.9595134693362463
    - 0.9607346387921293
    - 0.958455981294798
  best_class_weights: [1, 1, 1]
  summary_interpretation: >
    formula-inspired 最小構成は、既存主力群に対してかなり低相関だったが、
    単体性能は大きく不足した。別人格性は確認できたが、
    現時点では本番候補としては弱すぎる。
  verdict: drop

feature_check:
  threshold_features_worked: true
  score_features_worked: true
  top_importance_features:
    - formula_score
    - score_abs
    - low_score
  interpretation: >
    formula 系特徴は実際に主役として使われていた。
    特に formula_score が圧倒的に最大 importance であり、
    030 が弱かった原因は特徴が無視されたことではなく、
    formula 系最小構成そのものの表現力不足だと考えられる。

future_corr_check:
  planned: true
  target_mainline:
    - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
    - exp_20260409_024_xgb_digit_orderedte_min
    - exp_20260409_025_lgb_digit_te_min
    - exp_20260409_026_realmlp_pair_te_min
  raw_pearson_flatten_vs_018: 0.891434
  rank_spearman_flatten_vs_018: 0.796306
  raw_pearson_flatten_vs_024: 0.893989
  rank_spearman_flatten_vs_024: 0.828625
  raw_pearson_flatten_vs_025: 0.892384
  rank_spearman_flatten_vs_025: 0.824640
  raw_pearson_flatten_vs_026: 0.895344
  rank_spearman_flatten_vs_026: 0.911624
  interpretation: >
    既存主力群に対して明確に低相関で、formula 系は別人格として成立している。
    ただし現状の最小構成は弱すぎるため、
    今後やるなら 030 そのものを keep するのではなく、
    formula 系強化版の新実験として扱うべき。

decision:
  implication_for_next_step: >
    formula 系は相関面では面白いが、最小構成のままでは本番候補に届かない。
    したがって 030 自体は drop とし、必要なら別日に
    formula 系の強化版を新実験として切り出す。
  recommended_next_action: >
    今すぐ主戦場にしない。まずは既存主力群の整理を優先し、
    formula 系は後続の派生実験として扱う。
  avoid_action: >
    低相関という理由だけで 030 を本番候補に残さない。

notes:
  - 今回は Chris discussion の仮説検証のための最小構成
  - 6重要特徴同士の pair はまだ入れない
  - まずは formula 系特徴だけで人格が立つかを確認する
  - 単体CVだけで即 drop しない。相関妙味を必ず見る

artifacts:
  planned_outputs:
    - oof_cat_formula6_min_proba.npy
    - pred_cat_formula6_min_proba.npy
    - oof_cat_formula6_min_proba_biased.npy
    - pred_cat_formula6_min_proba_biased.npy
    - submission_cat_formula6_min.csv
    - feature_importance.csv
    - feature_importance_by_fold.csv
    - feature_columns.csv
    - cv_result.json
    - memo.yml

post_run_fill:
  completed_at: "2026-04-09"
  runtime_note: "1m 11s · GPU T4 x2"
  file_check:
    oof_saved: true
    pred_saved: true
    submission_saved: true
    cv_result_saved: true
   final_comment: >
    相関妙味は確認できたが、単体性能不足により 030 自体は drop。
    formula 系は将来の派生実験候補として保留。
