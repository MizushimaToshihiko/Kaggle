experiment:
  exp_id: exp_20260409_027_corr_core4_candidates
  title: Correlation check for current 4 core candidates
  competition: PS S6E4 Predicting Irrigation Need
  objective: >
    現時点の主力4候補
    - exp_20260407_018_cat_pairwise_te_bias_from_shared_min
    - exp_20260409_024_xgb_digit_orderedte_min
    - exp_20260409_025_lgb_digit_te_min
    - exp_20260409_026_realmlp_pair_te_min
    の OOF / TEST probability の相関を整理し、
    近縁候補と別枠候補を明確にする。

status:
  stage: done
  verdict: done

analysis_type:
  kind: correlation_check
  target_space: multiclass probability
  primary_view:
    - raw_pearson_flatten
    - rank_spearman_flatten
  secondary_view:
    - classwise_cross_corr
    - row_sum_sanity_check

models:
  - exp_id: exp_20260407_018_cat_pairwise_te_bias_from_shared_min
    short_name: 018_cat_pairwise
    role_before_analysis: pairwise_mainline
    artifact:
      oof: oof_cat_pairwise_te_bias_from_shared_min_proba_biased.npy
      pred: pred_cat_pairwise_te_bias_from_shared_min_proba_biased.npy
    class_order_fix:
      applied: true
      permutation: [2, 0, 1]

  - exp_id: exp_20260409_024_xgb_digit_orderedte_min
    short_name: 024_xgb_digit_orderedte
    role_before_analysis: xgb_digit_te_candidate
    artifact:
      oof: oof_xgb_digit_orderedte_min_proba_biased.npy
      pred: pred_xgb_digit_orderedte_min_proba_biased.npy
    class_order_fix:
      applied: true
      permutation: [2, 0, 1]

  - exp_id: exp_20260409_025_lgb_digit_te_min
    short_name: 025_lgb_digit_te
    role_before_analysis: lgb_digit_te_candidate
    artifact:
      oof: oof_lgb_digit_te_min_proba_biased.npy
      pred: pred_lgb_digit_te_min_proba_biased.npy
    class_order_fix:
      applied: true
      permutation: [2, 0, 1]

  - exp_id: exp_20260409_026_realmlp_pair_te_min
    short_name: 026_realmlp_pair_te
    role_before_analysis: realmlp_candidate
    artifact:
      oof: oof_realmlp_pair_te_min_proba_biased.npy
      pred: pred_realmlp_pair_te_min_proba_biased.npy
    class_order_fix:
      applied: true
      permutation: [2, 0, 1]

method:
  notebook_base: code_show_corr.txt
  probability_version: biased
  flatten_before_global_corr: true
  rank_method: average
  row_sum_check: true
  classwise_cross_corr: true
  notes:
    - multiclass probability を flatten して raw Pearson / rank Pearson を確認する
    - class 列順ズレを避けるため、必要なモデルには permutation [2,0,1] を適用する
    - まず biased probability 同士で比較する

