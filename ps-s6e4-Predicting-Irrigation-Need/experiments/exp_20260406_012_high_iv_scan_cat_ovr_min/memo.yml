experiment:
  exp_id: exp_20260406_012_high_iv_scan_cat_ovr_min
  title: high-IV OVR scan for categorical columns (minimum)

result:
  cv:
    score: null
  lb:
    public: null
    private: null
  selected_high_iv_cols:
    - Crop_Growth_Stage
    - Water_Source
    - Crop_Type
    - Irrigation_Type
    - Soil_Type
  dropped_cols:
    - Region
    - Season
  notes:
    - iv_max 順で一次選別
    - Crop_Growth_Stage が別格で、2位以下とは大きな差がある
    - best_class は大半が High で、カテゴリIVは High 分離に偏って効いている
    - high-IV は一次選別に留め、下位列も pair や NN 側では再検討余地あり

artifacts:
  files:
    - iv_summary_multiclass.csv
    - iv_detail_Soil_Type_multiclass.csv
    - iv_detail_Crop_Type_multiclass.csv
    - iv_detail_Crop_Growth_Stage_multiclass.csv
    - iv_detail_Season_multiclass.csv
    - iv_detail_Irrigation_Type_multiclass.csv
    - iv_detail_Water_Source_multiclass.csv
    - iv_detail_Region_multiclass.csv

decision:
  verdict: keep
  reason: >
    multiclass one-vs-rest IV により、GBDT系の最小 CATNUM / group stats の起点列を
    絞ることができた。Crop_Growth_Stage は強く、Water_Source / Crop_Type /
    Irrigation_Type / Soil_Type を続く候補とする。
  next_action:
    - GBDT系向け最小 CATNUM を top4 で作る
    - top4 + Soil_Type を含む版を比較用に作る
    - NN系では同じ列群をそのまま使わず embedding 起点として再整理する
