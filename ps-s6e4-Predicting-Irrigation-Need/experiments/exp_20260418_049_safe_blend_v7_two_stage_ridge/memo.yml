experiment:
  id: exp_20260418_049_safe_blend_v7_two_stage_ridge
  title: Safe blend v7 with NM/HC/LR/Ridge/AVG and two-stage ridge alpha search
  competition: PS S6E4 Predicting Irrigation Need
  metric: multiclass balanced accuracy
  status: done

objective:
  summary: >
    同一 stack に対して NM / HC / LogReg / Ridge / equal_avg の5戦略を
    共通条件で比較し、各 strategy の OOF / pred / submission を生成する。
    その上で、CV上位の strategy を提出候補として管理する。
    あわせて Ridge については alpha の2段階探索を導入し、
    v6 時点の粗い alpha 探索による過小評価を避ける。
  success_criteria:
    - NM / HC / LogReg / Ridge / equal_avg の5戦略を全て実行
    - 各 strategy について cv_score を取得
    - 各 strategy について oof / pred / submission を保存
    - cv_result.json に recommended_submit / reason を記録
    - Ridge two-stage が v6 の Ridge より改善するか確認
    - 提出候補を2〜3本に絞れる状態にする

base_code:
  source: code_safe_blend_v6.txt
  revision: v7
  changes:
    - NM / HC / LogReg / Ridge / equal_avg の5戦略を常設比較
    - 各戦略の submission csv を全生成
    - recommended_submit / reason を追加
    - Ridge alpha の two-stage search を追加
    - ridge_alpha_summary.json を保存

stack:
  models:
    - 018
    - 024
    - 025
    - 026
    - 037
    - 039
    - 041
    - 048
  notes: >
    現時点では v6 と同じ stack を土台とする。
    049 の目的は stack 素材の変更ではなく、
    同一 stack に対する blend method 比較と Ridge 再審査である。

npy_inputs:
  OOF_018: oof_cat_pairwise_te_bias_from_shared_min_proba_biased.npy
  PRED_018: pred_cat_pairwise_te_bias_from_shared_min_proba_biased.npy

  OOF_024: oof_xgb_digit_orderedte_min_optuna_biased_refined.npy
  PRED_024: pred_xgb_digit_orderedte_min_optuna_biased_refined.npy

  OOF_025: oof_lgb_digit_te_min_proba_biased.npy
  PRED_025: pred_lgb_digit_te_min_proba_biased.npy

  OOF_026: oof_realmlp_pair_te_min_proba_biased_refined.npy
  PRED_026: pred_realmlp_pair_te_min_proba_biased_refined.npy

  OOF_037: oof_dao_xgb_pair_te_posthoc_only_proba.npy
  PRED_037: pred_dao_xgb_pair_te_posthoc_only_proba.npy

  OOF_039: oof_xgb_formula_logit_min_proba.npy
  PRED_039: pred_xgb_formula_logit_min_proba.npy

  OOF_041: oof_trompt_strict_min_proba_biased.npy
  PRED_041: pred_trompt_strict_min_proba_biased.npy

  OOF_048: oof_utaazu_lgbm_min_repro_proba_biased.npy
  PRED_048: pred_utaazu_lgbm_min_repro_proba_biased.npy

blend_methods:
  - name: nelder_mead
    role: main candidate
    expected_behavior: >
      連続重み同時最適化。048 追加後の current best 候補。
  - name: hill_climb
    role: main comparison
    expected_behavior: >
      離散加算型。stack 内容によっては NM を上回る可能性あり。
  - name: stack_lr
    role: secondary comparison
    expected_behavior: >
      線形メタ学習の保険候補。
  - name: ridge_two_stage
    role: re-evaluation candidate
    expected_behavior: >
      alpha 2段階探索で v6 Ridge の再審査を行う。
  - name: equal_avg
    role: diagnostic baseline
    expected_behavior: >
      複雑ブレンドの有効性を測る下限比較。

ridge:
  enabled: true
  previous_issue: >
    v6 では alpha grid が粗く、CV 0.975626 と大きく沈んだため、
    手法自体ではなく alpha 探索の粗さで過小評価されている可能性がある。
  search:
    stage1:
      name: coarse
      alphas: logspace(-5, 5, 41)
    stage2:
      name: fine
      around_best_log10_width: 0.75
      n_points: 31
  selection_logic: >
    class別に coarse -> fine の順で alpha を再探索し、
    fold ごとの最終 alpha を用いて multiclass 回帰出力を作る。
  expected_result: >
    v6 Ridge より改善すれば keep。
    それでも弱ければ、現 stack において Ridge は本当に弱いと判断してよい。

cv:
  scheme: StratifiedKFold
  n_splits: 5
  shuffle: true
  random_state: 42

output:
  dir: /kaggle/working/exp_20260418_049_safe_blend_v7_two_stage_ridge
  files_expected:
    - pairwise_corr_summary.csv
    - single_model_scores.csv
    - blend_strategy_results.csv
    - nelder_mead_weights.csv
    - hill_climb_weights.csv
    - hill_climb_history.csv
    - ridge_alpha_summary.json
    - cv_result.json
    - oof_equal_avg.npy
    - pred_equal_avg.npy
    - submission_equal_avg.csv
    - oof_nelder_mead.npy
    - pred_nelder_mead.npy
    - submission_nelder_mead.csv
    - oof_hill_climb.npy
    - pred_hill_climb.npy
    - submission_hill_climb.csv
    - oof_ridge_two_stage.npy
    - pred_ridge_two_stage.npy
    - submission_ridge_two_stage.csv
    - oof_stack_lr.npy
    - pred_stack_lr.npy
    - submission_stack_lr.csv

decision_rule:
  submit_policy: >
    5戦略すべての submission は生成するが、
    実際に提出するのは recommended_submit=true の上位2〜3本に絞る。
  recommendation_logic: >
    blend_strategy_results.csv / cv_result.json に
    recommended_submit と reason を記録し、
    提出判断を曖昧にしない。
  keep:
    - NM / HC / LogReg / Ridge / avg の比較が明確にできる
    - Ridge two-stage が v6 Ridge より改善
  hold:
    - Ridge は改善したが主力には届かない
  drop:
    - Ridge two-stage でも明確に弱い
    - equal_avg にも劣る

risk:
  - CV 上位が LB 上位にそのまま変換されるとは限らない
  - 5戦略全生成と5本全提出は別問題であり、提出枠管理が必要
  - Ridge two-stage を入れても NM / HC を逆転できる保証はない
  - 048 のように strategy 相性で効き方が変わる素材があるため、一般化しすぎないこと

comparison_to_previous:
  v6_known_result:
    nelder_mead:
      cv: 0.980463
      public_lb: 0.98046
    hill_climb:
      cv: 0.980454
      public_lb: 0.97973
    stack_lr:
      cv: 0.980092
      public_lb: 0.97978
    ridge:
      cv: 0.975626
      public_lb: null
    equal_avg:
      cv: 0.980072
      public_lb: null
  interpretation: >
    v6 時点では NM が最良。
    049 ではこの関係が維持されるか、Ridge two-stage がどこまで回復するかを確認する。

result:
  nelder_mead_cv: 0.980463
  hill_climb_cv: 0.980454
  stack_lr_cv: 0.980092
  ridge_two_stage_cv: 0.979871
  equal_avg_cv: 0.980072
  public_lb_nelder_mead: 0.98046
  public_lb_hill_climb: 0.97973
  public_lb_stack_lr: 0.97978
  public_lb_ridge_two_stage: null
  public_lb_equal_avg: null
  best_strategy_by_cv: null
  decision: >
    keep for submission and search for the strong one in other famlies

post_experiment_review:
  summary: >
    049 は完走。`ps-s6e4-safe-blend-v7-two-stage-ridge.ipynb` にて
    NM / HC / LogReg / Ridge / equal_avg の5戦略比較と、
    Ridge alpha の two-stage search を実施した。
    結果は `code_safe_blend_v6.txt` と実質同一であり、
    blend 手法の相対序列は変化しなかった。
    したがって、v6 時点で観測された
    NM > HC > LogReg ≒ avg >> Ridge
    という構図は維持されたと判断する。

  main_findings:
    - two-stage ridge alpha search を入れても v6 と同じ結果だった
    - Ridge は alpha 探索の粗さが原因で弱かったのではなく、
    現 stack との相性そのものが悪い可能性が高い
    - NM / HC / LogReg / avg の相対関係にも有意な変化は見られなかった
    - よって 049 は「新しい勝ち筋を作った実験」ではなく、
    「Ridge を公平に再審査して close 判定した実験」と位置づけるのが正しい
  
  interpretation: >
    049 の価値は、Ridge の弱さが実装の粗さによる見かけではなく、
    現在の stack 素材群に対する本質的な不適合である可能性を確認した点にある。
    これにより、今後の blend 比較で Ridge を主力候補として追う必要性は大きく下がった。
    少なくとも現 stack では、blend method の深掘りよりも、
    NM を前提とした safer core 圧縮の方が期待値が高い。
  
  decision:
    ridge: close
    nelder_mead: keep_as_main
    hill_climb: keep_as_secondary
    logreg: keep_as_backup
    equal_avg: keep_as_diagnostic
  
  operational_rule_update: >
    今後は、同一 stack に対して毎回
    NM / HC / LogReg / avg を基本比較対象とし、
    Ridge は参考出力に留めるか、原則として比較対象から外してよい。
    少なくとも current stack に対しては、
    Ridge 再評価のために追加計算資源を投下する優先度は低い。
  
  next_step_implication: >
    049 により blend method 論点はほぼ整理されたため、
    次の主戦場は blend 手法の改良ではなく、
    048 を含む NM の safer 圧縮版比較である。
    比較候補はまず
    024/018/025/048、
    024/018/025/037/048、
    024/018/025/026/048、
    024/018/025/026/037/048
    あたりから始めるのが妥当。
  
  note_for_future: >
    049 が v6 と同結果だった以上、
    今後 Ridge を再度主力候補として扱うには、
    stack 素材が明確に変わることが前提になる。
    今の素材群のまま alpha 探索だけをさらに掘っても、
    リターンは薄いとみなす。

next_action:
  - 049 を実行して5戦略の cv_score を取得
  - recommended_submit=true の strategy を確認
  - 提出は上位2〜3本に絞る
  - Ridge two-stage の改善幅を v6 Ridge と比較
  - 048 を含む safer core 圧縮の必要性を再判定
