notes:
  - 今回は screening なので、hill climb や logit blend までは行かない
  - 024 と 025 は近縁なので、同時採用前提で考えない
  - まずは勝ち残る候補セットを切ることが目的
  - 新しい shared 候補探索より先に、現候補群の整理を優先する

