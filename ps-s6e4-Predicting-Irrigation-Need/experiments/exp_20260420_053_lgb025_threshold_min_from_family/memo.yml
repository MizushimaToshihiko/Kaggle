post_blend_benchmark:
  executed: false
  benchmark_notebook: ps-s6e4-safe-blend-v7-two-stage-ridge.ipynb
  mode: null
  stack_change:
    type: null
    description: null
  results:
    nelder_mead_cv: null
    hill_climb_cv: null
    stack_lr_cv: null
    equal_avg_cv: null
    ridge_cv: null
    public_lb_nelder_mead: null
    public_lb_hill_climb: null
    public_lb_stack_lr: null
    public_lb_equal_avg: null
    public_lb_ridge: null
  interpretation: >
    blend benchmark 後の解釈を書く。
    例:
    - NM にだけ効いた
    - HC では崩れた
    - 追加価値なし
    - 025 の補助 sibling として採用
  decision_after_blend: null

operational_notes:
  summary: >
    synthetic-threshold 系は discussion687460 由来の知識だが、
    係数の厳密再現や exact formula の追求はしない。
    目的は補助特徴の最小追加であり、主モデルの作り直しではない。
    026 family にはまだ入れない。
  current_global_rule: >
    新モデル作成のたびに blend benchmark を通す。
    何でも benchmark に入れない。
    主力更新候補は差し替え、別人格候補は追加。
    提出は benchmark 上位2〜3本に絞る。 

risk:
  - 025 と 046b にさらに近づくだけになる可能性
  - threshold 追加で単体CVが微妙に悪化する可能性
  - synthetic bias を拾っても blend 改善に変換されない可能性
  - 046b のような XGB 系主力に寄りすぎて、LGB family の価値を失う可能性

next_action:
  - 053 を実行して raw_cv_ba / refined_biased_cv / public_lb を記録
  - 025 / 046b / 048 / 052 との raw / rank 相関を確認
  - gate_rule_before_blend を満たすか判定
  - 満たす場合のみ blend benchmark に追加
  - keep / hold / drop を確定
